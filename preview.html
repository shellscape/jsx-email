llpadding=\"0\" border=\"0\" style=\"max-width:680px;width:100%;margin:0 auto;background-color:#ffffff\">\n          <tbody>\n            <tr style=\"width:100%\">\n              <td align=\"center\">\n                <table align=\"center\" width=\"100%\" style=\"display:flex;background:#f3f3f5;padding:20px 30px\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td><img src=\"https://jsx.email/assets/demo/stack-overflow-logo.png\" width=\"146\" style=\"border:none;display:block;outline:none;text-decoration:none\"></td>\n                    </tr>\n                  </tbody>\n                </table>\n                <table align=\"center\" width=\"100%\" style=\"border-radius:5px 5px 0 0;display:flex;flex-direciont:column;background-color:#2b2d6e\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <table align=\"center\" width=\"100%\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\" border=\"0\">\n                          <tbody style=\"width:100%\">\n                            <tr style=\"width:100%\">\n                              <td style=\"padding:20px 30px 15px\">\n                                <h1 style=\"color:#fff;font-size:27px;font-weight:bold;line-height:27px\">Find what you want, faster</h1>\n                                <p style=\"font-size:17px;line-height:24px;margin:16px 0;color:#fff\">Tips and tricks for searching on Stack Overflow</p>\n                              </td>\n                              <td style=\"padding:30px 10px\"><img src=\"https://jsx.email/assets/demo/stack-overflow-header.png\" width=\"340\" style=\"border:none;display:block;outline:none;text-decoration:none\"></td>\n                            </tr>\n                          </tbody>\n                        </table>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n                <table align=\"center\" width=\"100%\" style=\"padding:30px 30px 40px 30px\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <h2 style=\"margin:0 0 15px;font-weight:bold;font-size:21px;line-height:21px;color:#0c0d0e\">Searching for solutions</h2>\n                        <p style=\"font-size:15px;line-height:21px;margin:16px 0;color:#3c3f44\">With more than 18 million questions, it's possible that someone has already provided a solution to the problem you're facing. </p>\n                        <hr style=\"border:none;border-top:1px solid #eaeaea;width:100%;margin:30px 0\">\n                        <h2 style=\"margin:0 0 15px;font-weight:bold;font-size:21px;line-height:21px;color:#0c0d0e\">Use the search bar at the top of the page to find what you need</h2>\n                        <p style=\"font-size:15px;line-height:21px;margin:16px 0;color:#3c3f44\">Here are a few simple search tips to get you started:</p>\n                        <ul>\n                          <li>\n                            <p style=\"font-size:15px;line-height:21px;margin:16px 0;color:#3c3f44\">To find a specific phrase, enter it in quotes: \"local storage\"</p>\n                          </li>\n                          <li>\n                            <p style=\"font-size:15px;line-height:21px;margin:16px 0;color:#3c3f44\">To search within specific tag(s), enter them in square brackets: [javascript]</p>\n                          </li>\n                          <li>\n                            <p style=\"font-size:15px;line-height:21px;margin:16px 0;color:#3c3f44\">Combine them to get even more precise results - [javascript] \"local storage\" searches for the phrase вҖңlocal storageвҖқ in questions that have the [javascript] tag</p>\n                          </li>\n                        </ul>\n                        <p style=\"font-size:15px;line-height:21px;margin:16px 0;color:#3c3f44\">The more information you can put in the search bar, the more likely you will be to either find the answer you need or feel confident that no one else has asked the question before.</p>\n                        <hr style=\"border:none;border-top:1px solid #eaeaea;width:100%;margin:30px 0\">\n                        <h2 style=\"margin:0 0 15px;font-weight:bold;font-size:21px;line-height:21px;color:#0c0d0e\">Take a break and read about the worst coder in the world</h2>\n                        <table align=\"center\" width=\"100%\" style=\"margin-top:24px;display:block\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                          <tbody>\n                            <tr>\n                              <td><a href=\"https://stackoverflow.blog/2019/10/22/\" style=\"color:#fff;text-decoration:none;background-color:#0095ff;border:1px solid #0077cc;font-size:17px;line-height:17px;padding:13px 17px;border-radius:4px;max-width:120px\">I need a break</a></td>\n                            </tr>\n                          </tbody>\n                        </table>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n              </td>\n            </tr>\n          </tbody>\n        </table><span><!--[if mso]></td></tr></table><![endif]--></span>\n      </div>\n    </div>\n    <table align=\"center\" width=\"100%\" style=\"width:680px;margin:32px auto 0 auto;padding:0 30px\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n      <tbody>\n        <tr>\n          <td>\n            <p style=\"font-size:12px;line-height:15px;margin:0;color:#9199a1\">You're receiving this email because your Stack Overflow activity triggered this tip or reminder.</p><a href=\"/\" style=\"color:#9199a1;text-decoration:underline;display:inline-block;font-size:12px;margin-right:10px;margin-bottom:0;margin-top:8px\">Unsubscribe from emails like this </a><a href=\"/\" style=\"color:#9199a1;text-decoration:underline;display:inline-block;font-size:12px;margin-right:10px;margin-bottom:0;margin-top:8px\">Edit email settings </a><a href=\"/\" style=\"color:#9199a1;text-decoration:underline;display:inline-block;font-size:12px;margin-right:10px;margin-bottom:0;margin-top:8px\">Contact us</a><a href=\"/\" style=\"color:#9199a1;text-decoration:underline;display:inline-block;font-size:12px;margin-right:10px;margin-bottom:0;margin-top:8px\">Privacy</a>\n            <hr style=\"border:none;border-top:1px solid #eaeaea;width:100%;margin:30px 0;border-color:#d6d8db\"><img src=\"https://jsx.email/assets/demo/stack-overflow-logo-sm.png\" width=\"111\" style=\"border:none;display:block;outline:none;text-decoration:none\">\n            <p style=\"font-size:12px;line-height:15px;margin:4px 0;color:#9199a1\"><strong>Stack Overflow</strong>, 110 William Street, 28th Floor, New York, NY 10038</p>\n            <p style=\"font-size:11px;line-height:11px;margin:0 0 32px 0;border-radius:1px;border:1px solid #d6d9dc;padding:4px 6px 3px 6px;font-family:Consolas,monospace;color:#e06c77;max-width:min-content\">&#x3C;3</p>\n          </td>\n        </tr>\n      </tbody>\n    </table>\n  </body>\n\n</html>",

olor: '#9199a1',\n  textDecoration: 'underline',\n  fontSize: '12px',\n  marginRight: '10px',\n  marginBottom: '0',\n  marginTop: '8px'\n};\n\nconst footerAddress = {\n  margin: '4px 0',\n  fontSize: '12px',\n  lineHeight: '15px',\n  color: '#9199a1'\n};\n\nconst footerHeart = {\n  borderRadius: '1px',\n  border: '1px solid #d6d9dc',\n  padding: '4px 6px 3px 6px',\n  fontSize: '11px',\n  lineHeight: '11px',\n  fontFamily: 'Consolas,monospace',\n  color: '#e06c77',\n  maxWidth: 'min-content',\n  margin: '0 0 32px 0'\n};\n\nconst baseUrl = 'https://jsx.email/assets/demo/';\n\nconst PropDefaults: StackOverflowTipsEmailProps = {\n  tips: [\n    {\n      id: 1,\n      description: 'To find a specific phrase, enter it in quotes: \"local storage\"'\n    },\n    {\n      id: 1,\n      description: 'To search within specific tag(s), enter them in square brackets: [javascript]'\n    },\n    {\n      id: 1,\n      description:\n        'Combine them to get even more precise results - [javascript] \"local storage\" searches for the phrase вҖңlocal storageвҖқ in questions that have the [javascript] tag'\n    }\n  ]\n};\n\nexport const previewProps = {\n  tips: PropDefaults.tips\n} as StackOverflowTipsEmailProps;\n\nexport const templateName = 'StackOverflow Tips';\n\nexport const Template = ({ tips = [] }: StackOverflowTipsEmailProps) => (\n  <Html>\n    <Head />\n    <Preview>Stack overflow tips for searching</Preview>\n    <Body style={main}>\n      <Container style={container}>\n        <Section style={logo}>\n          <Img width={146} src={`${baseUrl}stack-overflow-logo.png`} />\n        </Section>\n\n        <Section style={header}>\n          <Row>\n            <Column style={headerContent}>\n              <Heading style={headerContentTitle}>Find what you want, faster</Heading>\n              <Text style={headerContentSubtitle}>\n                Tips and tricks for searching on Stack Overflow\n              </Text>\n            </Column>\n            <Column style={header                 "jsx": "import { Body, Button, Container, Head, Hr, Html, Img, Preview, Section, Text } from 'jsx-email';\n\ninterface KoalaWelcomeEmailProps {\n  userFirstname: string;\n}\n\nconst main = {\n  backgroundColor: '#ffffff',\n  fontFamily:\n    '-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Oxygen-Sans,Ubuntu,Cantarell,\"Helvetica Neue\",sans-serif'\n};\n\nconst container = {\n  margin: '0 auto',\n  padding: '20px 0 48px'\n};\n\nconst logo = {\n  margin: '0 auto'\n};\n\nconst paragraph = {\n  fontSize: '16px',\n  lineHeight: '26px'\n};\n\nconst btnContainer = {\n  textAlign: 'center' as const\n};\n\nconst hr = {\n  borderColor: '#cccccc',\n  margin: '20px 0'\n};\n\nconst footer = {\n  color: '#8898aa',\n  fontSize: '12px'\n};\n\nconst baseUrl = 'https://jsx.email/assets/demo/';\n\nexport const previewProps = {\n  userFirstname: 'Bruce'\n} as KoalaWelcomeEmailProps;\n\nexport const templateName = 'Koala Welcome';\n\nexport const Template = ({ userFirstname }: KoalaWelcomeEmailProps) => (\n  <Html>\n    <Head />\n    <Preview>The sales intelligence platform that helps you uncover qualified leads.</Preview>\n    <Body style={main}>\n      <Container style={container}>\n        <Img src={`${baseUrl}koala-logo.png`} width=\"170\" height=\"50\" alt=\"Koala\" style={logo} />\n        <Text style={paragraph}>Hi {userFirstname},</Text>\n        <Text style={paragraph}>\n          Welcome to Koala, the sales intelligence platform that helps you uncover qualified leads\n          and close deals faster.\n        </Text>\n        <Section style={btnContainer}>\n          <Button\n            width={106}\n            height={44}\n            backgroundColor=\"#5F51E8\"\n            borderRadius={3}\n            textColor=\"#fff\"\n            href=\"https://getkoala.com\"\n          >\n            Get started\n          </Button>\n        </Section>\n        <Text style={paragraph}>\n          Best,\n          <br />\n          The Koala team\n        </Text>\n        <Hr style={hr} />\n        <Text style={footer}>408 Warren Rd - San Mateo, CA 94402</Text>\n      </Container>\n    </Body>\n  </Html>\n);\n",

if mso]><table align=\"center\" width=\"600\" style=\"border-spacing: 0; width:600px;\" role=\"presentation\"><tr><td><![endif]--></span>\n        <table align=\"center\" width=\"100%\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\" border=\"0\" class=\"p-45 bg-white\" style=\"max-width:600px\">\n          <tbody>\n            <tr style=\"width:100%\">\n              <td align=\"center\">\n                <h1 class=\"my-0 text-center\" style>Welcome to Netlify</h1>\n                <table align=\"center\" width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <p class=\"text-base\" style=\"font-size:14px;line-height:24px;margin:16px 0\">Congratulations! You're joining over 3 million developers around the world who use Netlify to build and ship sites, stores, and apps.</p>\n                        <p class=\"text-base\" style=\"font-size:14px;line-height:24px;margin:16px 0\">Here's how to get started:</p>\n                        <table align=\"center\" width=\"100%\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\" border=\"0\">\n                          <tbody style=\"width:100%\">\n                            <tr style=\"width:100%\"></tr>\n                          </tbody>\n                        </table>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n                <ul>\n                  <li class=\"mb-20\"><strong>Deploy your first project.</strong> <a style=\"color:#067df7;text-decoration:none\">Connect to Git, choose a template</a>, or manually deploy a project you've been working on locally.</li>\n                  <li class=\"mb-20\"><strong>Check your deploy logs.</strong> Find out what's included in your build and watch for errors or failed deploys. <a style=\"color:#067df7;text-decoration:none\">Learn how to read your deploy logs</a>.</li>\n                  <li class=\"mb-20\"><strong>Choose an integration.</strong> Quickly discover, connect, and configure the right tools for your project with 150+ integrations to choose from. <a style=\"color:#067df7;text-decoration:none\">Explore the Integrations Hub</a>.</li>\n                  <li class=\"mb-20\"><strong>Set up a custom domain.</strong> You can register a new domain and buy it through Netlify or assign a domain you already own to your site. <a style=\"color:#067df7;text-decoration:none\">Add a custom domain</a>.</li>\n                </ul>\n                <table align=\"center\" width=\"100%\" class=\"text-center\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <table width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-collapse:collapse\" role=\"presentation\">\n                          <tbody>\n                            <tr>\n                              <td align=\"left\"><span><!--[if mso]>\n            <v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" style=\"height:56px;v-text-anchor:middle;width:182px;\" arcsize=\"14%\"  strokeweight=\"1px\" fillcolor=#2250f4>\n            <w:anchorlock/>\n            <center style=\"font-size:16px;color:#fff;\">\n            Go to your dashboard\n            </center></v:roundrect>\n            <![endif]--></span><a style=\"-webkit-text-size-adjust:none;border-radius:8px;display:inline-block;font-size:16px;line-height:54px;max-width:182px;text-align:center;text-decoration:none;width:100%;background-color:#2250f4;color:#fff;mso-hide:all\">Go to your dashboard</a></td>\n                            </tr>\n                          </tbody>\n                        </table>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n Props) => {\n  return (\n    <Html>\n      <Head />\n      <Preview>Netlify Welcome</Preview>\n      <Tailwind\n        config={{\n          theme: {\n            colors: {\n              brand: '#2250f4',\n              offwhite: '#fafbfb'\n            },\n            spacing: {\n              0: '0px',\n              20: '20px',\n              45: '45px'\n            }\n          }\n        }}\n      >\n        <Body className=\"bg-offwhite font-sans text-base\">\n          <Img\n            src={`${baseUrl}netlify-logo.png`}\n            width=\"184\"\n            height=\"75\"\n            alt=\"Netlify\"\n            className=\"mx-auto my-20\"\n          />\n          <Container className=\"p-45 bg-white\">\n            <Heading className=\"my-0 text-center\">Welcome to Netlify</Heading>\n\n            <Section>\n              <Row>\n                <Text className=\"text-base\">\n                  Congratulations! You're joining over 3 million developers around the world who use\n                  Netlify to build and ship sites, stores, and apps.\n                </Text>\n\n                <Text className=\"text-base\">Here's how to get started:</Text>\n              </Row>\n            </Section>\n\n            <ul>{steps?.map(({ Description }) => Description)}</ul>\n\n            <Section className=\"text-center\">\n              <Button\n                width={182}\n                height={56}\n                backgroundColor=\"#2250f4\"\n                borderRadius={8}\n                textColor=\"#fff\"\n              >\n                Go to your dashboard\n              </Button>\n            </Section>\n\n            <Section className=\"mt-45\">\n              <Row>\n                {links?.map((link) => (\n                  <Column>\n                    <Link className=\"font-bold text-black underline\">{link}</Link>{' '}\n                    <span className=\"text-green-500\">вҶ’</span>\n                  </Column>\n                ))}\n              </Row>\n            </Section>\n          </Container>\n\n          <Container className=\"mt-20\">\n            <Section>\n              <Row>\n                <Column className=\"px-20 text-right\">\n                  <Link>Unsubscribe</Link>\n                </Column>\n                <Column className=\"text-left\">\n                  <Link>Manage Preferences</Link>\n                </Column>\n              </Row>\n            </Section>\n            <Text className=\"mb-45 text-center text-gray-400\">\n              Netlify, 44 Montgomery Street, Suite 300 San Francisco, CA\n            </Text>\n          </Container>\n        </Body>\n      </Tailwind>\n    </Html>\n  );\n};\n",
                "name": "Netlify Welcome",
                "plain": "WELCOME TO NETLIFY\n\nCongratulations! You're joining over 3 million developers around the world who\nuse Netlify to build and ship sites, stores, and apps.\n\nHere's how to get started:\n\n * Deploy your first project. Connect to Git, choose a template, or manually\n   deploy a project you've been working on locally.\n * Check your deploy logs. Find out what's included in your build and watch for\n   errors or failed deploys. Learn how to read your deploy logs.\n * Choose an integration. Quickly discover, connect, and configure the right\n   tools for your project with 150+ integrations to choose from. Explore the\n   Integrations Hub.\n * Set up a custom domain. You can register a new domain and buy it through\n   Netlify or assign a domain you already own to your site. Add a custom domain.\n\nGo to your dashboard\n\nVisit the forums вҶ’Read the docs вҶ’Contact an expert вҶ’\n\nUnsubscribeManage Preferences\n\nNetlify, 44 Montgomery Street, Suite 300 San Francisco, CA",

        },

\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td><img alt=\"Stripe\" src=\"https://jsx.email/assets/demo/stripe-logo.png\" width=\"49\" height=\"21\" style=\"border:none;display:block;outline:none;text-decoration:none\">\n                        <hr style=\"border:none;border-top:1px solid #eaeaea;width:100%;border-color:#e6ebf1;margin:20px 0\">\n                        <p style=\"font-size:16px;line-height:24px;margin:16px 0;color:#525f7f;text-align:left\">Thanks for submitting your account information. You're now ready to make live transactions with Stripe!</p>\n                        <p style=\"font-size:16px;line-height:24px;margin:16px 0;color:#525f7f;text-align:left\">You can view your payments and a variety of other information about your account right from your dashboard.</p>\n                        <table width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-collapse:collapse\" role=\"presentation\">\n                          <tbody>\n                            <tr>\n                              <td align=\"center\"><span><!--[if mso]>\n            <v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" style=\"height:40px;v-text-anchor:middle;width:300px;\" arcsize=\"12%\"  strokeweight=\"1px\" fillcolor=#656ee8>\n            <w:anchorlock/>\n            <center style=\"font-size:16px;color:#fff;\">\n            View your Stripe Dashboard\n            </center></v:roundrect>\n            <![endif]--></span><a href=\"https://dashboard.stripe.com/login\" style=\"-webkit-text-size-adjust:none;border-radius:5px;display:inline-block;font-size:16px;line-height:38px;max-width:300px;text-align:center;text-decoration:none;width:100%;background-color:#656ee8;color:#fff;mso-hide:all\">View your Stripe Dashboard</a></td>\n                            </tr>\n                          </tbody>\n                        </table>\n t-size:12px;line-height:16px;margin:16px 0;color:#8898aa\">Stripe, 354 Oyster Point Blvd, South San Francisco, CA 94080</p>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n              </td>\n            </tr>\n          </tbody>\n        </table><span><!--[if mso]></td></tr></table><![endif]--></span>\n      </div>\n    </div>\n  </body>\n\n</html>",

r style={hr} />\n          <Text style={paragraph}>\n            If you haven't finished your integration, you might find our{' '}\n            <Link style={anchor} href=\"https://stripe.com/docs\">\n              docs\n            </Link>{' '}\n            handy.\n          </Text>\n          <Text style={paragraph}>\n            Once you're ready to start accepting payments, you'll just need to use your live{' '}\n            <Link style={anchor} href=\"https://dashboard.stripe.com/login?redirect=%2Fapikeys\">\n              API keys\n            </Link>{' '}\n            instead of your test API keys. Your account can simultaneously be used for both test and\n            live requests, so you can continue testing while accepting live payments. Check out our{' '}\n            <Link style={anchor} href=\"https://stripe.com/docs/dashboard\">\n              tutorial about account basics\n            </Link>\n            .\n          </Text>\n          <Text style={paragraph}>\n            Finally, we've put together a{' '}\n            <Link style={anchor} href=\"https://stripe.com/docs/checklist/website\">\n              quick checklist\n            </Link>{' '}\n            to ensure your website conforms to card network standards.\n          </Text>\n          <Text style={paragraph}>\n            We'll be here to help you with any step along the way. You can find answers to most\n            questions and get in touch with us on our{' '}\n            <Link style={anchor} href=\"https://support.stripe.com/\">\n              support site\n            </Link>\n            .\n          </Text>\n          <Text style={paragraph}>вҖ” The Stripe team</Text>\n          <Hr style={hr} />\n          <Text style={footer}>Stripe, 354 Oyster Point Blvd, South San Francisco, CA 94080</Text>\n        </Section>\n      </Container>\n    </Body>\n  </Html>\n);\n",

boxInfos, paddingBottom: '0' }}>\n              <Column>\n                <Heading\n                  style={{\n                    fontSize: 32,\n                    fontWeight: 'bold',\n                    textAlign: 'center'\n                  }}\n                >\n                  Hi {userFirstName},\n                </Heading>\n                <Heading\n                  as=\"h2\"\n                  style={{\n                    fontSize: 26,\n                    fontWeight: 'bold',\n                    textAlign: 'center'\n                  }}\n                >\n                  We noticed a recent login to your Yelp account.\n                </Heading>\n\n                <Text style={paragraph}>\n                  <b>Time: </b>\n                  {formattedDate}\n                </Text>\n                <Text style={{ ...paragraph, marginTop: -5 }}>\n                  <b>Device: </b>\n                  {loginDevice}\n                </Text>\n                <Text style={{ ...paragraph, marginTop: -5 }}>\n                  <b>Location: </b>\n                  {loginLocation}\n                </Text>\n                <Text\n                  style={{\n                    color: 'rgb(0,0,0, 0.5)',\n                    fontSize: 14,\n                    marginTop: -5\n                  }}\n                >\n                  *Approximate geographic location based on IP address:\n                  {loginIp}\n                </Text>\n\n                <Text style={paragraph}>If this was you, there's nothing else you need to do.</Text>\n                <Text style={{ ...paragraph, marginTop: -5 }}>\n                  If this wasn't you or if you have additional questions, please see our support\n                  page.\n                </Text>\n              </Column>\n            </Row>\n            <Row style={{ ...boxInfos, paddingTop: '0' }}>\n              <Column style={containerButton} colSpan={2}>\n                <Button\n                  width={150}\       function getFileTree() {
        const root = [];
        for (const template of templates) {
          const parts = template.file.split('/');
          let branch = root;
          parts.forEach((part, index) => {
            const isFile = index === parts.length - 1;
            let node = branch.find((item) => item.name === part);
            if (!node) {
              node = { children: [], name: part, template: null, type: isFile ? 'file' : 'folder' };
              branch.push(node);
            }
            if (isFile) node.template = template;
            branch = node.children;
          });
        }
        return root;
      }

      const fileTree = getFileTree();
      const folderPaths = templates
        .flatMap((template) => {
          const parts = template.file.split('/');
          return parts.slice(0, -1).map((_, index) => parts.slice(0, index + 1).join('/'));
        })
        .filter(Boolean);
      const allFolderPaths = Array.from(new Set(folderPaths));

      function TreeNode({
        expandedFolders,
        focusTemplate,
        node,
        selectedTemplateId,
        setExpandedFolders,
        path

        if (node.type === 'folder') {
          const isExpanded = expandedFolders.has(path);
          return h(
            'div',
            { key: node.name },
            h(
              'button',
              {
                className: 'tree-row text-xs font-medium uppercase tracking-wide',
                onClick: () =>
                  setExpandedFolders((current) => {
                    const next = new Set(current);
                    if (next.has(path)) {
                      next.delete(path);
                    } else {
                      next.add(path);
                    }
                    return next;
                  }),
                type: 'button'
              },
              h(Icon, { name: isExpanded ? 'folder-minus' : 'folder-plus' }),
              h('span', null, node.name)

            h(

                  focusTemplate,

                  selectedTemplateId,

        const updateCard = (patch) => labStore.getState().updateCard(cardId, patch);
        async function handleSend(event) {
          event.preventDefault();
          if (!template || !sendEmail || sendState === 'sending') return;

          updateCard({ sendError: null, sendState: 'sending' });

          try {
            const startedAt = Date.now();
            const response = await fetch('https://api.useplunk.com/v1/send', {
              body: JSON.stringify({
                body: template.html,
                subject: 'Test jsx-email template',
                to: sendEmail
              }),
              headers: {
                Authorization: `Bearer ${plunkApiBearerTokenProvidedOnlyForJsxEmailUiDoNotUseElsewhere}`,
                'Content-Type': 'application/json'
              },
              method: 'POST'
            });
            const waitMs = Math.max(0, 4000 - (Date.now() - startedAt));
            if (waitMs > 0) {
              await new Promise((resolve) => window.setTimeout(resolve, waitMs));
            }

            if (response.status !== 200) {
              updateCard({ sendError: await response.text(), sendState: 'error' });
              return;

            updateCard({ sendError: null, sendState: 'sent' });
            window.setTimeout(() => {
              if (getLabState(cardId).sendState === 'sent') {

      function PreviewIframe({ html, title }) {
        const [renderedHtml, setRenderedHtml] = useState(html);
        const iframeRef = useRef(null);
        const pendingScroll = useRef(null);

        useLayoutEffect(() => {
          if (html === renderedHtml) return;

          const frame = iframeRef.current;
          pendingScroll.current = {
            x: frame?.contentWindow?.scrollX || 0,
            y: frame?.contentWindow?.scrollY || 0
          };
          setRenderedHtml(html);
        }, [html, renderedHtml]);

        return h('iframe', {
          ref: iframeRef,
          title,
          srcDoc: renderedHtml,
          sandbox: 'allow-same-origin',
          onLoad: () => {
            const scroll = pendingScroll.current;
            const frame = iframeRef.current;
            if (!scroll || !frame?.contentWindow) return;

            frame.contentWindow.scrollTo(scroll.x, scroll.y);
            pendingScroll.current = null;
          },
          style: { width: '100%', height: '100%', border: 0, display: 'block' }
        });
      }

            ),
            h(
              'div',
              {
                className: 'h-[623px] p-5',
                style: { background: 'var(--surface-muted)' }
              },
              tab === 'preview'
                ? h(
                    'div',
                    {
                      className: cn(
                        'preview-frame-shell h-full overflow-hidden shadow-sm',
                        activePreset.width && 'is-mobile',
                        colorScheme && 'is-dark-scheme'
                      ),
                      style: {
                        border: '1px solid var(--border)',
                        borderRadius: 'var(--radius)',
                        width: activePreset.width ? activePreset.width + 'px' : '100%'
                      },
                    },
                    h(PreviewIframe, { html: previewHtml, title: t.name })
                  )
                : h(CodeBlock, { code: source, fileName: sourceFileName, lang: sourceLang })
            )
          )
        );
      }

      function App() {
        const [dark, setDark] = useState(false);
        const [cards, setCards] = useState([]);
        const [selectedId, setSelectedId] = useState(null);
        const [focusTarget, setFocusTarget] = useState(null);
        const [zoom, setZoom] = useState(100);
        const [isZoomKeyDown, setIsZoomKeyDown] = useState(false);
        const [isAltDown, setIsAltDown] = useState(false);
        const canvasRef = useRef(null);
        const cardNodes = useRef(new Map());
        const canvasInitialized = useRef(false);
        const preserveSelectionPosition = useRef(null);
        const previousCardCount = useRef(0);

        const selected = cards.find((c) => c.id === selectedId) || null;

        useEffect(() => {
          document.documentElement.classList.toggle('dark', dark);
          document.documentElement.classList.toggle('light', !dark);
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
        }, [dark]);

        useLayoutEffect(() => {
          const frame = requestAnimationFrame(() => {
            const canvas = canvasRef.current;
            if (!canvas || canvasInitialized.current) return;

            canvas.scrollLeft = canvasOrigin;
            canvas.scrollTop = canvasOrigin;
            canvasInitialized.current = true;
          });

          return () => cancelAnimationFrame(frame);
        }, []);

        useEffect(() => {
          function handleKeyDown(event) {
            setIsAltDown(event.altKey);
            if (isZoomKey(event)) setIsZoomKeyDown(true);
          }
          function handleKeyUp(event) {
            setIsAltDown(event.altKey);
            if (isZoomKey(event)) setIsZoomKeyDown(false);
          }
          function handleBlur() {
            setIsZoomKeyDown(false);
            setIsAltDown(false);
          }

          window.addEventListener('keydown', handleKeyDown);
          window.addEventListener('keyup', handleKeyUp);
          window.addEventListener('blur', handleBlur);

          return () => {
            window.removeEventListener('keydown', handleKeyDown);
            window.removeEventListener('keyup', handleKeyUp);
            window.removeEventListener('blur', handleBlur);
          };
        }, []);

        useLayoutEffect(() => {
          if (!focusTarget) {
            previousCardCount.current = cards.length;
            return;
          }

          const frame = requestAnimationFrame(() => {
            const canvas = canvasRef.current;
            const card = cardNodes.current.get(focusTarget.id);
            if (!canvas || !card) return;

            const canvasRect = canvas.getBoundingClientRect();
            const explorerRect = document
              .getElementById('templates-window')
              ?.getBoundingClientRect();
            const leftEdge = explorerRect ? explorerRect.right : canvasRect.left;
            const rightEdge = canvasRect.right;
            const workspaceCenter =
              rightEdge > leftEdge
                ? leftEdge + (rightEdge - leftEdge) / 2
                : canvasRect.left + canvasRect.width / 2;
            const cardRect = card.getBoundingClientRect();
            const cardCenter = cardRect.left + cardRect.width / 2;

            canvas.scrollTo({
              left: canvas.scrollLeft + cardCenter - workspaceCenter,
              top: canvas.scrollTop,
              behavior: previousCardCount.current === 0 ? 'auto' : 'smooth'
            });
            previousCardCount.current = cards.length;
          });

          return () => cancelAnimationFrame(frame);
        }, [focusTarget, cards.length]);

        useLayoutEffect(() => {
          const preserved = preserveSelectionPosition.current;
          if (!preserved) return;

          const frame = requestAnimationFrame(() => {
            const canvas = canvasRef.current;
            const card = cardNodes.current.get(preserved.id);
            if (!canvas || !card) return;

            const cardRect = card.getBoundingClientRect();
            const cardCenter = cardRect.left + cardRect.width / 2;
            canvas.scrollTo({
              left: canvas.scrollLeft + cardCenter - preserved.center,
              top: canvas.scrollTop,
              behavior: 'auto'
            });
            preserveSelectionPosition.current = null;
          });

          return () => cancelAnimationFrame(frame);
        }, [cards]);

        function setCardNode(id, node) {
          if (node) {
            cardNodes.current.set(id, node);
          } else {
            cardNodes.current.delete(id);
          }
        }

        function focusCard(id, behavior) {
          setSelectedId(id);
          setFocusTarget({ behavior: behavior || 'auto', id, time: Date.now() });
        }
        function focusTemplate(templateId) {
          const existing = cards.find((card) => card.templateId === templateId);
          if (existing) {
            focusCard(existing.id, 'auto');
            return;
          }

          const id = templateId + '-' + Date.now() + '-' + Math.random().toString(16).slice(2);
          const next = { id, templateId };
          labStore.getState().ensureCard(id);
          setCards((cs) => [...cs, next]);
          focusCard(id, cards.length === 0 ? 'auto' : 'smooth');
        }
        function remove(id) {
          labStore.getState().removeCard(id);
          setCards((cs) => cs.filter((c) => c.id !== id));
          if (selectedId && selectedId !== id) {
            preserveSelectionPosition.current = null;
            setFocusTarget({ behavior: 'auto', id: selectedId, time: Date.now() });
            return;
          }

          if (selectedId === id) {
            setSelectedId(null);
            setFocusTarget(null);
            preserveSelectionPosition.current = null;
          }
        }
        function handleCanvasClickCapture(event) {
          if (!isZoomKeyDown) return;

          event.preventDefault();
          event.stopPropagation();
          const direction = event.altKey || isAltDown ? -1 : 1;
          setZoom((value) => nextZoom(value, direction));
        }
        function handleCanvasMouseMove(event) {
          if (isZoomKeyDown && event.altKey !== isAltDown) setIsAltDown(event.altKey);
          event.currentTarget.style.setProperty('--grid-x', event.clientX + 'px');
          event.currentTarget.style.setProperty('--grid-y', event.clientY + 'px');
        }
        function handleCanvasMouseLeave(event) {
          event.currentTarget.style.setProperty('--grid-x', '-999px');
          event.currentTarget.style.setProperty('--grid-y', '-999px');
        }
        return h(
          'div',
          {
            className: 'min-h-screen bg-white text-black dark:bg-black dark:text-white'
          },
          h(Header, { dark, setDark, zoom, setZoom }),
          h(Explorer, {
            focusTemplate,
            selectedTemplateId: selected ? selected.templateId : null
          }),
          selected &&
            h(ToolPanel, {
              cardId: selected.id,
              template: templates.find((template) => template.id === selected.templateId)
            }),
          h(
            'main',
            {
              ref: canvasRef,
              onClickCapture: handleCanvasClickCapture,
              onMouseLeave: handleCanvasMouseLeave,
              onMouseMove: handleCanvasMouseMove,
              className: 'canvas-grid h-screen overflow-auto px-8 pb-16 pt-[88px]',
              style: {
                cursor: isZoomKeyDown ? (isAltDown ? 'zoom-out' : 'zoom-in') : 'auto'
              }
            },
            h(
              'div',
              {
                className: 'mr-16 origin-top-left transition-transform',
                style: {
                  marginLeft: canvasOrigin + 366 + 'px',
                  marginTop: canvasOrigin + 'px',
                  minHeight: canvasOrigin * 2 + 2400 + 'px',
                  transform: 'scale(' + zoom / 100 + ')',
                  width: canvasOrigin * 2 + 'px'
                }
              },
              cards.length === 0
                ? h(
                    'div',
                    {
                      className: 'mt-24 flex h-[520px] items-center justify-center border backdrop-blur-sm',
                      style: {
                        background: 'color-mix(in srgb, var(--surface-raised) 88%, transparent)',
                        borderColor: 'var(--border-soft)',
                        borderRadius: 'var(--radius)',
                        boxShadow:
                          '0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.08)',
                        color: 'var(--text)',
                        width: 'var(--card-width)'
                      }
                    },
                    h(
                      'div',
                      {
                        className: 'max-w-md rounded-[6px] border p-8',
                        style: {
                          background: 'var(--surface)',
                          borderColor: 'var(--border)',
                          boxShadow:
                            '0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.08)'
                        }
                      },
                      h(
                        'h2',
                        { className: 'font-medium', style: { color: 'var(--text-strong)' } },
                        'jsx-email Preview'
                      ),
                      h(
                        'p',
                        { className: 'mb-4 mt-2 text-sm leading-6', style: { color: 'var(--text)' } },
                        'Start creating an email template by running ',
                        h(
                          'code',
                          {
                            className: 'docs-inline-code'
                          },
                          'email create <template-name>'
                        ),
                        h('br'),
                        h('br'),
                        'Run ',
                        h(
                          'code',
                          {
                            className: 'docs-inline-code'
                          },
                          'email help create'
                        ),
                        ' for a list of options',
                        h('br'),
                        h('br'),
                        'Happy coding!'
                      ),
                      h(
                        'a',
                        {
                          className:
                            'inline-flex h-10 items-center justify-center rounded-[6px] px-4 text-sm font-medium',
                          href: 'https://jsx.email/docs/introduction',
                          rel: 'noreferrer',
                          target: '_blank',
                          style: {
                            background: 'var(--control-active)',
                            color: 'var(--control-active-text)'
                          }
                        },
                        'Read our Documentation'
                      )
                    )
                  )
                : h(
                    'div',
                    {
                      className: 'inline-flex flex-nowrap items-start gap-6',
                      style: { paddingRight: '340vw' }
                    },
                    cards.map((card) =>
                      h(TemplateCard, {
                        key: card.id,
                        card,
                        selected,
                        select: (c) => focusCard(c.id),
                        remove,
                        setCardNode
                      })
                    )
                  )
            )
          )
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(h(App));
    </script>
  </body>
</html>
