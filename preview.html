        mask-image: radial-gradient(

          rgba(0, 0, 0, 0.18) 78%,

          rgba(0, 0, 0, 0.18) 78%,
          transparent 100%

        right: 0;
        top: 0;

        border: 1px solid transparent;

        font-size: 13px;

        color: var(--text-strong);

        gap: 2px;

        font-size: 12px;
        font-weight: 500;
        height: 28px;
        justify-content: center;
        line-height: 1;
        min-width: 54px;
        padding: 0 9px;

      .card-tab:hover {
        color: var(--text-strong);

        font-family: inherit;
        font-size: inherit;
        line-height: inherit;
        margin: 0;
        overflow: visible;
        padding: 0;

        position: relative;
      }

        display: inline-flex;
        gap: 6px;
        opacity: 1;
        pointer-events: auto;
        position: absolute;
        right: 12px;
        top: 12px;
        z-index: 2;
      }
      .code-action {

        background: color-mix(in srgb, var(--surface-raised) 92%, transparent);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text-subtle);
        display: inline-flex;
        height: 30px;
        justify-content: center;
        width: 30px;

      .code-action:hover {
        background: var(--control-hover);
        color: var(--text-strong);
      }

        background: #fafafa;
        padding: 3px 4px;
        font-size: 13px;
        color: #0a0a0a;
        line-height: normal;
        font-family: Menlo, ui-monospace, SFMono-Regular, Monaco, Consolas, Liberation Mono, monospace;

        background-color: #1a1a1a;
        border-color: #292929;
        color: #c4c5c6;
      }

        border-left: 1px solid var(--tree-line);
        margin-left: 10px;
        padding-left: 10px;
      }
      .tree-row {
        align-items: center;
        border-radius: var(--radius);
        color: var(--text);
        display: flex;
        gap: 7px;
        min-height: 28px;
        padding: 4px 6px;
        text-align: left;
        width: 100%;
      }
      .tree-row:hover {
        background: var(--control-hover);
        color: var(--text-strong);
      }
      .tree-row.is-active {
        background: var(--tree-active-bg);
        color: var(--text-strong);
        font-weight: 500;
      }
      .tree-children {
        max-height: 1800px;
        opacity: 1;
        overflow: hidden;
        transition: max-height 180ms ease, opacity 180ms ease;
      }
      .tree-children.is-collapsed {
        max-height: 0;
        opacity: 0;

        animation: panel-arrow-pop 220ms ease;
      }

          transform: scale(1) rotate(0deg);
        }

          transform: scale(0.82) translateY(-1px);
        }
        100% {
          transform: scale(1) rotate(0deg);
        }

        color: var(--text-subtle);
        font-size: 15px;

        padding: 2px;

        background: var(--surface-raised);

        height: 16px;

n                        <p style=\"font-size:14px;line-height:24px;margin:16px 0\"><a href=\"https://airbnb.com/help/article/1257\" style=\"color:#ff5a5f;text-decoration:none;font-size:18px;line-height:1.4;display:block\">How do star ratings work?</a></p>\n                        <p style=\"font-size:14px;line-height:24px;margin:16px 0\"><a href=\"https://airbnb.com/help/article/995\" style=\"color:#ff5a5f;text-decoration:none;font-size:18px;line-height:1.4;display:block\">Can I leave a review after 14 days?</a></p>\n                        <hr style=\"border:none;border-top:1px solid #eaeaea;width:100%;border-color:#cccccc;margin:20px 0\">\n                        <p style=\"font-size:14px;line-height:24px;margin:16px 0;color:#9ca299;margin-bottom:10px\">Airbnb, Inc., 888 Brannan St, San Francisco, CA 94103</p><a href=\"https://airbnb.com\" style=\"color:#9ca299;text-decoration:underline;font-size:14px\">Report unsafe behavior</a>\n                        <table align=\"center\" width=\"100%\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\" border=\"0\">\n                          <tbody style=\"width:100%\">\n                            <tr style=\"width:100%\"></tr>\n                          </tbody>\n                        </table>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n              </div>\n            </div>\n          </td>\n        </tr>\n      </tbody>\n    </table><span><!--[if mso]></td></tr></table><![endif]--></span>\n  </body>\n\n</html>",

#9ca299',\n  fontSize: '14px',\n  marginBottom: '10px'\n};\n\nexport const Template = ({ authorName, authorImage, reviewText }: AirbnbReviewEmailProps) => {\n  const previewText = `Read ${authorName}'s review`;\n\n  return (\n    <Html>\n      <Head />\n      <Preview>{previewText}</Preview>\n\n      <Body style={main}>\n        <Section style={main}>\n          <Container style={container}>\n            <Section>\n              <Img src={`${baseUrl}airbnb-logo.png`} width=\"96\" height=\"30\" alt=\"Airbnb\" />\n            </Section>\n            <Section>\n              <Img src={authorImage} width=\"96\" height=\"96\" alt={authorName} style={userImage} />\n            </Section>\n            <Section style={{ paddingBottom: '20px' }}>\n              <Row>\n                <Text style={heading}>Here's what {authorName} wrote</Text>\n                <Text style={review}>{reviewText}</Text>\n                <Text style={paragraph}>\n                  Now that the review period is over, weвҖҷve posted {authorName}\n                  вҖҷs review to your Airbnb profile.\n                </Text>\n                <Text style={{ ...paragraph, paddingBottom: '16px' }}>\n                  While itвҖҷs too late to write a review of your own, you can send your feedback to{' '}\n                  {authorName} using your Airbnb message thread.\n                </Text>\n                <Button\n                  width={300}\n                  height={60}\n                  align=\"center\"\n                  backgroundColor={'#ff5a5f'}\n                  borderRadius={3}\n                  textColor=\"#fff\"\n                  fontSize={18}\n                  href=\"https://airbnb.com/\"\n                >\n                  Send My Feedback\n                </Button>\n              </Row>\n            </Section>\n\n            <Hr style={hr} />\n\n            <Section>\n              <Row>\n                <Text style={{ ...paragraph, fontWeight: '700' }}>Common questions</Text ted States.\n\nApple Card is issued by Goldman Sachs Bank USA, Salt Lake City Branch.\n\nIf you reside in the US territories, please call Goldman Sachs at 877-255-5923\nwith questions about Apple Card.\n\nPrivacy: We use a Subscriber ID http://support.apple.com/kb/HT207233to provide\nreports to developers.\n\nGet help with subscriptions and purchases.Visit Apple Support.\nhttps://support.apple.com/billing?cid=email_receipt\n\nLearn how to manage your password preferences\nhttps://support.apple.com/kb/HT204030?cid=email_receipt_itunes_article_HT204030\nfor iTunes, Apple Books, and App Store purchases.\n\nYou have the option to stop receiving email receipts for your subscription\nrenewals. If you have opted out, you can still view your receipts in your\naccount under Purchase History. To manage receipts or to opt in again, go to\nAccount Settings.\nhttps://finance-app.itunes.apple.com/account/subscriptions?unsupportedRedirectUrl=https://apps.apple.com/US/invoice\n\n\n\nAccount Settings\nhttps://buy.itunes.apple.com/WebObjects/MZFinance.woa/wa/accountSummary?mt=8 вҖў\nTerms of Sale https://www.apple.com/legal/itunes/us/sales.html вҖў Privacy Policy\nhttps://www.apple.com/legal/privacy/\n\nCopyright В© 2023 Apple Inc.\nAll rights reserved https://www.apple.com/legal/",

\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n      <tbody>\n        <tr>\n          <td><img alt=\"codepen\" src=\"https://jsx.email/assets/demo/codepen-challengers.png\" width=\"600\" style=\"border:none;display:block;outline:none;text-decoration:none;margin:auto\"></td>\n        </tr>\n      </tbody>\n    </table>\n    <div style=\"table-layout:fixed;width:100%\">\n      <div style=\"margin:0 auto;max-width:600px\"><span><!--[if mso]><table align=\"center\" width=\"600\" style=\"border-spacing: 0; width:600px;\" role=\"presentation\"><tr><td><![endif]--></span>\n        <table align=\"center\" width=\"100%\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\" border=\"0\" style=\"max-width:648px;padding-left:12px;padding-right:12px;margin:0 auto;width:648px;position:relative\">\n          <tbody>\n            <tr style=\"width:100%\">\n              <td align=\"center\">\n                <p style=\"font-size:13px;line-height:24px;margin:0 0 16px 0;background-color:#505050;text-align:center;padding:10px 0 25px 0;position:absolute;width:100%;max-width:648px;top:-28px\"><a style=\"color:#fff;text-decoration:none;cursor:pointer\">View this Challenge on CodePen</a></p>\n                <h1 style=\"background:#f0d361;padding:30px;color:#191919;font-weight:400;margin-bottom:0\"><strong>This week:</strong> #CodePenChallenge: <p style=\"font-size:32px;line-height:24px;margin:4px 0 0 0\">Cubes</p>\n                </h1>\n                <table align=\"center\" width=\"100%\" style=\"margin:0;background:#fff;padding:0 24px\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <p style=\"font-size:16px;line-height:24px;margin:16px 0\">The Shape challenge continues!</p>\n                        <p style=\"font-size:16px;line-height:24px;margin:16px 0\">Last week, we kicked things off with round shapes. We \"rounded\" up the Pens from week one in our <a style=\"color:#15c;text-decoration:none;cursor:pointer\">#CodePenChallenge: Round</a> collection.</p>\n                        <p style=\"font-size:16px;line-height:24px;margin:16px 0\">This week, we move on to cubes рҹ§Ҡ</p>\n                        <p style=\"font-size:16px;line-height:24px;margin:16px 0\">Creating cubes in the browser is all about mastery of illusion. Take control of perspective and shadows and you can make the magic of 3D on a flat screen рҹ§ҷ</p>\n                        <p style=\"font-size:16px;line-height:24px;margin:16px 0\">This week is a fun chance to work on your CSS shape-building skills, or dig into a 3D JavaScript library like Three.js.</p>\n                        <p style=\"font-size:16px;line-height:24px;margin:16px 0\">This week's starter template features an ice cube emoji to help inspire a \"cool\" idea for your Pen. As always, the template is just as jumping off point. Feel free to incorporate the рҹ§Ҡ in your creation, add more elements, or freeze it out completely and start over from scratch!</p>\n                        <p style=\"font-size:16px;line-height:24px;margin:0 0 40px 0;border:6px solid #ebd473;padding:20px\">рҹ’Ә <strong>Your Challenge:</strong> <a style=\"color:#15c;text-decoration:none;cursor:pointer\">create a Pen that includes cube shapes.</a></p><img alt=\"codepen\" src=\"https://jsx.email/assets/demo/codepen-cube.png\" width=\"600\" style=\"border:none;display:block;outline:none;text-decoration:none\">\n                        <table align=\"center\" width=\"100%\" style=\"margin-top:40px;margin-bottom:24px;text-align:center;background:#0b112a;color:#fff;padding:35px 20px 30px 20px;border:6px solid #2138c6\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                          <tbody>\n                            <tr>\n                              <td><img alt=\"codepen\" src=\"https://jsx.email/assets/demo/codepen-pro.png\" width=\"250\" style=\"border:none;display:block;outline:none;text-decoration:none;margin:0 auto 30px auto\">\n                                <p style=\"font-size:14px;line-height:24px;margin:16px 0\">CodePen PRO combines a bunch of features that can help any front-end designer or developer at any experience level.</p>\n                                <table width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-collapse:collapse\" role=\"presentation\">\n                                  <tbody>\n                                    <tr>\n                                      <td align=\"left\"><span><!--[if mso]>\n            <v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" style=\"height:42px;v-text-anchor:middle;width:108px;\" arcsize=\"0%\"  strokeweight=\"1px\" fillcolor=#2138c6>\n            <w:anchorlock/>\n            <center style=\"font-size:15px;color:#fff;\">\n            [object Object]\n            </center></v:roundrect>\n            <![endif]--></span><a style=\"-webkit-text-size-adjust:none;border-radius:0;display:inline-block;font-size:15px;line-height:40px;max-width:108px;text-align:center;text-decoration:none;width:100%;background-color:#2138c6;color:#fff;mso-hide:all\"><strong>Learn More</strong></a></td>\n                                    </tr>\n                                  </tbody>\n                                </table>\n                              </td>\n                            </tr>\n                          </tbody>\n                        </table>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n                <p style=\"font-size:18px;line-height:1.5;margin:16px 0;background:#f5d247;padding:30px\"><strong>To participate:</strong> <a style=\"color:#15c;text-decoration:none;cursor:pointer\">Create a Pen вҶ’</a> and tag it <a style=\"color:#15c;text-decoration:none;cursor:pointer\"><strong>codepenchallenge</strong></a> and<a style=\"color:#15c;text-decoration:none;cursor:pointer\"> <strong>cpc-cubes</strong></a>. We'll be watching and gathering the Pens into a Collection, and sharing on <a style=\"color:#15c;text-decoration:none;cursor:pointer\">Twitter</a> and <a style=\"color:#15c;text-decoration:none;cursor:pointer\">Instagram</a> (Use the #CodePenChallenge tag on Twitter and Instagram as well).</p>\n                <table align=\"center\" width=\"100%\" style=\"margin:0;background:#fff;padding:0 24px\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <table align=\"center\" width=\"100%\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\" border=\"0\">\n                          <tbody style=\"width:100%\">\n                            <tr style=\"width:100%\">\n                              <td style=\"width:50%;padding-right:10px\">\n                                <p style=\"font-size:18px;line-height:1.1;margin:16px 0;font-weight:900\">IDEAS!</p>\n                                <table align=\"center\" width=\"100%\" style=\"padding:20px;margin:0 0 20px 0;border-radius:10px;font-size:36px;text-align:center;background:#fff4c8;border:1px solid #f4d247\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                                  <tbody>\n                                    <tr>\n                                      <td>рҹҢҹ<p style=\"font-size:13px;line-height:24px;margin:16px 0;text-align:left\">This week we move from 2 dimensions to three! Maybe you could exercise your <a style=\"color:#15c;text-decoration:none;cursor:pointer\">perspective</a> in CSS to create a 3D cube. Or, you can try out creating 3D shapes in JavaScript, using <a style=\"color:#15c;text-decoration:none;cursor:pointer\">WebGL</a> or building a <a style=\"color:#15c;text-decoration:none;cursor:pointer\">Three.js scene</a>.</p>\n                                      </td>\n                                    </tr>\n                                  </tbody>\n                                </table>\n                                <table align=\"center\" width=\"100%\" style=\"padding:20px;margin:0 0 20px 0;border-radius:10px;font-size:36px;text-align:center;background:#fff4c8;border:1px solid #f4d247\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                                  <tbody>\n                                    <tr>\n                                      <td>рҹҢҹ<p style=\"font-size:13px;line-height:24px;margin:16px 0;text-align:left\">There's more to cubes than just six square sides. There are variations on the cube that could be fun to play with this week: <a style=\"color:#15c;text-decoration:none;cursor:pointer\">cuboid shapes</a> are hexahedrons with faces that aren't always squares. And if you want to really push the boundaries of shape, consider the 4 dimensional <a style=\"color:#15c;text-decoration:none;cursor:pointer\">tesseract!</a></p>\n                                      </td>\n                                    </tr>\n                                  </tbody>\n                                </table>\n                                <table align=\"center\" width=\"100%\" style=\"padding:20px;margin:0 0 20px 0;border-radius:10px;font-size:36px;text-align:center;background:#fff4c8;border:1px solid #f4d247\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                                  <tbody>\n                                    <tr>\n                                      <td>рҹҢҹ<p style=\"font-size:13px;line-height:24px;margin:16px 0;text-align:left\">Here's a mind-bending idea that can combine the round shapes from week one with this week's cube theme: <a style=\"color:#15c;text-decoration:none;cursor:pointer\">Spherical Cubes</a> рҹҳі Solving longstanding mathematical mysteries is probably outside the scope of a CodePen challenge, but you could use front-end tools to explore fitting spheres into cubes, or vice-versa.</p>\n                                      </td>\n                                    </tr>\n                                  </tbody>\n                                </table>\n                              </td>\n                              <td style=\"width:50%;padding-left:10px\">\n                                <p style=\"font-size:18px;line-height:1.1;margin:16px 0;font-weight:900;margin-top:-40px\">RESOURCES!</p>\n                                <table align=\"center\" width=\"100%\" style=\"padding:20px;margin:0 0 20px 0;border-radius:10px;font-size:36px;text-align:center;background:#d9f6ff;border:1px solid #92bfd0\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                                  <tbody>\n                                    <tr>\n                                      <td>рҹ“–<p style=\"font-size:13px;line-height:24px;margin:16px 0;text-align:left\">Learn all about <a style=\"color:#15c;text-decoration:none;cursor:pointer\">How CSS Perspective Works</a> and how to build a 3D CSS cube from scratch in Amit Sheen's in-depth tutorial for CSS-Tricks. Or, check out stunning examples of WebGL cubes from Matthias Hurrle: <a style=\"color:#15c;text-decoration:none;cursor:pointer\">Just Ice</a> and <a style=\"color:#15c;text-decoration:none;cursor:pointer\">Posing</a>.</p>\n                                      </td>\n                                    </tr>\n                                  </tbody>\n                                </table>\n                                <table align=\"center\" width=\"100%\" style=\"padding:20px;margin:0 0 20px 0;border-radius:10px;font-size:36px;text-align:center;background:#d9f6ff;border:1px solid #92bfd0\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                                  <tbody>\n                                    <tr>\n                                      <td>рҹ“–<p style=\"font-size:13px;line-height:24px;margin:16px 0;text-align:left\">Want to go beyond the square cube? Draw inspiration from EntropyReversed's <a style=\"color:#15c;text-decoration:none;cursor:pointer\">Pulsating Tesseract</a>, Josetxu's <a style=\"color:#15c;text-decoration:none;cursor:pointer\">Rainbow Cuboid Loader</a>, or Ana Tudor's <a style=\"color:#15c;text-decoration:none;cursor:pointer\">Pure CSS cuboid jellyfish</a>.</p>\n                                      </td>\n                                    </tr>\n                                  </tbody>\n                                </table>\n                                <table align=\"center\" width=\"100%\" style=\"padding:20px;margin:0 0 20px 0;border-radius:10px;font-size:36px;text-align:center;background:#d9f6ff;border:1px solid #92bfd0\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                                  <tbody>\n                                    <tr>\n                                      <td>рҹ“–<p style=\"font-size:13px;line-height:24px;margin:16px 0;text-align:left\">Did that spherical cubes concept pique your interest? Explore Ryan Mulligan's <a style=\"color:#15c;text-decoration:none;cursor:pointer\">Cube Sphere</a>, Munir Safi's <a style=\"color:#15c;text-decoration:none;cursor:pointer\">3D Sphere to Cube Animation With Virtual Trackball</a> and Ana Tudor's <a style=\"color:#15c;text-decoration:none;cursor:pointer\">Infinitely unpack prism</a> for more mindbending cube concepts that test the boundaries of how shapes interact with each other.</p>\n                                      </td>\n                                    </tr>\n                                  </tbody>\n                                </table>\n                              </td>\n                            </tr>\n                          </tbody>\n                        </table>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n                <table align=\"center\" width=\"100%\" style=\"margin:40px 0 120px 0;text-align:center\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <table width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-collapse:collapse\" role=\"presentation\">\n                          <tbody>\n                            <tr>\n                              <td align=\"left\"><span><!--[if mso]>\n            <v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" style=\"height:62px;v-text-anchor:middle;width:330px;\" arcsize=\"6%\"  strokeweight=\"1px\" fillcolor=#222>\n            <w:anchorlock/>\n            <center style=\"font-size:26px;\">\n            Go to Challenge Page\n            </center></v:roundrect>\n            <![endif]--></span><a style=\"-webkit-text-size-adjust:none;border-radius:4px;display:inline-block;font-size:26px;line-height:60px;max-width:330px;text-align:center;text-decoration:none;width:100%;background-color:#222;mso-hide:all\" color=\"#15c\">Go to Challenge Page</a></td>\n                            </tr>\n                          </tbody>\n                        </table>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n                <table align=\"center\" width=\"100%\" style=\"background:#fff;color:#505050;padding:0 24px;margin-bottom:48px\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <p style=\"font-size:13px;line-height:24px;margin:16px 0\">You can adjust your <a style=\"color:#505050;text-decoration:underline;cursor:pointer\">email preferences</a> any time, or <a style=\"color:#505050;text-decoration:underline;cursor:pointer\">instantly opt out</a> of emails of this kind. Need help with anything? Hit up <a style=\"color:#505050;text-decoration:underline;cursor:pointer\">support</a>.</p>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n              </td>\n            </tr>\n          </tbody>\n        </table><span><!--[if mso]></td></tr></table><![endif]--></span>\n      </div>\n    </div>\n  </body>\n\n</html>",

 '-40px',\n  fontSize: '18px'\n};\n\nconst ideasTitle = {\n  fontWeight: '900',\n  lineHeight: '1.1',\n  fontSize: '18px'\n};\n\nconst ideas = {\n  width: '50%',\n  paddingRight: '10px'\n};\n\nconst resources = {\n  width: '50%',\n  paddingLeft: '10px'\n};\n\nconst card = {\n  padding: '20px',\n  margin: '0 0 20px 0',\n  borderRadius: '10px',\n  fontSize: '36px',\n  textAlign: 'center' as const\n};\n\nconst yellowCard = {\n  ...card,\n  background: '#fff4c8',\n  border: '1px solid #f4d247'\n};\n\nconst blueCard = {\n  ...card,\n  background: '#d9f6ff',\n  border: '1px solid #92bfd0'\n};\n\nconst textCard = {\n  fontSize: '13px',\n  textAlign: 'left' as const\n};\n\nconst goToChallenge = {\n  margin: '40px 0 120px 0',\n  textAlign: 'center' as const\n};\n\nconst footer = {\n  background: '#fff',\n  color: '#505050',\n  padding: '0 24px',\n  marginBottom: '48px'\n};\n\nconst footerText = {\n  fontSize: '13px'\n};\n\nconst footerLink = {\n  textDecoration: 'underline',\n  color: '#505050',\n  cursor: 'pointer'\n};\n\nconst baseUrl = 'https://jsx.email/assets/demo/';\n\nexport const templateName = 'Codepen Challengers';\n\nexport const Template = () => (\n  <Html>\n    <Head />\n    <Preview>#CodePenChallenge: Cubes</Preview>\n    <Body style={main}>\n      <Section style={header}>\n        <Img\n          style={imgHeader}\n          src={`${baseUrl}codepen-challengers.png`}\n          width={600}\n          alt=\"codepen\"\n        />\n      </Section>\n      <Container style={container}>\n        <Text style={challengeLink}>\n          <Link style={link}>View this Challenge on CodePen</Link>\n        </Text>\n\n        <Heading style={heading}>\n          <strong>This week:</strong> #CodePenChallenge: <Text style={cubeText}>Cubes</Text>\n        </Heading>\n\n        <Section style={section}>\n          <Text style={text}>The Shape challenge continues!</Text>\n\n          <Text style={text}>\n            Last week, we kicked things off with round shapes. We \"rounded\" up the Pens from week\n            one in our <Link style={blueLink}>#CodePenChallenge: Round</Link> collection.\n          </Text>\n\n          <Text style={text}>This week, we move on to cubes рҹ§Ҡ</Text>\n\n          <Text style={text}>\n            Creating cubes in the browser is all about mastery of illusion. Take control of\n            perspective and shadows and you can make the magic of 3D on a flat screen рҹ§ҷ\n          </Text>\n\n          <Text style={text}>\n            This week is a fun chance to work on your CSS shape-building skills, or dig into a 3D\n            JavaScript library like Three.js.\n          </Text>\n\n          <Text style={text}>\n            This week's starter template features an ice cube emoji to help inspire a \"cool\" idea\n            for your Pen. As always, the template is just as jumping off point. Feel free to\n            incorporate the рҹ§Ҡ in your creation, add more elements, or freeze it out completely and\n            start over from scratch!\n          </Text>\n\n          <Text style={yourChallenge}>\n            рҹ’Ә <strong>Your Challenge:</strong>{' '}\n            <Link style={blueLink}>create a Pen that includes cube shapes.</Link>\n          </Text>\n\n          <Img src={`${baseUrl}codepen-cube.png`} width={600} alt=\"codepen\" />\n\n          <Section style={sectionPro}>\n            <Img style={imagePro} src={`${baseUrl}codepen-pro.png`} width={250} alt=\"codepen\" />\n\n            <Text>\n              CodePen PRO combines a bunch of features that can help any front-end designer or\n              developer at any experience level.\n            </Text>\n            <Button\n              height={42}\n              width={108}\n              textColor=\"#fff\"\n              fontSize={15}\n              backgroundColor=\"#2138c6\"\n            >\n              <strong>Learn More</strong>\n            </Button>\n          </Section>\n        </Section>\n\n        <Text style={yellowSection}>\n          <strong>To participate:</strong> <Link style={blueLink}>Create a Pen вҶ’</Link> and tag it{' '}\n          <Link style={blueLink}>\n            <strong>codepenchallenge</strong>\n          </Link>{' '}\n          and\n          <Link style={blueLink}>\n            {' '}\n            <strong>cpc-cubes</strong>\n          </Link>\n          . We'll be watching and gathering the Pens into a Collection, and sharing on{' '}\n          <Link style={blueLink}>Twitter</Link> and <Link style={blueLink}>Instagram</Link> (Use the\n          #CodePenChallenge tag on Twitter and Instagram as well).\n        </Text>\n\n        <Section style={section}>\n          <Row>\n            <Column style={ideas}>\n              <Text style={ideasTitle}>IDEAS!</Text>\n\n              <Section style={yellowCard}>\n                рҹҢҹ\n                <Text style={textCard}>\n                  This week we move from 2 dimensions to three! Maybe you could exercise your{' '}\n                  <Link style={blueLink}>perspective</Link> in CSS to create a 3D cube. Or, you can\n                  try out creating 3D shapes in JavaScript, using{' '}\n                  <Link style={blueLink}>WebGL</Link> or building a{' '}\n                  <Link style={blueLink}>Three.js scene</Link>.\n                </Text>\n              </Section>\n\n              <Section style={yellowCard}>\n                рҹҢҹ\n                <Text style={textCard}>\n                  There's more to cubes than just six square sides. There are variations on the cube\n                  that could be fun to play with this week:{' '}\n                  <Link style={blueLink}>cuboid shapes</Link> are hexahedrons with faces that aren't\n                  always squares. And if you want to really push the boundaries of shape, consider\n                  the 4 dimensional <Link style={blueLink}>tesseract!</Link>\n                </Text>\n              </Section>\n\n              <Section style={yellowCard}>\n                рҹҢҹ\n                <Text style={textCard}>\n                  Here's a mind-bending idea that can combine the round shapes from week one with\n                  this week's cube theme: <Link style={blueLink}>Spherical Cubes</Link> рҹҳі Solving\n                  longstanding mathematical mysteries is probably outside the scope of a CodePen\n                  challenge, but you could use front-end tools to explore fitting spheres into\n                  cubes, or vice-versa.\n                </Text>\n              </Section>\n            </Column>\n            <Column style={resources}>\n              <Text style={resourcesTitle}>RESOURCES!</Text>\n\n              <Section style={blueCard}>\n                рҹ“–\n                <Text style={textCard}>\n                  Learn all about <Link style={blueLink}>How CSS Perspective Works</Link> and how to\n                  build a 3D CSS cube from scratch in Amit Sheen's in-depth tutorial for CSS-Tricks.\n                  Or, check out stunning examples of WebGL cubes from Matthias Hurrle:{' '}\n                  <Link style={blueLink}>Just Ice</Link> and <Link style={blueLink}>Posing</Link>.\n                </Text>\n              </Section>\n\n              <Section style={blueCard}>\n                рҹ“–\n                <Text style={textCard}>\n                  Want to go beyond the square cube? Draw inspiration from EntropyReversed's{' '}\n                  <Link style={blueLink}>Pulsating Tesseract</Link>, Josetxu's{' '}\n                  <Link style={blueLink}>Rainbow Cuboid Loader</Link>, or Ana Tudor's{' '}\n                  <Link style={blueLink}>Pure CSS cuboid jellyfish</Link>.\n                </Text>\n              </Section>\n\n              <Section style={blueCard}>\n                рҹ“–\n                <Text style={textCard}>\n                  Did that spherical cubes concept pique your interest? Explore Ryan Mulligan's{' '}\n                  <Link style={blueLink}>Cube Sphere</Link>, Munir Safi's{' '}\n                  <Link style={blueLink}>3D Sphere to Cube Animation With Virtual Trackball</Link>{' '}\n                  and Ana Tudor's <Link style={blueLink}>Infinitely unpack prism</Link> for more\n                  mindbending cube concepts that test the boundaries of how shapes interact with\n                  each other.\n                </Text>\n              </Section>\n            </Column>\n          </Row>\n        </Section>\n\n        <Section style={goToChallenge}>\n          <Button\n            width={330}\n            height={62}\n            fontSize={26}\n            backgroundColor=\"#222\"\n            color=\"#15c\"\n            borderRadius={4}\n          >\n            Go to Challenge Page\n          </Button>\n        </Section>\n\n        <Section style={footer}>\n          <Text style={footerText}>\n            You can adjust your <Link style={footerLink}>email preferences</Link> any time, or{' '}\n            <Link style={footerLink}>instantly opt out</Link> of emails of this kind. Need help with\n            anything? Hit up <Link style={footerLink}>support</Link>.\n          </Text>\n        </Section>\n      </Container>\n    </Body>\n  </Html>\n);\n",

                "plain": "View this Challenge on CodePen\n\n\nTHIS WEEK: #CODEPENCHALLENGE:\n\nCUBES\n\nThe Shape challenge continues!\n\nLast week, we kicked things off with round shapes. We \"rounded\" up the Pens from\nweek one in our #CodePenChallenge: Round collection.\n\nThis week, we move on to cubes рҹ§Ҡ\n\nCreating cubes in the browser is all about mastery of illusion. Take control of\nperspective and shadows and you can make the magic of 3D on a flat screen рҹ§ҷ\n\nThis week is a fun chance to work on your CSS shape-building skills, or dig into\na 3D JavaScript library like Three.js.\n\nThis week's starter template features an ice cube emoji to help inspire a \"cool\"\nidea for your Pen. As always, the template is just as jumping off point. Feel\nfree to incorporate the рҹ§Ҡ in your creation, add more elements, or freeze it out\ncompletely and start over from scratch!\n\nрҹ’Ә Your Challenge: create a Pen that includes cube shapes.\n\nCodePen PRO combines a bunch of features that can help any front-end designer or\ndeveloper at any experience level.\n\nLearn More\n\nTo participate: Create a Pen вҶ’ and tag it codepenchallenge and cpc-cubes. We'll\nbe watching and gathering the Pens into a Collection, and sharing on Twitter and\nInstagram (Use the #CodePenChallenge tag on Twitter and Instagram as well).\n\nIDEAS!\n\nрҹҢҹ\n\nThis week we move from 2 dimensions to three! Maybe you could exercise your\nperspective in CSS to create a 3D cube. Or, you can try out creating 3D shapes\nin JavaScript, using WebGL or building a Three.js scene.\n\nрҹҢҹ\n\nThere's more to cubes than just six square sides. There are variations on the\ncube that could be fun to play with this week: cuboid shapes are hexahedrons\nwith faces that aren't always squares. And if you want to really push the\nboundaries of shape, consider the 4 dimensional tesseract!\n\nрҹҢҹ\n\nHere's a mind-bending idea that can combine the round shapes from week one with\nthis week's cube theme: Spherical Cubes рҹҳі Solving longstanding mathematical\nmysteries is probably outside the scope of a CodePen challenge, but you could\nuse front-end tools to explore fitting spheres into cubes, or vice-versa.\n\nRESOURCES!\n\nрҹ“–\n\nLearn all about How CSS Perspective Works and how to build a 3D CSS cube from\nscratch in Amit Sheen's in-depth tutorial for CSS-Tricks. Or, check out stunning\nexamples of WebGL cubes from Matthias Hurrle: Just Ice and Posing.\n\nрҹ“–\n\nWant to go beyond the square cube? Draw inspiration from EntropyReversed's\nPulsating Tesseract, Josetxu's Rainbow Cuboid Loader, or Ana Tudor's Pure CSS\ncuboid jellyfish.\n\nрҹ“–\n\nDid that spherical cubes concept pique your interest? Explore Ryan Mulligan's\nCube Sphere, Munir Safi's 3D Sphere to Cube Animation With Virtual Trackball and\nAna Tudor's Infinitely unpack prism for more mindbending cube concepts that test\nthe boundaries of how shapes interact with each other.\n\nGo to Challenge Page\n\nYou can adjust your email preferences any time, or instantly opt out of emails\nof this kind. Need help with anything? Hit up support.",

e align=\"center\" width=\"100%\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\" border=\"0\" style=\"max-width:600px;background-color:#ffffff;border:1px solid #f0f0f0;padding:45px\">\n          <tbody>\n            <tr style=\"width:100%\">\n              <td align=\"center\"><img alt=\"Dropbox\" src=\"https://jsx.email/assets/demo/dropbox-logo.png\" width=\"40\" height=\"33\" style=\"border:none;display:block;outline:none;text-decoration:none\">\n                <table align=\"center\" width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <p style=\"font-size:16px;line-height:26px;margin:16px 0;font-family:'Open Sans', 'HelveticaNeue-Light', 'Helvetica Neue Light', 'Helvetica Neue', Helvetica, Arial, 'Lucida Grande', sans-serif;font-weight:300;color:#404040\">Hi Bruce,</p>\n                        <p style=\"font-size:16px;line-height:26px;margin:16px 0;font-family:'Open Sans', 'HelveticaNeue-Light', 'Helvetica Neue Light', 'Helvetica Neue', Helvetica, Arial, 'Lucida Grande', sans-serif;font-weight:300;color:#404040\">Someone recently requested a password change for your Dropbox account. If this was you, you can set a new password here:</p>\n                        <table width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-collapse:collapse\" role=\"presentation\">\n                          <tbody>\n                            <tr>\n                              <td align=\"left\"><span><!--[if mso]>\n            <v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" style=\"height:42px;v-text-anchor:middle;width:210px;\" arcsize=\"9%\"  strokeweight=\"1px\" fillcolor=#007ee6>\n            <w:anchorlock/>\n            <center style=\"font-size:15px;color:#fff;\">\n            Reset password\n            </center></v:roundrect>\n            <![endif]--></span><a href=\"https://dropbox.com\" style=\"-webkit-text-size-adjust:none;border-radius:4px;display:inline-block;font-size:15px;line-height:40px;max-width:210px;text-align:center;text-decoration:none;width:100%;background-color:#007ee6;color:#fff;mso-hide:all\">Reset password</a></td>\n                            </tr>\n                          </tbody>\n                        </table>\n                        <p style=\"font-size:16px;line-height:26px;margin:16px 0;font-family:'Open Sans', 'HelveticaNeue-Light', 'Helvetica Neue Light', 'Helvetica Neue', Helvetica, Arial, 'Lucida Grande', sans-serif;font-weight:300;color:#404040\">If you don't want to change your password or didn't request this, just ignore and delete this message.</p>\n                        <p style=\"font-size:16px;line-height:26px;margin:16px 0;font-family:'Open Sans', 'HelveticaNeue-Light', 'Helvetica Neue Light', 'Helvetica Neue', Helvetica, Arial, 'Lucida Grande', sans-serif;font-weight:300;color:#404040\">To keep your account secure, please don't forward this email to anyone. See our Help Center for <a href=\"https://dropbox.com\" style=\"color:#067df7;text-decoration:underline\">more security tips.</a></p>\n                        <p style=\"font-size:16px;line-height:26px;margin:16px 0;font-family:'Open Sans', 'HelveticaNeue-Light', 'Helvetica Neue Light', 'Helvetica Neue', Helvetica, Arial, 'Lucida Grande', sans-serif;font-weight:300;color:#404040\">Happy Dropboxing!</p>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n              </td>\n            </tr>\n          </tbody>\n        </table><span><!--[if mso]></td></tr></table><![endif]--></span>\n      </div>\n    </div>\n  </body>\n\n</html>",
                "htmlFile": "credential emails/dropbox-reset-password.html",

                "jsx": "import { Body, Button, Container, Head, Html, Img, Link, Preview, Section, Text } from 'jsx-email';\n\ninterface DropboxResetPasswordEmailProps {\n  userFirstname?: string;\n  resetPasswordLink?: string;\n}\n\nconst main = {\n  backgroundColor: '#f6f9fc',\n  padding: '10px 0'\n};\n\nconst container = {\n  backgroundColor: '#ffffff',\n  border: '1px solid #f0f0f0',\n  padding: '45px'\n};\n\nconst text = {\n  fontSize: '16px',\n  fontFamily:\n    \"'Open Sans', 'HelveticaNeue-Light', 'Helvetica Neue Light', 'Helvetica Neue', Helvetica, Arial, 'Lucida Grande', sans-serif\",\n  fontWeight: '300',\n  color: '#404040',\n  lineHeight: '26px'\n};\n\nconst anchor = {\n  textDecoration: 'underline'\n};\n\nconst baseUrl = 'https://jsx.email/assets/demo/';\n\nexport const previewProps = {\n  userFirstname: 'Bruce',\n  resetPasswordLink: 'https://dropbox.com'\n} as DropboxResetPasswordEmailProps;\n\nexport const templateName = 'Dropbox Reset Password';\n\nexport const Template = ({ userFirstname, resetPasswordLink }: DropboxResetPasswordEmailProps) => {\n  return (\n    <Html>\n      <Head />\n      <Preview>Dropbox reset your password</Preview>\n      <Body style={main}>\n        <Container style={container}>\n          <Img src={`${baseUrl}dropbox-logo.png`} width=\"40\" height=\"33\" alt=\"Dropbox\" />\n          <Section>\n            <Text style={text}>Hi {userFirstname},</Text>\n            <Text style={text}>\n              Someone recently requested a password change for your Dropbox account. If this was\n              you, you can set a new password here:\n            </Text>\n            <Button\n              backgroundColor=\"#007ee6\"\n              borderRadius={4}\n              textColor=\"#fff\"\n              fontSize={15}\n              width={210}\n              height={42}\n              href={resetPasswordLink}\n            >\n              Reset password\n            </Button>\n            <Text style={text}>\n              If you don&apos;t want to change your password or didn&apos;t request this, just\n              ignore and delete this message.\n            </Text>\n            <Text style={text}>\n              To keep your account secure, please don&apos;t forward this email to anyone. See our\n              Help Center for{' '}\n              <Link style={anchor} href=\"https://dropbox.com\">\n                more security tips.\n              </Link>\n            </Text>\n            <Text style={text}>Happy Dropboxing!</Text>\n          </Section>\n        </Container>\n      </Body>\n    </Html>\n  );\n};\n",
                "name": "Dropbox Reset Password",
                "plain": "Hi Bruce,\n\nSomeone recently requested a password change for your Dropbox account. If this\nwas you, you can set a new password here:\n\nReset password https://dropbox.com\n\nIf you don't want to change your password or didn't request this, just ignore\nand delete this message.\n\nTo keep your account secure, please don't forward this email to anyone. See our\nHelp Center for more security tips. https://dropbox.com\n\nHappy Dropboxing!",
                "subject": "Dropbox Reset Password"

able align=\"center\" width=\"100%\" style=\"padding:24px;border:solid 1px #dedede;border-radius:5px;text-align:center\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <p style=\"font-size:14px;line-height:24px;margin:0 0 10px 0;text-align:left\">Hey <strong>Batman</strong>!</p>\n                        <p style=\"font-size:14px;line-height:24px;margin:0 0 10px 0;text-align:left\">A fine-grained personal access token (<a style=\"color:#067df7;text-decoration:none\">resend</a>) was recently added to your account.</p>\n                        <table width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-collapse:collapse\" role=\"presentation\">\n                          <tbody>\n                            <tr>\n                              <td align=\"left\"><span><!--[if mso]>\n            <v:roundrect xmlns:v=\"urn:schemas-microsoft-com:vml\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" style=\"height:42px;v-text-anchor:middle;width:152px;\" arcsize=\"19%\"  strokeweight=\"1px\" fillcolor=#28a745>\n            <w:anchorlock/>\n            <center style=\"font-size:14px;color:#fff;\">\n            View your token\n            </center></v:roundrect>\n            <![endif]--></span><a style=\"-webkit-text-size-adjust:none;border-radius:8px;display:inline-block;font-size:14px;line-height:40px;max-width:152px;text-align:center;text-decoration:none;width:100%;background-color:#28a745;color:#fff;mso-hide:all\">View your token</a></td>\n                            </tr>\n                          </tbody>\n                        </table>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n                <p style=\"font-size:14px;line-height:24px;margin:16px 0;text-align:center\"><a style=\"color:#0366d6;text-decoration:none;font-size:12px\">Your securi                 "id": "credential emails/github-access-token",
                "jsx": "import { Body, Button, Container, Head, Html, Img, Link, Preview, Section, Text } from 'jsx-email';\n\ninterface GithubAccessTokenEmailProps {\n  username?: string;\n}\n\nconst main = {\n  backgroundColor: '#ffffff',\n  color: '#24292e',\n  fontFamily:\n    '-apple-system,BlinkMacSystemFont,\"Segoe UI\",Helvetica,Arial,sans-serif,\"Apple Color Emoji\",\"Segoe UI Emoji\"'\n};\n\nconst container = {\n  width: '480px',\n  margin: '0 auto',\n  padding: '20px 0 48px'\n};\n\nconst title = {\n  fontSize: '24px',\n  lineHeight: 1.25\n};\n\nconst section = {\n  padding: '24px',\n  border: 'solid 1px #dedede',\n  borderRadius: '5px',\n  textAlign: 'center' as const\n};\n\nconst text = {\n  margin: '0 0 10px 0',\n  textAlign: 'left' as const\n};\n\nconst links = {\n  textAlign: 'center' as const\n};\n\nconst link = {\n  color: '#0366d6',\n  fontSize: '12px'\n};\n\nconst footer = {\n  color: '#6a737d',\n  fontSize: '12px',\n  textAlign: 'center' as const,\n  marginTop: '60px'\n};\n\nconst baseUrl = 'https://jsx.email/assets/demo/';\n\nexport const previewProps = {\n  username: 'Batman'\n} as GithubAccessTokenEmailProps;\n\nexport const templateName = 'Github Access Token';\n\nexport const Template = ({ username }: GithubAccessTokenEmailProps) => (\n  <Html>\n    <Head />\n    <Preview>A fine-grained personal access token has been added to your account</Preview>\n    <Body style={main}>\n      <Container style={container}>\n        <Img src={`${baseUrl}github.png`} width=\"32\" height=\"32\" alt=\"Github\" />\n\n        <Text style={title}>\n          <strong>@{username}</strong>, a personal access was created on your account.\n        </Text>\n\n        <Section style={section}>\n          <Text style={text}>\n            Hey <strong>{username}</strong>!\n          </Text>\n          <Text style={text}>\n            A fine-grained personal access token (<Link>resend</Link>) was recently added to your\n            account.\n          </Text>\n\n          <Button\n            width={152}\n            height={42}\n            fontSize={14}\n            backgroundColor=\"#28a745\"\n            textColor=\"#fff\"\n            borderRadius={8}\n          >\n            View your token\n          </Button>\n        </Section>\n        <Text style={links}>\n          <Link style={link}>Your security audit log</Link> гғ»{' '}\n          <Link style={link}>Contact support</Link>\n        </Text>\n\n        <Text style={footer}>\n          GitHub, Inc. гғ»88 Colin P Kelly Jr Street гғ»San Francisco, CA 94107\n        </Text>\n      </Container>\n    </Body>\n  </Html>\n);\n",

>\n    <Body style={main}>\n      <Container style={container}>\n        <Heading style={h1}>Login</Heading>\n        <Link\n          href=\"https://notion.so\"\n          target=\"_blank\"\n          style={{\n            ...link,\n            display: 'block',\n            marginBottom: '16px'\n          }}\n        >\n          Click here to log in with this magic link\n        </Link>\n        <Text style={{ ...text, marginBottom: '14px' }}>\n          Or, copy and paste this temporary login code:\n        </Text>\n        <code style={code}>{loginCode}</code>\n        <Text\n          style={{\n            ...text,\n            color: '#ababab',\n            marginTop: '14px',\n            marginBottom: '16px'\n          }}\n        >\n          If you didn&apos;t try to login, you can safely ignore this email.\n        </Text>\n        <Text\n          style={{\n            ...text,\n            color: '#ababab',\n            marginTop: '12px',\n            marginBottom: '38px'\n          }}\n        >\n          Hint: You can set a permanent password in Settings & members вҶ’ My account.\n        </Text>\n        <Img src={`${baseUrl}notion-logo.png`} width=\"32\" height=\"32\" alt=\"Notion's Logo\" />\n        <Text style={footer}>\n          <Link href=\"https://notion.so\" target=\"_blank\" style={{ ...link, color: '#898989' }}>\n            Notion.so\n          </Link>\n          , the all-in-one-workspace\n          <br />\n          for your notes, tasks, wikis, and databases.\n        </Text>\n      </Container>\n    </Body>\n  </Html>\n);\n",

                "jsx": "import {\n  Body,\n  Container,\n  Head,\n  Heading,\n  Hr,\n  Html,\n  Img,\n  Link,\n  Preview,\n  Section,\n  Text\n} from 'jsx-email';\n\ninterface RaycastMagicLinkEmailProps {\n  magicLink?: string;\n}\n\nconst main = {\n  backgroundColor: '#ffffff',\n  fontFamily:\n    '-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,Oxygen-Sans,Ubuntu,Cantarell,\"Helvetica Neue\",sans-serif'\n};\n\nconst container = {\n  margin: '0 auto',\n  padding: '20px 25px 48px',\n  backgroundImage: 'url(\"/assets/raycast-bg.png\")',\n  backgroundPosition: 'bottom',\n  backgroundRepeat: 'no-repeat, no-repeat'\n};\n\nconst heading = {\n  fontSize: '28px',\n  fontWeight: 'bold',\n  marginTop: '48px'\n};\n\nconst body = {\n  margin: '24px 0'\n};\n\nconst paragraph = {\n  fontSize: '16px',\n  lineHeight: '26px'\n};\n\nconst link = {\n  color: '#FF6363'\n};\n\nconst hr = {\n  borderColor: '#dddddd',\n  marginTop: '48px'\n};\n\nconst footer = {\n  color: '#8898aa',\n  fontSize: '12px',\n  marginLeft: '4px'\n};\n\nconst baseUrl = 'https://jsx.email/assets/demo/';\n\nexport const previewProps = {\n  magicLink: 'https://raycast.com'\n} as RaycastMagicLinkEmailProps;\n\nexport const templateName = 'Raycast Magic Link';\n\nexport const Template = ({ magicLink }: RaycastMagicLinkEmailProps) => (\n  <Html>\n    <Head />\n    <Preview>Log in with this magic link.</Preview>\n    <Body style={main}>\n      <Container style={container}>\n        <Img src={`${baseUrl}raycast-logo.png`} width={48} height={48} alt=\"Raycast\" />\n        <Heading style={heading}>рҹӘ„ Your magic link</Heading>\n        <Section style={body}>\n          <Text style={paragraph}>\n            <Link style={link} href={magicLink}>\n              рҹ‘ү Click here to sign in рҹ‘Ҳ\n            </Link>\n          </Text>\n          <Text style={paragraph}>If you didn't request this, please ignore this email.</Text>\n        </Section>\n        <Text style={paragraph}>\n          Best,\n          <br />- Raycast Team\n        </Text>\n        <Hr style={hr} />\n        <Img\n          src={`${baseUrl}raycast-logo.png`}\n          width={32}\n          height={32}\n          style={{\n            WebkitFilter: 'grayscale(100%)',\n            filter: 'grayscale(100%)',\n            margin: '20px 0'\n          }}\n        />\n        <Text style={footer}>Raycast Technologies Inc.</Text>\n        <Text style={footer}>2093 Philadelphia Pike #3222, Claymont, DE 19703</Text>\n      </Container>\n    </Body>\n  </Html>\n);\n",

tify-content:center;aling-items:center;padding:30px\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td><img src=\"https://jsx.email/assets/demo/twitch-logo.png\" width=\"114\" style=\"border:none;display:block;outline:none;text-decoration:none\"></td>\n                    </tr>\n                  </tbody>\n                </table>\n                <table align=\"center\" width=\"100%\" style=\"width:100%;display:flex\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <table align=\"center\" width=\"100%\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\" border=\"0\">\n                          <tbody style=\"width:100%\">\n                            <tr style=\"width:100%\">\n                              <td style=\"border-bottom:1px solid rgb(238,238,238);width:249px\"></td>\n                              <td style=\"border-bottom:1px solid rgb(145,71,255);width:102px\"></td>\n                              <td style=\"border-bottom:1px solid rgb(238,238,238);width:249px\"></td>\n                            </tr>\n                          </tbody>\n                        </table>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n                <table align=\"center\" width=\"100%\" style=\"padding:5px 50px 10px 60px\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <p style=\"font-size:14px;line-height:1.5;margin:16px 0\">Hi Batman,</p>\n                        <p style=\"font-size:14px;line-height:1.5;margin:16px 0\">You updated the password for your Twitch account on Jun 23, 2022, 12:06:00 PM. If this was you, then no further action is required.</p>\n                        <p style=\"font-size:14px;line-height:1.5;margin:16px 0\">However if you did NOT perform this password change, please <a href=\"#\" style=\"color:#067df7;text-decoration:underline\">reset your account password</a> immediately.</p>\n                        <p style=\"font-size:14px;line-height:1.5;margin:16px 0\">Remember to use a password that is both strong and unique to your Twitch account. To learn more about how to create a strong and unique password, <a href=\"#\" style=\"color:#067df7;text-decoration:underline\">click here.</a></p>\n                        <p style=\"font-size:14px;line-height:1.5;margin:16px 0\">Still have questions? Please contact <a href=\"#\" style=\"color:#067df7;text-decoration:underline\">Twitch Support</a></p>\n                        <p style=\"font-size:14px;line-height:1.5;margin:16px 0\">Thanks,<br>Twitch Support Team</p>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n              </td>\n            </tr>\n          </tbody>\n        </table><span><!--[if mso]></td></tr></table><![endif]--></span>\n      </div>\n    </div>\n    <table align=\"center\" width=\"100%\" style=\"width:580px;margin:0 auto\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n      <tbody>\n        <tr>\n          <td>\n            <table align=\"center\" width=\"100%\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\" border=\"0\">\n              <tbody style=\"width:100%\">\n                <tr style=\"width:100%\">\n                  <td align=\"right\" style=\"width:50%;padding-right:8px\"><img src=\"https://jsx.email/assets/demo/twitch-icon-twitter.png\" style=\"border:none;display:block;outline:none;text-decoration:none\"></td>\n                  <td align=\"left\" style=\"width:50%;padding-left:8px\"><img src=\"https://jsx.email/assets/demo/twitch-icon-facebook.png\" style=\"border:none;display:block;outline:none;text-decoration:none\"></td>\n                </tr>\n              </tbody>\n            </table>\n            <p style=\"font-size:14px;line-height:24px;margin:16px 0;text-align:center;color:#706a7b\">В© 2022 Twitch, All Rights Reserved <br>350 Bush Street, 2nd Floor, San Francisco, CA, 94104 - USA</p>\n            <table align=\"center\" width=\"100%\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\" border=\"0\">\n              <tbody style=\"width:100%\">\n                <tr style=\"width:100%\"></tr>\n              </tbody>\n            </table>\n          </td>\n        </tr>\n      </tbody>\n    </table>\n  </body>\n\n</html>",

                "jsx": "import {\n  Body,\n  Container,\n  Column,\n  Head,\n  Html,\n  Img,\n  Link,\n  Preview,\n  Row,\n  Section,\n  Text\n} from 'jsx-email';\n\ninterface TwitchResetPasswordEmailProps {\n  username?: string;\n  updatedDate?: Date;\n}\n\nconst fontFamily = 'HelveticaNeue,Helvetica,Arial,sans-serif';\n\nconst main = {\n  backgroundColor: '#efeef1',\n  fontFamily\n};\n\nconst paragraph = {\n  lineHeight: 1.5,\n  fontSize: 14\n};\n\nconst container = {\n  width: '580px',\n  margin: '30px auto',\n  backgroundColor: '#ffffff'\n};\n\nconst footer = {\n  width: '580px',\n  margin: '0 auto'\n};\n\nconst content = {\n  padding: '5px 50px 10px 60px'\n};\n\nconst logo = {\n  display: 'flex',\n  justifyContent: 'center',\n  alingItems: 'center',\n  padding: 30\n};\n\nconst sectionsBorders = {\n  width: '100%',\n  display: 'flex'\n};\n\nconst sectionBorder = {\n  borderBottom: '1px solid rgb(238,238,238)',\n  width: '249px'\n};\n\nconst sectionCenter = {\n  borderBottom: '1px solid rgb(145,71,255)',\n  width: '102px'\n};\n\nconst link = {\n  textDecoration: 'underline'\n};\n\nconst baseUrl = 'https://jsx.email/assets/demo/';\n\nexport const previewProps = {\n  username: 'Batman',\n  updatedDate: new Date('June 23, 2022 4:06:00 pm UTC')\n} as TwitchResetPasswordEmailProps;\n\nexport const templateName = 'Twitch Reset Password';\n\nexport const Template = ({ username, updatedDate }: TwitchResetPasswordEmailProps) => {\n  const formattedDate = new Intl.DateTimeFormat('en', {\n    dateStyle: 'medium',\n    timeStyle: 'medium'\n  }).format(updatedDate);\n\n  return (\n    <Html>\n      <Head />\n      <Preview>You updated the password for your Twitch account</Preview>\n      <Body style={main}>\n        <Container style={container}>\n          <Section style={logo}>\n            <Img width={114} src={`${baseUrl}twitch-logo.png`} />\n          </Section>\n          <Section style={sectionsBorders}>\n            <Row>\n              <Column style={sectionBorder} />\n              <Column style={sectionCenter} />\n              <Column style={sectionBorder} />\n            </Row>\n          </Section>\n          <Section style={content}>\n            <Text style={paragraph}>Hi {username},</Text>\n            <Text style={paragraph}>\n              You updated the password for your Twitch account on {formattedDate}. If this was you,\n              then no further action is required.\n            </Text>\n            <Text style={paragraph}>\n              However if you did NOT perform this password change, please{' '}\n              <Link href=\"#\" style={link}>\n                reset your account password\n              </Link>{' '}\n              immediately.\n            </Text>\n            <Text style={paragraph}>\n              Remember to use a password that is both strong and unique to your Twitch account. To\n              learn more about how to create a strong and unique password,{' '}\n              <Link href=\"#\" style={link}>\n                click here.\n              </Link>\n            </Text>\n            <Text style={paragraph}>\n              Still have questions? Please contact{' '}\n              <Link href=\"#\" style={link}>\n                Twitch Support\n              </Link>\n            </Text>\n            <Text style={paragraph}>\n              Thanks,\n              <br />\n              Twitch Support Team\n            </Text>\n          </Section>\n        </Container>\n\n        <Section style={footer}>\n          <Row>\n            <Column align=\"right\" style={{ width: '50%', paddingRight: '8px' }}>\n              <Img src={`${baseUrl}twitch-icon-twitter.png`} />\n            </Column>\n            <Column align=\"left\" style={{ width: '50%', paddingLeft: '8px' }}>\n              <Img src={`${baseUrl}twitch-icon-facebook.png`} />\n            </Column>\n          </Row>\n          <Row>\n            <Text style={{ textAlign: 'center', color: '#706a7b' }}>\n              В© 2022 Twitch, All Rights Reserved <br />\n              350 Bush Street, 2nd Floor, San Francisco, CA, 94104 - USA\n            </Text>\n          </Row>\n        </Section>\n      </Body>\n    </Html>\n  );\n};\n",
                "name": "Twitch Reset Password",
                "plain": "Hi Batman,\n\nYou updated the password for your Twitch account on Jun 23, 2022, 12:06:00 PM.\nIf this was you, then no further action is required.\n\nHowever if you did NOT perform this password change, please reset your account\npassword immediately.\n\nRemember to use a password that is both strong and unique to your Twitch\naccount. To learn more about how to create a strong and unique password, click\nhere.\n\nStill have questions? Please contact Twitch Support\n\nThanks,\nTwitch Support Team\n\nВ© 2022 Twitch, All Rights Reserved\n350 Bush Street, 2nd Floor, San Francisco, CA, 94104 - USA",
                "subject": "Twitch Reset Password"
        },

%\">\n      <div style=\"margin:0 auto;max-width:600px\"><span><!--[if mso]><table align=\"center\" width=\"600\" style=\"border-spacing: 0; width:600px;\" role=\"presentation\"><tr><td><![endif]--></span>\n        <table align=\"center\" width=\"100%\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\" border=\"0\" style=\"max-width:600px;margin:30px auto;width:610px;background-color:#fff;border-radius:5px;overflow:hidden\">\n          <tbody>\n            <tr style=\"width:100%\">\n              <td align=\"center\">\n                <table align=\"center\" width=\"100%\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <table align=\"center\" width=\"100%\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\" border=\"0\">\n                          <tbody style=\"width:100%\">\n                            <tr style=\"width:100%\">\n                              <td><img alt=\"Google Play developers header blue transparent\" src=\"https://jsx.email/assets/demo/google-play-header.png\" width=\"305\" height=\"28\" style=\"border:none;display:block;outline:none;text-decoration:none;margin-top:-1px\"><img alt=\"Google Play\" src=\"https://jsx.email/assets/demo/google-play-logo.png\" width=\"155\" height=\"31\" style=\"border:none;display:block;outline:none;text-decoration:none;padding:0 40px\"></td>\n                            </tr>\n                          </tbody>\n                        </table>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n                <table align=\"center\" width=\"100%\" style=\"padding:0 40px\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <hr style=\"border:none;border-top:1px solid #eaeaea;width:100%;border-color:#e8eaed;margin:20px 0\">\n                        <p style=\"font-size:14px;line-height:26px;margin:16px 0;font-weight:700;color:#004dcf\">DEVELOPER UPDATE</p>\n                        <p style=\"font-size:14px;line-height:22px;margin:16px 0;color:#3c4043\">Hello Google Play Developer,</p>\n                        <p style=\"font-size:14px;line-height:22px;margin:16px 0;color:#3c4043\">We strive to make Google Play a safe and trusted experience for users.</p>\n                        <p style=\"font-size:14px;line-height:22px;margin:16px 0;color:#3c4043\">We've added clarifications to our <a href=\"https://notifications.google.com\" style=\"color:#004dcf;text-decoration:none;font-size:14px;line-height:22px\">Target API Level policy</a>. Because this is a clarification, our enforcement standards and practices for this policy remain the same.</p>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n                <table align=\"center\" width=\"100%\" style=\"padding-left:40px\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <p style=\"font-size:14px;line-height:22px;margin:16px 0;color:#3c4043\">WeвҖҷre noting exceptions to the <a href=\"https://notifications.google.com\" style=\"color:#004dcf;text-decoration:none;font-size:14px;line-height:22px\">Target API Level policy</a>, which can be found in our updated <a href=\"https://notifications.google.com\" style=\"color:#004dcf;text-decoration:none;font-size:14px;line-height:22px\">Help Center article.</a>These exceptions include permanently private apps and apps that target automotive or wearables form factors and are bundled within the same package. <a href=\"https://notifications.google.com\" style=\"color:#004dcf;text-decoration:none;font-size:14px;line-height:22px\">Learn more</a></p>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n                <table align=\"center\" width=\"100%\" style=\"padding:0 40px\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <p style=\"font-size:14px;line-height:22px;margin:16px 0;color:#3c4043\">WeвҖҷre also extending the deadline to give you more time to adjust to these changes. Now, apps that target API level 29 or below will start experiencing reduced distribution starting <b>Jan 31, 2023</b> instead of Nov 1, 2022. If you need more time to update your app, you can request an extension to keep your app discoverable to all users until May 1, 2023.</p>\n                        <hr style=\"border:none;border-top:1px solid #eaeaea;width:100%;border-color:#e8eaed;margin:20px 0\">\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n                <table align=\"center\" width=\"100%\" style=\"padding:0 40px\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <p style=\"font-size:14px;line-height:22px;margin:16px 0;color:#3c4043\">Thank you,</p>\n                        <p style=\"font-size:20px;line-height:22px;margin:16px 0;color:#3c4043\">The Google Play team</p>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n                <table align=\"center\" width=\"100%\" style=\"background-color:#f0fcff;width:90%;border-radius:5px;overflow:hidden;padding-left:20px\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <p style=\"font-size:14px;line-height:22px;margin:16px 0;color:#3c4043\">Connect with us</p>\n                        <table align=\"center\" width=\"100%\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\" border=\"0\">\n                          <tbody style=\"width:100%\">\n                            <tr style=\"width:100%\"></tr>\n                          </tbody>\n                        </table>\n                        <table align=\"left\" width=\"100%\" style=\"width:84px;float:left\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\" border=\"0\">\n                          <tbody style=\"width:100%\">\n                            <tr style=\"width:100%\">\n                              <td style=\"padding-right:4px\"><a href=\"https://notifications.google.com\" style=\"color:#067df7;text-decoration:none\"><img src=\"https://jsx.email/assets/demo/google-play-chat.png\" width=\"28\" height=\"28\" style=\"border:none;display:block;outline:none;text-decoration:none\"></a></td>\n                              <td style=\"padding-right:4px\"><a href=\"https://notifications.google.com\" style=\"color:#067df7;text-decoration:none\"><img src=\"https://jsx.email/assets/demo/google-play-icon.png\" width=\"28\" height=\"28\" style=\"border:none;display:block;outline:none;text-decoration:none\"></a></td>\n                              <td style=\"padding-right:4px\"><a href=\"https://notifications.google.com\" style=\"color:#067df7;text-decoration:none\"><img src=\"https://jsx.email/assets/demo/google-play-academy.png\" width=\"28\" height=\"28\" style=\"border:none;display:block;outline:none;text-decoration:none\"></a></td>\n                            </tr>\n                          </tbody>\n                        </table><img src=\"https://jsx.email/assets/demo/google-play-footer.png\" width=\"540\" height=\"48\" style=\"border:none;display:block;outline:none;text-decoration:none\">\n                        <table align=\"center\" width=\"100%\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\" border=\"0\">\n                          <tbody style=\"width:100%\">\n                            <tr style=\"width:100%\"></tr>\n                          </tbody>\n                        </table>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n                <table align=\"center\" width=\"100%\" style=\"padding:0 40px;padding-bottom:30px\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" role=\"presentation\">\n                  <tbody>\n                    <tr>\n                      <td>\n                        <p style=\"font-size:12px;line-height:22px;margin:0;color:#3c4043;text-align:center\">В© 2022 Google LLC 1600 Amphitheatre Parkway, Mountain View, CA 94043, USA</p>\n                        <p style=\"font-size:12px;line-height:22px;margin:0;color:#3c4043;text-align:center\">You have received this mandatory email service announcement to update you about important changes to your Google Play Developer account.</p>\n                      </td>\n                    </tr>\n                  </tbody>\n                </table>\n              </td>\n            </tr>\n          </tbody>\n        </table><span><!--[if mso]></td></tr></table><![endif]--></span>\n      </div>\n    </div>\n  </body>\n\n</html>",
                "htmlFile": "google-play-policy-update.html",

             />\n            </Column>\n          </Row>\n        </Section>\n\n        <Section style={paragraphContent}>\n          <Hr style={hr} />\n          <Text style={heading}>DEVELOPER UPDATE</Text>\n          <Text style={paragraph}>Hello Google Play Developer,</Text>\n          <Text style={paragraph}>\n            We strive to make Google Play a safe and trusted experience for users.\n          </Text>\n          <Text style={paragraph}>\n            We've added clarifications to our{' '}\n            <Link href=\"https://notifications.google.com\" style={link}>\n              Target API Level policy\n            </Link>\n            . Because this is a clarification, our enforcement standards and practices for this\n            policy remain the same.\n          </Text>\n        </Section>\n        <Section style={paragraphList}>\n          <Text style={paragraph}>\n            WeвҖҷre noting exceptions to the{' '}\n            <Link href=\"https://notifications.google.com\" style={link}>\n              Target API Level policy\n            </Link>\n            , which can be found in our updated{' '}\n            <Link href=\"https://notifications.google.com\" style={link}>\n              Help Center article.\n            </Link>\n            These exceptions include permanently private apps and apps that target automotive or\n            wearables form factors and are bundled within the same package.{' '}\n            <Link href=\"https://notifications.google.com\" style={link}>\n              Learn more\n            </Link>\n          </Text>\n        </Section>\n        <Section style={paragraphContent}>\n          <Text style={paragraph}>\n            WeвҖҷre also extending the deadline to give you more time to adjust to these changes. Now,\n            apps that target API level 29 or below will start experiencing reduced distribution\n            starting <b>Jan 31, 2023</b> instead of Nov 1, 2022. If you need more time to update\n            your app, you can request an extension to keep your app discoverable to all users until\n            May 1, 2023.\n          </Text>\n          <Hr style={hr} />\n        </Section>\n\n        <Section style={paragraphContent}>\n          <Text style={paragraph}>Thank you,</Text>\n          <Text style={{ ...paragraph, fontSize: '20px' }}>The Google Play team</Text>\n        </Section>\n\n        <Section style={containerContact}>\n          <Row>\n            <Text style={paragraph}>Connect with us</Text>\n          </Row>\n          <Row\n            align=\"left\"\n            style={{\n              width: '84px',\n              float: 'left'\n            }}\n          >\n            <Column style={{ paddingRight: '4px' }}>\n              <Link href=\"https://notifications.google.com\">\n                <Img width=\"28\" height=\"28\" src={`${baseUrl}google-play-chat.png`} />\n              </Link>\n            </Column>\n            <Column style={{ paddingRight: '4px' }}>\n              <Link href=\"https://notifications.google.com\">\n                <Img width=\"28\" height=\"28\" src={`${baseUrl}google-play-icon.png`} />\n              </Link>\n            </Column>\n            <Column style={{ paddingRight: '4px' }}>\n              <Link href=\"https://notifications.google.com\">\n                <Img width=\"28\" height=\"28\" src={`${baseUrl}google-play-academy.png`} />\n              </Link>\n            </Column>\n          </Row>\n          <Row>\n            <Img width=\"540\" height=\"48\" src={`${baseUrl}google-play-footer.png`} />\n          </Row>\n        </Section>\n\n        <Section style={{ ...paragraphContent, paddingBottom: 30 }}>\n          <Text\n            style={{\n              ...paragraph,\n              fontSize: '12px',\n              textAlign: 'center',\n              margin: 0\n            }}\n          >\n            В© 2022 Google LLC 1600 Amphitheatre Parkway, Mountain View, CA 94043, USA\n          </Text>\n          <Text\n
