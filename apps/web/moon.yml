# https://moonrepo.dev/docs/config/tasks
$schema: 'https://moonrepo.dev/schemas/tasks.json'

workspace:
  inheritedTasks:
    exclude: ['build', 'compile', 'release', 'test']

tasks:
  build:
    command: astro build
    deps:
      - ~:check
    inputs:
      - .astro
      - package.json
      - src

  check:
    command: astro check
    inputs:
      - .astro
      - package.json
      - src

  dev:
    command: astro dev --host
    options:
      cache: false

  preview:
    command: astro preview
    options:
      cache: false
