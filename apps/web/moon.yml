# https://moonrepo.dev/docs/config/tasks
$schema: 'https://moonrepo.dev/schemas/tasks.json'

workspace:
  inheritedTasks:
    exclude: ['build', 'compile', 'release', 'test']

tasks:
  build:
    command: astro build
    deps:
      - ~:check
    inputs:
      - .astro
      - astro.config.mjs
      - package.json
      - src

  build.production:
    command: astro build
    deps:
      - ~:check
    env:
      PROD_BUILD: 'true'
    inputs:
      - .astro
      - astro.config.mjs
      - package.json
      - src

  check:
    command: astro check
    inputs:
      - .astro
      - astro.config.mjs
      - package.json
      - src

  cname:
    command: echo jsx.email > dist/CNAME && touch dist/.nojekyll
    deps:
      - ~:build.production
    options:
      cache: false

  clean.samples:
    command: rm -rf dist/samples
    options:
      cache: false

  build.samples:
    command: email preview ../samples/emails --build-path dist/samples --base-path /samples/
    deps:
      - jsx-email:build
      - ~:clean.samples
    options:
      cache: false
      outputStyle: 'stream'
      runDepsInParallel: false

  dev:
    command: astro dev --host
    options:
      cache: false

  deploy:
    command: gh-pages -d dist --dotfiles -u "Release Workflow <release-workflow@jsx.email>"
    deps:
      - ~:build.production
      - ~:build.samples
      - ~:cname
    options:
      cache: false
      outputStyle: 'stream'
      runDepsInParallel: false

  preview:
    command: astro preview
    options:
      cache: false
