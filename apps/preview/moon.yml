# https://moonrepo.dev/docs/config/tasks
$schema: 'https://moonrepo.dev/schemas/tasks.json'

workspace:
  inheritedTasks:
    exclude: ['build', 'compile', 'release', 'test']

tasks:
  build:
    command: vite build --config app/vite.config.ts
    inputs:
      - app
      - dev
      - package.json
      - tsconfig.json

  dev:
    command: vite --config app/vite.config.ts --host 0.0.0.0
    options:
      cache: false
      persistent: true

  typecheck:
    command: tsc --project tsconfig.json
    inputs:
      - app
      - package.json
      - tsconfig.json

  test:
    command: vitest run --config app/vite.config.ts app/test
    inputs:
      - app
      - package.json
      - tsconfig.json
