  <title id="title">Combined Color Palette — jsx-email + atom</title>
  <desc id="desc">Deduplicated union of in-use swatch colors from 07-design-system-jsx-email.svg and 08-design-system-atom-packages.svg, ordered via deterministic nearest-neighbor traversal in CIELAB space (ΔE76 Euclidean).</desc>
