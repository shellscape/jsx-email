      .hex { fill: #E8F0FA; font: 700 18px SFMono-Regular, Consolas, Menlo, Monaco, monospace; }
      .order { fill: #AFC0D6; font: 500 13px SFMono-Regular, Consolas, Menlo, Monaco, monospace; }
