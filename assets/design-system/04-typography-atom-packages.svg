<svg width="1500" height="980" viewBox="0 0 1500 980" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F2EA"/>
      <stop offset="1" stop-color="#E6DED0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#574C4F" flood-opacity="0.22"/>
    </filter>
    <style>
      .title { font: 700 44px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #4C4245; }
      .subtitle { font: 400 19px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #7D716E; }
      .cardTitle { font: 700 24px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #4C4245; }
      .meta { font: 500 15px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #7D716E; }
      .display { font-family: 'Helvetica Neue', Helvetica, Arial, freesans, clean, sans-serif; font-size: 42px; font-weight: 300; fill: #4C4245; }
      .h2 { font-family: 'Helvetica Neue', Helvetica, Arial, freesans, clean, sans-serif; font-size: 30px; font-weight: 300; fill: #4C4245; }
      .ui { font-family: 'Helvetica Neue', Helvetica, Arial, freesans, clean, sans-serif; font-size: 16px; font-weight: 400; fill: #574C4F; }
      .body { font-family: 'Helvetica Neue', Helvetica, Arial, freesans, clean, sans-serif; font-size: 17px; font-weight: 400; fill: #574C4F; }
      .link { font-family: 'Helvetica Neue', Helvetica, Arial, freesans, clean, sans-serif; font-size: 17px; font-weight: 500; fill: #3B9B6D; }
      .mono { font: 500 15px Consolas, 'Liberation Mono', Menlo, Courier, monospace; fill: #2E282A; }
      .tableH { font: 700 14px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #4C4245; letter-spacing: 0.03em; }
      .table { font: 500 14px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #5F5456; }
    </style>
  </defs>

  <rect width="1500" height="980" fill="url(#bg)"/>

  <text x="60" y="88" class="title">04 · Typography — atom-editor.cc/packages</text>
  <text x="60" y="122" class="subtitle">Primary package index typography from Atom stylesheet: Helvetica Neue stack + monospace utility styles.</text>

  <g filter="url(#shadow)">
    <rect x="48" y="160" width="920" height="770" rx="22" fill="#F8F6F2" stroke="#DED5C6"/>
    <text x="84" y="210" class="cardTitle">Primary specimens</text>
    <text x="84" y="236" class="meta">Family: 'Helvetica Neue', Helvetica, Arial, freesans, clean, sans-serif</text>

    <text x="84" y="320" class="display">Package Directory</text>
    <text x="84" y="350" class="ui">Page title scale — 40px/300 on broader docs and 30px/300 for package list headings.</text>

    <text x="84" y="430" class="h2">linter-eslint</text>
    <text x="84" y="458" class="ui">Package card title — 28px / weight 300</text>

    <text x="84" y="522" class="body">Body text defaults to 16px with line-height 1.7, keeping long docs and package descriptions readable.</text>
    <text x="84" y="552" class="body">Metadata commonly appears at 14px with lighter color for hierarchy.</text>

    <rect x="84" y="584" width="256" height="54" rx="8" fill="#3B9B6D"/>
    <text x="138" y="618" style="font: 500 18px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill:#fff;">Install</text>

    <text x="84" y="682" class="link">Link tone example → atom-editor.cc/packages</text>

    <rect x="84" y="718" width="796" height="146" rx="14" fill="#EFEAE1" stroke="#DDD3C0"/>
    <text x="112" y="754" class="meta">Monospace snippets used for docs and install instructions</text>
    <text x="112" y="792" class="mono">apm install linter-eslint</text>
    <text x="112" y="824" class="mono">font-family: Consolas, 'Liberation Mono', Menlo, Courier, monospace;</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="996" y="160" width="456" height="770" rx="22" fill="#F8F6F2" stroke="#DED5C6"/>
    <text x="1030" y="210" class="cardTitle">Type scale + usage</text>

    <rect x="1030" y="236" width="386" height="42" rx="10" fill="#EFEAE1"/>
    <text x="1048" y="262" class="tableH">STYLE</text>
    <text x="1184" y="262" class="tableH">CSS CONTEXT</text>
    <text x="1368" y="262" class="tableH">SIZE</text>

    <g transform="translate(1030 292)">
      <rect width="386" height="52" rx="10" fill="#F4EFE6"/>
      <text x="18" y="32" class="table">Page Title</text><text x="136" y="32" class="table">.page-title</text><text x="318" y="32" class="table">40/1.0</text>

      <rect y="60" width="386" height="52" rx="10" fill="#EFEAE1"/>
      <text x="18" y="92" class="table">List Header</text><text x="136" y="92" class="table">.package-list-title</text><text x="318" y="92" class="table">30/1.2</text>

      <rect y="120" width="386" height="52" rx="10" fill="#F4EFE6"/>
      <text x="18" y="152" class="table">Card Name</text><text x="136" y="152" class="table">.package-card .card-name</text><text x="318" y="152" class="table">28/1.4</text>

      <rect y="180" width="386" height="52" rx="10" fill="#EFEAE1"/>
      <text x="18" y="212" class="table">Body Text</text><text x="136" y="212" class="table">body</text><text x="318" y="212" class="table">16/1.7</text>

      <rect y="240" width="386" height="52" rx="10" fill="#F4EFE6"/>
      <text x="18" y="272" class="table">Metadata</text><text x="136" y="272" class="table">.package-meta</text><text x="318" y="272" class="table">14/1.4</text>

      <rect y="300" width="386" height="52" rx="10" fill="#EFEAE1"/>
      <text x="18" y="332" class="table">Code</text><text x="136" y="332" class="table">.documents code</text><text x="318" y="332" class="table">14–15</text>
    </g>

    <rect x="1030" y="688" width="386" height="194" rx="14" fill="#EFEAE1" stroke="#DDD3C0"/>
    <text x="1052" y="728" class="tableH">Stack note</text>
    <text x="1052" y="760" class="table">The Atom packages interface uses a classic, clean sans-serif rhythm:</text>
    <text x="1052" y="788" class="table">light titles (300), regular body (400), and green links/actions</text>
    <text x="1052" y="816" class="table">for affordance and discoverability.</text>
  </g>
</svg>
