<svg width="1600" height="1120" viewBox="0 0 1600 1120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1F1D1E"/>
      <stop offset="1" stop-color="#2C2A2B"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2E2B2C"/>
      <stop offset="1" stop-color="#262425"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 48px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #F6EFE2; }
      .subtitle { font: 400 20px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #B8AFA2; }
      .section { font: 700 28px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #F6EFE2; }
      .meta { font: 500 16px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #D5CFC3; }
      .token { font: 700 18px 'SF Mono', Menlo, Monaco, Consolas, 'Liberation Mono', monospace; fill: #F6EFE2; }
      .hexOnLight { font: 700 16px 'SF Mono', Menlo, Monaco, Consolas, 'Liberation Mono', monospace; fill: #1F1D1E; }
      .hexOnDark { font: 700 16px 'SF Mono', Menlo, Monaco, Consolas, 'Liberation Mono', monospace; fill: #F6EFE2; }
      .legend { font: 700 14px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #111; }
      .legendDark { font: 700 14px Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; fill: #F6EFE2; }
    </style>
  </defs>

  <rect width="1600" height="1120" fill="url(#bg)"/>

  <text x="64" y="86" class="title">01 · Color Palette Audit</text>
  <text x="64" y="122" class="subtitle">Sources: apps/web/.vitepress/theme/custom.css · apps/preview/app/tailwind.config.cjs · atom-editor.cc · atom-editor.cc/packages</text>

  <rect x="1110" y="42" rx="14" ry="14" width="440" height="144" fill="#252223" stroke="#3C393A"/>
  <text x="1132" y="74" class="meta">Status badges (read these first):</text>
  <rect x="1132" y="88" width="110" height="30" rx="15" fill="#61EFCF"/>
  <text x="1158" y="108" class="legend">IN USE</text>
  <rect x="1254" y="88" width="140" height="30" rx="15" fill="#6AB4FF"/>
  <text x="1272" y="108" class="legend">SOURCE TOKEN</text>
  <rect x="1410" y="88" width="126" height="30" rx="15" fill="#C08CFF"/>
  <text x="1428" y="108" class="legendDark">GRADIENT ONLY</text>
  <rect x="1132" y="130" width="170" height="30" rx="15" fill="#FFB561"/>
  <text x="1154" y="150" class="legend">ATOM REFERENCE</text>

  <g filter="url(#shadow)">
    <rect x="52" y="210" rx="20" width="734" height="740" fill="url(#panel)" stroke="#3D3A3B"/>
    <text x="84" y="260" class="section">jsx-email apps/web + apps/preview</text>
    <text x="84" y="287" class="meta">Core palette actively used in tokens, components, and docs theme.</text>

    <g transform="translate(84 320)">
      <g transform="translate(0 0)"><rect width="640" height="54" rx="12" fill="#343233"/><text x="18" y="34" class="token">dark-bg / --vp-c-bg</text><text x="430" y="34" class="hexOnDark">#343233</text><rect x="538" y="12" width="90" height="30" rx="15" fill="#61EFCF"/><text x="559" y="31" class="legend">IN USE</text></g>
      <g transform="translate(0 64)"><rect width="640" height="54" rx="12" fill="#2C2A2B"/><text x="18" y="34" class="token">darker-bg / --vp-c-bg-alt</text><text x="411" y="34" class="hexOnDark">#2C2A2B</text><rect x="538" y="12" width="90" height="30" rx="15" fill="#61EFCF"/><text x="559" y="31" class="legend">IN USE</text></g>
      <g transform="translate(0 128)"><rect width="640" height="54" rx="12" fill="#EFDAB9"/><text x="18" y="34" class="token" fill="#2B2728">dark-bg-text / --vp-c-text-1</text><text x="419" y="34" class="hexOnLight">#EFDAB9</text><rect x="538" y="12" width="90" height="30" rx="15" fill="#61EFCF"/><text x="559" y="31" class="legend">IN USE</text></g>
      <g transform="translate(0 192)"><rect width="640" height="54" rx="12" fill="#8E8373"/><text x="18" y="34" class="token">muted text / --vp-c-text-2</text><text x="429" y="34" class="hexOnDark">#8E8373</text><rect x="538" y="12" width="90" height="30" rx="15" fill="#61EFCF"/><text x="559" y="31" class="legend">IN USE</text></g>
      <g transform="translate(0 256)"><rect width="640" height="54" rx="12" fill="#FFD152"/><text x="18" y="34" class="token" fill="#2B2728">brand / cta-bg / link</text><text x="465" y="34" class="hexOnLight">#FFD152</text><rect x="538" y="12" width="90" height="30" rx="15" fill="#61EFCF"/><text x="559" y="31" class="legend">IN USE</text></g>
      <g transform="translate(0 320)"><rect width="640" height="54" rx="12" fill="#FFC31F"/><text x="18" y="34" class="token" fill="#2B2728">cta hover</text><text x="475" y="34" class="hexOnLight">#FFC31F</text><rect x="538" y="12" width="90" height="30" rx="15" fill="#61EFCF"/><text x="559" y="31" class="legend">IN USE</text></g>
      <g transform="translate(0 384)"><rect width="640" height="54" rx="12" fill="#EBAC00"/><text x="18" y="34" class="token" fill="#2B2728">brand-2 / link-hover</text><text x="465" y="34" class="hexOnLight">#EBAC00</text><rect x="538" y="12" width="90" height="30" rx="15" fill="#61EFCF"/><text x="559" y="31" class="legend">IN USE</text></g>
      <g transform="translate(0 448)"><rect width="640" height="54" rx="12" fill="#78B0A0"/><text x="18" y="34" class="token">accent highlight / --vp-button-alt-text</text><text x="390" y="34" class="hexOnDark">#78B0A0</text><rect x="538" y="12" width="90" height="30" rx="15" fill="#61EFCF"/><text x="559" y="31" class="legend">IN USE</text></g>
      <g transform="translate(0 512)"><rect width="640" height="54" rx="12" fill="#47504E"/><text x="18" y="34" class="token">tab-bg / button-alt-bg</text><text x="445" y="34" class="hexOnDark">#47504E</text><rect x="538" y="12" width="90" height="30" rx="15" fill="#61EFCF"/><text x="559" y="31" class="legend">IN USE</text></g>
      <g transform="translate(0 576)"><rect width="640" height="54" rx="12" fill="#3D3A3A"/><text x="18" y="34" class="token">button-bg / line-number-bg</text><text x="414" y="34" class="hexOnDark">#3D3A3A</text><rect x="538" y="12" width="90" height="30" rx="15" fill="#61EFCF"/><text x="559" y="31" class="legend">IN USE</text></g>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="814" y="210" rx="20" width="734" height="520" fill="url(#panel)" stroke="#3D3A3B"/>
    <text x="846" y="260" class="section">atom-editor.cc + /packages references</text>
    <text x="846" y="287" class="meta">External reference palette used by Atom site and package index UI.</text>

    <g transform="translate(846 320)">
      <g transform="translate(0 0)"><rect width="670" height="54" rx="12" fill="#584B4F"/><text x="18" y="34" class="token">top bar / navigation</text><text x="482" y="34" class="hexOnDark">#584B4F</text><rect x="548" y="12" width="112" height="30" rx="15" fill="#FFB561"/><text x="566" y="31" class="legend">ATOM REF</text></g>
      <g transform="translate(0 64)"><rect width="670" height="54" rx="12" fill="#EFEAE1"/><text x="18" y="34" class="token" fill="#2B2728">light canvas / footer</text><text x="483" y="34" class="hexOnLight">#EFEAE1</text><rect x="548" y="12" width="112" height="30" rx="15" fill="#FFB561"/><text x="566" y="31" class="legend">ATOM REF</text></g>
      <g transform="translate(0 128)"><rect width="670" height="54" rx="12" fill="#574C4F"/><text x="18" y="34" class="token">default text</text><text x="482" y="34" class="hexOnDark">#574C4F</text><rect x="548" y="12" width="112" height="30" rx="15" fill="#FFB561"/><text x="566" y="31" class="legend">ATOM REF</text></g>
      <g transform="translate(0 192)"><rect width="670" height="54" rx="12" fill="#3B9B6D"/><text x="18" y="34" class="token">primary link / action</text><text x="482" y="34" class="hexOnDark">#3B9B6D</text><rect x="548" y="12" width="112" height="30" rx="15" fill="#FFB561"/><text x="566" y="31" class="legend">ATOM REF</text></g>
      <g transform="translate(0 256)"><rect width="670" height="54" rx="12" fill="#81C08B"/><text x="18" y="34" class="token">selected states / hover accents</text><text x="482" y="34" class="hexOnDark">#81C08B</text><rect x="548" y="12" width="112" height="30" rx="15" fill="#FFB561"/><text x="566" y="31" class="legend">ATOM REF</text></g>
      <g transform="translate(0 320)"><rect width="670" height="54" rx="12" fill="#F8F6F2"/><text x="18" y="34" class="token" fill="#2B2728">neutral card background</text><text x="482" y="34" class="hexOnLight">#F8F6F2</text><rect x="548" y="12" width="112" height="30" rx="15" fill="#FFB561"/><text x="566" y="31" class="legend">ATOM REF</text></g>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="814" y="748" rx="20" width="734" height="202" fill="url(#panel)" stroke="#3D3A3B"/>
    <text x="846" y="792" class="section">Gradient overlays from jsx-email tokens</text>
    <text x="846" y="818" class="meta">These appear as overlays only, not standalone solid brand colors.</text>

    <defs>
      <linearGradient id="gradA" x1="0" y1="0" x2="1" y2="1">
        <stop stop-color="rgba(255,255,255,0.09)"/>
        <stop offset="1" stop-color="rgba(255,255,255,0.027)"/>
      </linearGradient>
      <linearGradient id="gradB" x1="0" y1="0" x2="1" y2="1">
        <stop stop-color="rgba(255,255,255,0.10)"/>
        <stop offset="1" stop-color="rgba(255,255,255,0.057)"/>
      </linearGradient>
      <linearGradient id="gradC" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="rgba(255,255,255,0)"/>
        <stop offset="0.5" stop-color="rgba(255,255,255,1)"/>
        <stop offset="1" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>
    </defs>

    <g transform="translate(846 842)">
      <rect width="205" height="72" rx="12" fill="url(#gradA)" stroke="#AAA" stroke-opacity="0.4"/>
      <text x="18" y="95" class="meta">gradient</text>
      <rect x="132" y="78" width="72" height="26" rx="13" fill="#C08CFF"/><text x="145" y="96" class="legendDark">GRAD</text>

      <rect x="230" width="205" height="72" rx="12" fill="url(#gradB)" stroke="#AAA" stroke-opacity="0.4"/>
      <text x="248" y="95" class="meta">gradientHover</text>
      <rect x="362" y="78" width="72" height="26" rx="13" fill="#C08CFF"/><text x="375" y="96" class="legendDark">GRAD</text>

      <rect x="460" width="205" height="72" rx="12" fill="url(#gradC)" stroke="#AAA" stroke-opacity="0.4"/>
      <text x="478" y="95" class="meta">shine</text>
      <rect x="592" y="78" width="72" height="26" rx="13" fill="#C08CFF"/><text x="605" y="96" class="legendDark">GRAD</text>
    </g>
  </g>
</svg>
