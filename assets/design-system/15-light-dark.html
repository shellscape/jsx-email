      }

        background: #10151c;
        color: var(--stone-6);

        font-weight: 300;
        line-height: 1.5;
      }

      p {
        margin: 0;
      }
      pre {
        margin: 0;
        overflow-x: auto;
        padding: 12px;
      }

      pre code,
      code.inline {
        color: var(--text-strong);
        font-family: SFMono-Regular, Consolas, Menlo, Monaco, monospace;
      }

      code.inline {
        background: var(--plain-inline-code-bg);
        border: 0;
        border-radius: 4px;
        display: inline-block;
        color: var(--plain-inline-code-text);
        font-size: 0.81em;
        font-weight: 300;
        padding: 3px 6px;
      }

      .code-sample .shiki,
      .code-sample .shiki code {
        background: var(--code-block-bg) !important;
      }

      .code-sample .shiki {
        font-family: SFMono-Regular, Consolas, Menlo, Monaco, monospace !important;
        font-size: 14px !important;
        line-height: 1.7 !important;
        margin: 0 !important;
        overflow-x: auto;
        padding: 20px 24px !important;
        width: 100%;
      }

      @keyframes nav-fade-in {
        0% {
          opacity: 0;
          margin-left: -30px;
        }
        100% {
          opacity: 1;
          margin-left: 0;
        }
      }

      .animate-nav-fade-in {
        animation: nav-fade-in 500ms ease-in-out forwards;
      }

      .collapsible-content {
        display: grid;
        overflow: hidden;
        transition:
          grid-template-rows 300ms ease-out,
          opacity 300ms ease-out,
          margin-top 300ms ease-out;
      }

      .collapsible-content[data-state="open"] {
        grid-template-rows: 1fr;
        opacity: 1;
      }

      .collapsible-content[data-state="closed"] {
        grid-template-rows: 0fr;
        opacity: 0;
      }

        border-radius: 4px;
        box-shadow: inset 0 1px 0 var(--card-highlight);
        color: var(--text);
      }

      function Popover({ open: controlledOpen, defaultOpen = false, onOpenChange, children }) {
        const [uncontrolledOpen, setUncontrolledOpen] = useState(defaultOpen);
        const triggerRef = useRef(null);
        const contentRef = useRef(null);
        const open = controlledOpen ?? uncontrolledOpen;

        const setOpen = (nextOpen) => {
          if (controlledOpen === undefined) {
            setUncontrolledOpen(nextOpen);
          }

          onOpenChange?.(nextOpen);
        };

        useEffect(() => {
          if (!open) return undefined;

          const handlePointerDown = (event) => {
            const target = event.target;

            if (triggerRef.current?.contains(target) || contentRef.current?.contains(target)) {
              return;
            }

            setOpen(false);
          };

          const handleKeyDown = (event) => {
            if (event.key === "Escape") {
              setOpen(false);
            }
          };

          document.addEventListener("mousedown", handlePointerDown);
          document.addEventListener("touchstart", handlePointerDown);
          document.addEventListener("keydown", handleKeyDown);

          return () => {
            document.removeEventListener("mousedown", handlePointerDown);
            document.removeEventListener("touchstart", handlePointerDown);
            document.removeEventListener("keydown", handleKeyDown);
          };
        }, [open]);

        const contextValue = useMemo(
          () => ({
            open,
            setOpen,
            triggerRef,
            contentRef,
          }),
          [open],
        );

        return (
          <PopoverContext.Provider value={contextValue}>
            <div className="relative inline-flex">{children}</div>
          </PopoverContext.Provider>
        );
      }

      function PopoverTrigger({ children }) {
        const context = useContext(PopoverContext);
        const child = React.Children.only(children);
        const childProps = child.props ?? {};

        return (
          <span ref={context?.triggerRef} className="inline-flex">
            {React.cloneElement(child, {
              onClick: (event) => {
                childProps.onClick?.(event);
                if (!event.defaultPrevented) {
                  context?.setOpen(!context?.open);
                }
              },
              "aria-expanded": context?.open ? "true" : "false",
              "data-state": context?.open ? "open" : "closed",
            })}
          </span>
        );
      }

      function PopoverContent({

        side = "bottom",

        const context = useContext(PopoverContext);

        if (!context?.open) return null;

        const sideClasses = {
          top: "bottom-full",
          right: "left-full top-1/2 -translate-y-1/2",
          bottom: "top-full",
          left: "right-full top-1/2 -translate-y-1/2",
        };

        const alignClassesBySide = {
          top: {
            start: "left-0",
            center: "left-1/2 -translate-x-1/2",
            end: "right-0",
          },
          bottom: {
            start: "left-0",
            center: "left-1/2 -translate-x-1/2",
            end: "right-0",
          },
          right: {
            start: "top-0",
            center: "top-1/2 -translate-y-1/2",
            end: "bottom-0",
          },
          left: {
            start: "top-0",
            center: "top-1/2 -translate-y-1/2",
            end: "bottom-0",
          },
        };

        const offsetStyle =
          side === "bottom"
            ? { marginTop: sideOffset }
            : side === "top"
              ? { marginBottom: sideOffset }
              : side === "right"
                ? { marginLeft: sideOffset }
                : { marginRight: sideOffset };

        return (
          <div
            ref={context.contentRef}
            className={cn(
              "absolute z-20",
              sideClasses[side],
              alignClassesBySide[side][align],
              className,
            )}
            data-state="open"
            data-side={side}
            style={offsetStyle}
          >
            {children}
          </div>
        );
      }

      function TreeNode({ item, depth = 0 }) {
        const tree = useContext(TreeContext);

        const isBranch = !!item.children?.length;

          if (containsSelected) setOpen(true);

      function CodeSample({ code, lang = "jsx", className = "", theme = "slack-dark" }) {
        const [html, setHtml] = useState("");
        const highlightLang = lang === "console" ? "sh" : lang;
        useEffect(() => {
          let cancelled = false;

          async function highlight() {
            if (!window.shikiReady || !window.shikiCodeToHtml) return;

            await window.shikiReady;
            const highlighted = await window.shikiCodeToHtml(code, {
              lang: highlightLang,
              theme,
            });

            if (!cancelled) setHtml(highlighted);
          }

          highlight().catch((error) => {
            console.error("Failed to highlight code sample:", error);
          });

          return () => {
            cancelled = true;
          };
        }, [code, highlightLang, theme]);

        if (!html) {
          return (
            <pre className="overflow-x-auto p-3">
              <code className="font-mono text-docs-text-strong">{code}</code>
            </pre>
          );
        }

        return (
          <div
            className={cn(
              "code-sample relative overflow-x-auto rounded bg-docs-surface",
              className,
            )}
          >
            <span className="pointer-events-none absolute right-4 top-3 z-10 text-xs font-medium text-[var(--code-lang-label)] transition-opacity duration-300">
              {lang}
            </span>
            <div dangerouslySetInnerHTML={{ __html: html }} />
          </div>
        );
      }

                      className="relative inline-flex w-fit pl-[18px] text-sm text-[var(--vp-code-tab-text-color)] no-underline transition-colors duration-[250ms] before:absolute before:left-0 before:top-[0.45rem] before:h-[6px] before:w-[6px] before:rounded-full before:bg-[var(--sidebar-marker-bg)] before:opacity-0 before:transition-opacity before:duration-[250ms] hover:text-docs-brand hover:before:opacity-100"
                    >
                      Introduction
                    </a>
                    <a
                      href="/docs/quick-start"
                      className="relative inline-flex w-fit pl-[18px] text-sm text-[var(--vp-code-tab-text-color)] no-underline transition-colors duration-[250ms] before:absolute before:left-0 before:top-[0.45rem] before:h-[6px] before:w-[6px] before:rounded-full before:bg-[var(--sidebar-marker-bg)] before:opacity-0 before:transition-opacity before:duration-[250ms] hover:text-docs-brand hover:before:opacity-100"
                    >
                      Quick Start
                    </a>
                    <a
                      href="/docs/components/button"
                      className="relative inline-flex w-fit pl-[18px] text-sm text-[var(--vp-code-tab-text-color)] no-underline transition-colors duration-[250ms] before:absolute before:left-0 before:top-[0.45rem] before:h-[6px] before:w-[6px] before:rounded-full before:bg-[var(--sidebar-marker-bg)] before:opacity-0 before:transition-opacity before:duration-[250ms] hover:text-docs-brand hover:before:opacity-100"
                    >
                      Button
                    </a>
                  </div>
                  <p className="text-xs text-docs-text-subtle">
                    Docs body copy uses plain VitePress links like{" "}
                    <a
                      href="https://jsx.email/docs/introduction"
                      className="text-docs-brand no-underline transition-colors duration-150 hover:text-[var(--brand-active)]"
                    >
                      jsx.email/docs/introduction
                    </a>{" "}
                    with no custom underline treatment.
                  </p>
                </div>

                <div className={cn("grid gap-2.5 p-3", SUBCARD_CLASS)}>
                  <div className="text-sm font-semibold text-docs-text-strong">
                    Docs changelog links
                  </div>
                  <div className="flex flex-wrap items-center gap-3">
                    <a
                      href="https://github.com/example"
                      className="inline-flex w-fit items-center gap-2.5 rounded-full bg-[var(--chip-bg)] p-2 text-xs font-medium leading-4 text-docs-text no-underline shadow-[0_0_1px_1px_var(--chip-border-color)] transition-colors duration-150 hover:bg-[var(--chip-bg-hover)]"
                    >
                      <span className="inline-block h-5 w-5 rounded-full bg-[var(--chip-border-color)]" />
                      shellscape
                    </a>
                    <a
                      href="https://github.com/shellscape/jsx-email/pull/999"
                      className="text-docs-text no-underline transition-colors duration-150 hover:text-[var(--brand-hover)]"
                    >
                      #999: tighten docs tokens
                    </a>
                  </div>
                  <p className="text-xs text-docs-text-subtle">
                    The changelog page adds its own author chip link and a warm hover state on PR
                    title links.
                  </p>
                </div>

                <div className={cn("grid gap-2.5 p-3", SUBCARD_CLASS)}>
                  <div className="text-sm font-semibold text-docs-text-strong">
                    Preview links outside the tree view
                  </div>
                  <div className="flex flex-wrap items-center gap-3">
                    <a
                      href="https://www.useplunk.com"
                      className="text-docs-text no-underline transition-colors duration-200 hover:text-[var(--preview-text-hover)]"
                    >
                      Powered by Plunk
                    </a>
                    <a
                      href="#download"
                      className="inline-flex items-center justify-center text-[var(--preview-icon)] no-underline transition-colors duration-200 hover:text-docs-text"
                      aria-label="Download"
                    >
                      <DownloadIcon />
                    </a>
                  </div>
                  <p className="text-xs text-docs-text-subtle">
                    This mirrors the send-popover vendor link and the code-panel download action
                    from <InlineCode>apps/preview</InlineCode>. Tree links are intentionally
                    excluded.
                  </p>
                </div>
              </div>
            </Card>

            <Card title="Select">
              <PreviewSelectShowcase />
            </Card>

            <Card title="Tree View">
              <PreviewTreeShowcase />
            </Card>

            <Card title="Code block + inline code treatment" className="lg:col-span-2">
              <div className="grid gap-3">
                <CodeSample
                  lang="jsx"
                  theme={mode === "light" ? "one-light" : "slack-dark"}
                  code={`import { Button, Text } from "jsx-email";

export const Welcome = () => (
  <Button href="https://jsx.email/docs" style={{ background: "var(--brand)", color: "var(--surface-raised)" }}>
    Read docs
  </Button>
);`}
                />
              </div>
              <p className="mt-2.5 text-xs text-docs-text-subtle">
                Inline example: run{" "}
                <code className="inline-block rounded-[4px] bg-[var(--plain-inline-code-bg)] px-[6px] py-[3px] font-mono font-light text-[var(--plain-inline-code-text)]">
                  pnpm email create welcome-email
                </code>{" "}
                then{" "}
                <code className="inline-block rounded-[4px] bg-[var(--plain-inline-code-bg)] px-[6px] py-[3px] font-mono font-light text-[var(--plain-inline-code-text)]">
                  pnpm email preview
                </code>
                .
              </p>
              <p className="mt-2 text-xs text-docs-text-subtle">
                Tip-block inline code style:{" "}
                <code className="inline-block rounded-[4px] bg-[var(--blue-hover)] px-[6px] py-[3px] font-mono font-light text-docs-surface-raised">
                  pnpm add jsx-email
                </code>
              </p>
              <p className="mt-2 text-xs text-docs-text-subtle">
                Warning-block inline code style:{" "}
                <code className="inline-block rounded-[4px] bg-[var(--warn-inline-code-bg)] px-[6px] py-[3px] font-mono font-light text-[var(--warn-inline-code-text)]">
                  Butan
                </code>
              </p>
              <p className="mt-2 text-xs text-docs-text-subtle">
                Info-block inline code style:{" "}
                <code className="inline-block rounded-[4px] bg-[var(--info-inline-code-bg)] px-[6px] py-[3px] font-mono font-light text-docs-text">
                  expression
                </code>
              </p>
            </Card>
          </section>
        );
      }

      function ModePreview({ mode, title, note }) {
        return (
          <section
            className={cn(
              "mode-preview p-4",
              mode === "light" ? "mode-preview--light" : "mode-preview--dark",
            )}
            style={{ background: "var(--bg)" }}
          >
            <header className={cn("mb-4 px-3 py-2.5", SUBCARD_CLASS)}>
              <h2 className="text-[1.2rem] font-semibold text-docs-text-strong">{title}</h2>
              <p className="mt-1 text-xs text-docs-text-subtle">{note}</p>
            </header>
            <ControlsShowcase mode={mode} />
            <div className="mt-4">
              <TextColorSamplesCard mode={mode} />
            </div>
          </section>
        );
      }

      function ShowcaseApp() {
        return (
          <main className="mx-auto max-w-[1280px] px-5 pb-[52px] pt-7">
            <header>
              <h1 className="m-0 text-[clamp(1.9rem,4vw,2.45rem)] leading-[1.1] text-docs-text-strong">
                JSX Email Design System
              </h1>
            </header>

            <ColorPaletteSection />
            <TypographySection />

            <div className="mt-5 flex items-center gap-3">
              <span className="h-px flex-1 bg-docs-border" />
              <p className="text-[0.72rem] uppercase tracking-[0.18em] text-docs-text-subtle">
                Controls · top: light mode · bottom: dark mode
              </p>
              <span className="h-px flex-1 bg-docs-border" />
            </div>

            <section className="mt-4 grid gap-4">
              <ModePreview
                mode="light"
                title="Light mode controls"
                note="Base background var(--stone-8) / #FAF6EC. Default text pairs Graphite darkest (#1A191A) with Warm Stone darkest (#584B4F)."
              />

              <ModePreview
                mode="dark"
                title="Dark mode controls"
                note="Base background #1A191A. Default text pairs Warm Stone lightest (#FAF6EC) with Graphite lightest (#565656)."
              />
            </section>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<ShowcaseApp />);
    </script>
  </body>
</html>
