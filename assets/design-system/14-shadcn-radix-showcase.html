<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JSX Email Design System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "docs-bg": "var(--bg)",
              "docs-surface": "var(--surface)",
              "docs-surface-raised": "var(--surface-raised)",
              "docs-border": "var(--border)",
              "docs-border-soft": "var(--border-soft)",
              "docs-text": "var(--text)",
              "docs-text-subtle": "var(--text-subtle)",
              "docs-text-strong": "var(--text-strong)",
              "docs-brand": "var(--brand)",
            },
          },
        },
      };
    </script>
    <script type="module">
      import { codeToHtml } from 'https://esm.sh/shiki@1.29.2';

      window.shikiCodeToHtml = codeToHtml;
      window.shikiReady = Promise.resolve();
    </script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1a191a;
        --surface: #2c2a2b;
        --surface-raised: #343233;
        --surface-muted: #3d3a3a;
        --border: #434c56;
        --border-soft: #565656;
        --text: #efdab9;
        --text-subtle: #949189;
        --text-strong: #faf6ec;

        --brand: #ffd152;
        --brand-hover: #ffc31f;
        --brand-active: #ebac00;
        --vp-code-tab-active-text-color: #efdab9;
        --vp-code-tab-text-color: #8e8373;
        --vp-code-tab-divider: #00000033;

        --mint: #61efce;
        --mint-hover: #45edc6;
        --teal: #78b0a0;

        --blue: #659cc8;
        --blue-hover: #719bc4;

        --ember: #c13f21;
        --warm: #d36e2d;
        --text-strong-border: rgba(250, 246, 236, 0.35);
        --card-highlight: rgba(250, 246, 236, 0.02);
        --button-pressed-shadow: rgba(26, 25, 26, 0.45);
        --button-alt-bg: #47504e;
        --button-info-fg: #101417;
        --ghost-hover-bg: rgba(101, 156, 200, 0.16);
        --sidebar-marker-bg: rgba(120, 111, 99, 0.2);
        --chip-bg: rgb(142 131 115 / 20%);
        --chip-bg-hover: rgb(142 131 115 / 50%);
        --chip-border-color: #8e8373;
        --preview-text-hover: #f3f5f7;
        --preview-icon: #9ba1aa;
        --pill-mint-bg: rgba(97, 239, 206, 0.22);
        --pill-blue-bg: rgba(101, 156, 200, 0.23);
        --lang-badge-bg: rgba(101, 156, 200, 0.28);
        --lang-badge-border: rgba(101, 156, 200, 0.65);
        --inline-code-bg: rgba(67, 76, 86, 0.32);
        --inline-code-border: rgba(120, 176, 160, 0.28);
        --code-lang-label: rgba(239, 218, 185, 0.45);
        --plain-inline-code-bg: #65758529;
        --plain-inline-code-text: #9cdcfe;
        --warn-inline-code-bg: rgba(234, 179, 8, 0.16);
        --warn-inline-code-text: #f9b44e;
        --info-inline-code-bg: rgba(101, 117, 133, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        line-height: 1.45;
      }

      p {
        margin: 0;
      }
      pre {
        margin: 0;
        overflow-x: auto;
        padding: 12px;
      }

      pre code,
      code.inline {
        color: var(--text-strong);
        font-family: SFMono-Regular, Consolas, Menlo, Monaco, monospace;
      }

      code.inline {
        background: var(--inline-code-bg);
        border: 1px solid var(--inline-code-border);
        border-radius: 6px;
        display: inline-block;
        font-size: 0.81em;
        padding: 1px 6px;
      }

      .code-sample .shiki,
      .code-sample .shiki code {
        background: var(--surface) !important;
      }

      .code-sample .shiki {
        font-family: SFMono-Regular, Consolas, Menlo, Monaco, monospace !important;
        font-size: 14px !important;
        line-height: 1.7 !important;
        margin: 0 !important;
        overflow-x: auto;
        padding: 20px 24px !important;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react">
      const { useEffect, useState } = React;

      const TOKENS = [
        ["--bg: #1A191A", "page background", "#1a191a"],
        ["--surface: #2C2A2B", "card + panel backgrounds", "#2c2a2b"],
        ["--surface-raised: #343233", "component containers", "#343233"],
        ["--border: #434C56", "primary borders", "#434c56"],
        ["--border-soft: #565656", "subtle lines + separators", "#565656"],
        ["--text: #EFDAB9", "body text", "#efdab9"],
        ["--text-subtle: #949189", "supporting copy", "#949189"],
        ["--brand: #FFD152", "primary CTA base", "#ffd152"],
        ["--brand-hover: #FFC31F", "brand hover", "#ffc31f"],
        ["--brand-active: #EBAC00", "brand active / press", "#ebac00"],
        ["--mint: #61EFCE", "accent + alt-hover", "#61efce"],
        ["--teal: #78B0A0", "alt text", "#78b0a0"],
        ["--blue: #659CC8", "info actions", "#659cc8"],
        ["--blue-hover: #719BC4", "info hover", "#719bc4"],
        ["--ember: #C13F21", "danger signal", "#c13f21"],
        ["--warm: #D36E2D", "secondary warm accent", "#d36e2d"],
      ];

      const INSTALL_TABS = [
        ["pnpm", "pnpm add jsx-email"],
        ["bun", "bun add jsx-email"],
        ["npm", "npm add jsx-email"],
        ["yarn", "yarn add jsx-email"],
      ];

      const PREVIEW_TABS = [
        [
          "preview",
          "Shadcn-style tabs replace the previous hand-wired segmented control and run entirely through React state.",
        ],
        [
          "jsx",
          "The install pattern can now be reused as a React component instead of a DOM-specific script.",
        ],
        [
          "html",
          "Tailwind utilities and token colors stay in the file, so iteration is still fast for design-system work.",
        ],
        [
          "plain",
          "This setup matches the CDN-prototype workflow you described: React in the page, no Radix runtime.",
        ],
      ];

      function cn(...values) {
        return values.filter(Boolean).join(" ");
      }

      function Card({ title, children, className = "" }) {
        return (
          <article
            className={cn(
              "rounded-xl border border-docs-border bg-docs-surface-raised p-4 shadow-[inset_0_1px_0_var(--card-highlight)]",
              className,
            )}
          >
            <h2 className="mb-3 text-[1.2rem] tracking-[0.01em] text-docs-text-strong">{title}</h2>
            {children}
          </article>
        );
      }

      function Button({ variant = "default", className = "", children, href, ...props }) {
        const variants = {
          default:
            "border-docs-border-soft bg-[var(--surface-muted)] text-docs-text hover:border-docs-border hover:bg-docs-surface-raised",
          brand:
            "border-[var(--brand-active)] bg-docs-brand text-docs-surface-raised hover:bg-[var(--brand-hover)] active:bg-[var(--brand-active)]",
          alt: "border-docs-border-soft bg-[var(--button-alt-bg)] text-[var(--teal)] hover:bg-[var(--mint)] hover:text-docs-surface-raised",
          info: "border-[var(--blue-hover)] bg-[var(--blue)] text-[var(--button-info-fg)] hover:bg-[var(--blue-hover)]",
          ghost:
            "border-docs-border-soft bg-transparent text-docs-text hover:border-[var(--blue)] hover:bg-[var(--ghost-hover-bg)]",
        };

        const classNames = cn(
          "inline-flex min-h-[38px] items-center justify-center rounded-[10px] border px-[13px] text-[0.86rem] font-semibold transition-colors duration-200",
          variants[variant],
          className,
        );

        if (href) {
          return (
            <a href={href} className={classNames} {...props}>
              {children}
            </a>
          );
        }

        return (
          <button className={classNames} {...props}>
            {children}
          </button>
        );
      }

      function Tabs({ tabs, defaultValue }) {
        const [active, setActive] = useState(defaultValue ?? tabs[0][0]);
        const activeContent = tabs.find(([value]) => value === active)?.[1];

        return (
          <div className="space-y-3">
            <div className="inline-flex h-10 items-center justify-center rounded-lg border border-docs-border bg-docs-surface p-1 text-docs-text-subtle">
              {tabs.map(([value]) => {
                const isActive = value === active;
                return (
                  <button
                    key={value}
                    type="button"
                    onClick={() => setActive(value)}
                    className={cn(
                      "inline-flex min-w-[76px] items-center justify-center whitespace-nowrap rounded-md px-3 py-1.5 text-[0.82rem] font-medium capitalize ring-offset-docs-bg transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-docs-brand focus-visible:ring-offset-2",
                      isActive
                        ? "bg-docs-brand text-docs-surface-raised shadow-sm"
                        : "text-docs-text hover:text-docs-brand",
                    )}
                  >
                    {value}
                  </button>
                );
              })}
            </div>
            <div className="rounded-[10px] border border-docs-border-soft bg-docs-surface px-3 py-[11px] text-docs-text">
              {activeContent}
            </div>
          </div>
        );
      }

      function InstallTabs() {
        const [active, setActive] = useState("pnpm");
        const command = INSTALL_TABS.find(([value]) => value === active)?.[1];

        return (
          <div className="overflow-hidden rounded-[10px]">
            <div className="overflow-x-auto">
              <div
                className="flex min-w-max bg-docs-surface shadow-[inset_0_-1px_var(--vp-code-tab-divider)]"
                role="tablist"
                aria-label="Package manager"
              >
                {INSTALL_TABS.map(([value]) => {
                  const isActive = value === active;
                  return (
                    <button
                      key={value}
                      type="button"
                      role="tab"
                      aria-selected={isActive}
                      tabIndex={isActive ? 0 : -1}
                      onClick={() => setActive(value)}
                      className="relative inline-block shrink-0 whitespace-nowrap border-b border-transparent bg-transparent px-3 text-sm font-normal leading-[48px] [color:var(--tab-color)] transition-colors duration-[250ms] hover:[color:var(--vp-code-tab-active-text-color)] after:absolute after:bottom-[-1px] after:left-2 after:right-2 after:z-[1] after:h-[2px] after:rounded-[2px] after:[background-color:var(--tab-highlight)] after:transition-[background-color] after:duration-[250ms] hover:after:[background-color:var(--brand)]"
                      style={{
                        "--tab-color": isActive
                          ? "var(--vp-code-tab-active-text-color)"
                          : "var(--vp-code-tab-text-color)",
                        "--tab-highlight": isActive ? "var(--brand)" : "transparent",
                      }}
                    >
                      {value}
                    </button>
                  );
                })}
              </div>
            </div>
            <div>
              <CodeSample code={command} lang="console" className="rounded-t-none" />
            </div>
          </div>
        );
      }

      function CodeSample({ code, lang = "jsx", className = "" }) {
        const [html, setHtml] = useState("");

        useEffect(() => {
          let cancelled = false;

          async function highlight() {
            if (!window.shikiReady || !window.shikiCodeToHtml) return;

            await window.shikiReady;

            const highlighted = await window.shikiCodeToHtml(code, {
              lang,
              theme: "slack-dark",
            });

            if (!cancelled) setHtml(highlighted);
          }

          highlight().catch((error) => {
            console.error("Failed to highlight code sample:", error);
          });

          return () => {
            cancelled = true;
          };
        }, [code, lang]);

        if (!html) {
          return (
            <pre className="overflow-x-auto p-3">
              <code className="font-mono text-docs-text-strong">{code}</code>
            </pre>
          );
        }

        return (
          <div className={cn("code-sample relative overflow-x-auto rounded-lg bg-docs-surface", className)}>
            <span className="pointer-events-none absolute right-4 top-3 z-10 text-xs font-medium text-[var(--code-lang-label)] transition-opacity duration-300">
              {lang}
            </span>
            <div dangerouslySetInnerHTML={{ __html: html }} />
          </div>
        );
      }

      function DownloadIcon() {
        return (
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path
              d="M8 2.5V9.5M8 9.5L5.5 7M8 9.5L10.5 7M3 11.5H13"
              stroke="currentColor"
              strokeWidth="1.35"
              strokeLinecap="round"
              strokeLinejoin="round"
            />
          </svg>
        );
      }

      function ShowcaseApp() {
        return (
          <main className="mx-auto max-w-[1280px] px-5 pb-[52px] pt-7">
            <header>
              <h1 className="m-0 text-[clamp(1.9rem,4vw,2.45rem)] leading-[1.1] text-docs-text-strong">
                JSX Email Design System
              </h1>
            </header>

            <section className="mt-4 rounded-[14px] border border-docs-border bg-docs-surface p-4">
              <h2 className="mb-3 text-[1.2rem] tracking-[0.01em] text-docs-text-strong">
                Color Palette
              </h2>
              <div className="grid grid-cols-[repeat(auto-fit,minmax(190px,1fr))] gap-2.5">
                {TOKENS.map(([label, note, color]) => (
                  <div
                    key={label}
                    className="grid grid-cols-[16px_1fr] items-center gap-2.5 rounded-[10px] border border-docs-border-soft bg-docs-surface px-2.5 py-2"
                  >
                    <span
                      className="h-4 w-4 rounded-full border border-[var(--text-strong-border)]"
                      style={{ background: color }}
                    />
                    <div>
                      <code className="font-mono text-[0.76rem] text-docs-text-strong">
                        {label}
                      </code>
                      <div className="text-[0.74rem] text-docs-text-subtle">{note}</div>
                    </div>
                  </div>
                ))}
              </div>
            </section>

            <section className="mt-4 grid grid-cols-1 gap-4 lg:grid-cols-2">
              <Card title="Buttons — shadcn-style primitives">
                <div className="flex flex-wrap gap-2.5">
                  <Button variant="brand">Primary brand</Button>
                  <Button variant="alt">Alt / secondary</Button>
                  <Button variant="info">Info action</Button>
                  <Button variant="ghost">Ghost action</Button>
                </div>
                <p className="mt-2.5 text-[0.77rem] text-docs-text-subtle">
                  Buttons are now React components with shared utility classes, which makes this
                  file behave like a real shadcn prototyping surface instead of isolated markup.
                </p>
              </Card>

              <Card title="Tabs — componentized control pattern">
                <Tabs tabs={PREVIEW_TABS} defaultValue="preview" />
              </Card>

              <Card title="Links">
                <div className="grid gap-3">
                  <div className="grid gap-2.5 rounded-[10px] border border-docs-border-soft bg-docs-surface p-3">
                    <div className="text-[0.8rem] font-semibold text-docs-text-strong">
                      Docs navigation and body links
                    </div>
                    <div className="flex flex-wrap items-center gap-3">
                      <a
                        href="/docs/introduction"
                        className="text-base font-light text-docs-text no-underline transition-colors duration-150 hover:text-docs-brand"
                      >
                        Documentation
                      </a>
                      <a
                        href="/docs/quick-start"
                        className="text-base font-light text-docs-text no-underline transition-colors duration-150 hover:text-docs-brand"
                      >
                        Quick Start
                      </a>
                      <a
                        href="/changelog"
                        className="text-base font-light text-docs-text no-underline transition-colors duration-150 hover:text-docs-brand"
                      >
                        Changelog
                      </a>
                      <a
                        href="http://samples.jsx.email"
                        className="text-base font-light text-docs-text no-underline transition-colors duration-150 hover:text-docs-brand"
                      >
                        Email Samples
                      </a>
                    </div>
                    <div className="grid gap-1.5">
                      <a
                        href="/docs/introduction"
                        className="relative inline-flex w-fit pl-[18px] text-[0.88rem] text-[var(--vp-code-tab-text-color)] no-underline transition-colors duration-[250ms] before:absolute before:left-0 before:top-[0.45rem] before:h-[6px] before:w-[6px] before:rounded-full before:bg-[var(--sidebar-marker-bg)] before:opacity-0 before:transition-opacity before:duration-[250ms] hover:text-docs-brand hover:before:opacity-100"
                      >
                        Introduction
                      </a>
                      <a
                        href="/docs/quick-start"
                        className="relative inline-flex w-fit pl-[18px] text-[0.88rem] text-[var(--vp-code-tab-text-color)] no-underline transition-colors duration-[250ms] before:absolute before:left-0 before:top-[0.45rem] before:h-[6px] before:w-[6px] before:rounded-full before:bg-[var(--sidebar-marker-bg)] before:opacity-0 before:transition-opacity before:duration-[250ms] hover:text-docs-brand hover:before:opacity-100"
                      >
                        Quick Start
                      </a>
                      <a
                        href="/docs/components/button"
                        className="relative inline-flex w-fit pl-[18px] text-[0.88rem] text-[var(--vp-code-tab-text-color)] no-underline transition-colors duration-[250ms] before:absolute before:left-0 before:top-[0.45rem] before:h-[6px] before:w-[6px] before:rounded-full before:bg-[var(--sidebar-marker-bg)] before:opacity-0 before:transition-opacity before:duration-[250ms] hover:text-docs-brand hover:before:opacity-100"
                      >
                        Button
                      </a>
                    </div>
                    <p className="text-[0.75rem] text-docs-text-subtle">
                      Docs body copy uses plain VitePress links like{" "}
                      <a
                        href="https://jsx.email/docs/introduction"
                        className="text-docs-brand no-underline transition-colors duration-150 hover:text-[var(--brand-active)]"
                      >
                        jsx.email/docs/introduction
                      </a>{" "}
                      with no custom underline treatment.
                    </p>
                  </div>

                  <div className="grid gap-2.5 rounded-[10px] border border-docs-border-soft bg-docs-surface p-3">
                    <div className="text-[0.8rem] font-semibold text-docs-text-strong">
                      Docs changelog links
                    </div>
                    <div className="flex flex-wrap items-center gap-3">
                      <a
                        href="https://github.com/example"
                        className="inline-flex w-fit items-center gap-2.5 rounded-full bg-[var(--chip-bg)] p-2 text-[0.75rem] font-medium leading-4 text-docs-text no-underline shadow-[0_0_1px_1px_var(--chip-border-color)] transition-colors duration-150 hover:bg-[var(--chip-bg-hover)]"
                      >
                        <span className="inline-block h-5 w-5 rounded-full bg-[var(--chip-border-color)]" />
                        shellscape
                      </a>
                      <a
                        href="https://github.com/shellscape/jsx-email/pull/999"
                        className="text-docs-text no-underline transition-colors duration-150 hover:text-[var(--brand-hover)]"
                      >
                        #999: tighten docs tokens
                      </a>
                    </div>
                    <p className="text-[0.75rem] text-docs-text-subtle">
                      The changelog page adds its own author chip link and a warm hover state on PR
                      title links.
                    </p>
                  </div>

                  <div className="grid gap-2.5 rounded-[10px] border border-docs-border-soft bg-docs-surface p-3">
                    <div className="text-[0.8rem] font-semibold text-docs-text-strong">
                      Preview links outside the tree view
                    </div>
                    <div className="flex flex-wrap items-center gap-3">
                      <a
                        href="https://www.useplunk.com"
                        className="text-docs-text no-underline transition-colors duration-200 hover:text-[var(--preview-text-hover)]"
                      >
                        Powered by Plunk
                      </a>
                      <a
                        href="#download"
                        className="inline-flex items-center justify-center text-[var(--preview-icon)] no-underline transition-colors duration-200 hover:text-docs-text"
                        aria-label="Download"
                      >
                        <DownloadIcon />
                      </a>
                    </div>
                    <p className="text-[0.75rem] text-docs-text-subtle">
                      This mirrors the send-popover vendor link and the code-panel download action
                      from <code className="inline">apps/preview</code>. Tree links are
                      intentionally excluded.
                    </p>
                  </div>
                </div>
              </Card>

              <Card title="Install Tab Group Pattern">
                <InstallTabs />
              </Card>

              <Card title="Code block + inline code treatment" className="lg:col-span-2">
                <div>
                  <CodeSample lang="jsx" code={`import { Button, Text } from "jsx-email";

export const Welcome = () => (
  <Button href="https://jsx.email/docs" style={{ background: "var(--brand)", color: "var(--surface-raised)" }}>
    Read docs
  </Button>
);`} />
                </div>
                <p className="mt-2.5 text-[0.77rem] text-docs-text-subtle">
                  Inline example: run{" "}
                  <code className="inline-block rounded-[4px] bg-[var(--plain-inline-code-bg)] px-[6px] py-[3px] font-mono font-light text-[var(--plain-inline-code-text)]">
                    pnpm email create welcome-email
                  </code>{" "}
                  then{" "}
                  <code className="inline-block rounded-[4px] bg-[var(--plain-inline-code-bg)] px-[6px] py-[3px] font-mono font-light text-[var(--plain-inline-code-text)]">
                    pnpm email preview
                  </code>
                  .
                </p>
                <p className="mt-2 text-[0.77rem] text-docs-text-subtle">
                  Tip-block inline code style:{" "}
                  <code className="inline-block rounded-[4px] bg-[var(--blue-hover)] px-[6px] py-[3px] font-mono font-light text-docs-surface-raised">
                    pnpm add jsx-email
                  </code>
                </p>
                <p className="mt-2 text-[0.77rem] text-docs-text-subtle">
                  Warning-block inline code style:{" "}
                  <code className="inline-block rounded-[4px] bg-[var(--warn-inline-code-bg)] px-[6px] py-[3px] font-mono font-light text-[var(--warn-inline-code-text)]">
                    Butan
                  </code>
                </p>
                <p className="mt-2 text-[0.77rem] text-docs-text-subtle">
                  Info-block inline code style:{" "}
                  <code className="inline-block rounded-[4px] bg-[var(--info-inline-code-bg)] px-[6px] py-[3px] font-mono font-light text-docs-text">
                    expression
                  </code>
                </p>
              </Card>
            </section>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<ShowcaseApp />);
    </script>
  </body>
</html>
