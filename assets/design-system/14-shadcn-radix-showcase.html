<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shadcn + Radix Showcase (React CDN)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial,
          sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji';
      }

      .animated-panel {
        transform-origin: top center;
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .animated-panel[data-open='false'] {
        opacity: 0;
        transform: translateY(-6px) scale(0.98);
        pointer-events: none;
      }

      .animated-panel[data-open='true'] {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }

      .collapsible-grid {
        display: grid;
        grid-template-rows: 0fr;
        opacity: 0.78;
        transition: grid-template-rows 220ms ease, opacity 220ms ease;
      }

      .collapsible-grid[data-open='true'] {
        grid-template-rows: 1fr;
        opacity: 1;
      }

      .collapsible-inner {
        overflow: hidden;
      }

      .dialog-overlay {
        transition: opacity 180ms ease;
      }

      .dialog-overlay[data-open='false'] {
        opacity: 0;
        pointer-events: none;
      }

      .dialog-overlay[data-open='true'] {
        opacity: 1;
        pointer-events: auto;
      }

      .dialog-content {
        transition: opacity 200ms ease, transform 200ms ease;
      }

      .dialog-content[data-open='false'] {
        opacity: 0;
        transform: translateY(8px) scale(0.97);
      }

      .dialog-content[data-open='true'] {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <div id="app"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-presets="react">
      const { useEffect, useRef, useState } = React;

      const DEVICE_OPTIONS = [
        { label: 'iPhone 15 Pro', value: '393×852' },
        { label: 'Pixel 8', value: '412×915' },
        { label: 'iPad Air', value: '820×1180' },
      ];

      function useOutsideClick(ref, active, onOutsideClick) {
        useEffect(() => {
          if (!active) return;

          function handlePointerDown(event) {
            if (!ref.current || ref.current.contains(event.target)) return;
            onOutsideClick();
          }

          document.addEventListener('pointerdown', handlePointerDown);
          return () => {
            document.removeEventListener('pointerdown', handlePointerDown);
          };
        }, [active, onOutsideClick, ref]);
      }

      function Card({ title, description, children }) {
        return (
          <article className="rounded-xl border border-slate-800 bg-slate-900 p-5">
            <h3 className="text-base font-semibold">{title}</h3>
            <p className="mt-1 text-xs text-slate-400">{description}</p>
            <div className="mt-4">{children}</div>
          </article>
        );
      }

      function SelectDemo() {
        const [open, setOpen] = useState(false);
        const [selected, setSelected] = useState(DEVICE_OPTIONS[0]);
        const rootRef = useRef(null);

        useOutsideClick(rootRef, open, () => setOpen(false));

        return (
          <div ref={rootRef} className="relative max-w-sm">
            <button
              type="button"
              aria-haspopup="listbox"
              aria-expanded={open}
              className="inline-flex w-full items-center justify-between rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-left text-sm transition-colors hover:border-slate-600"
              onClick={() => setOpen((value) => !value)}
            >
              <span>
                {selected.label} · {selected.value}
              </span>
              <span className="text-slate-400">▾</span>
            </button>

            <div
              data-open={open}
              className="animated-panel absolute left-0 z-20 mt-2 w-full rounded-md border border-slate-700 bg-slate-900 p-1 shadow-xl"
              role="listbox"
            >
              {DEVICE_OPTIONS.map((item) => {
                const isSelected = selected.label === item.label;
                return (
                  <button
                    key={item.label}
                    type="button"
                    role="option"
                    aria-selected={isSelected}
                    className={`flex w-full items-center justify-between rounded px-2 py-1.5 text-sm transition-colors ${
                      isSelected ? 'bg-slate-800 text-slate-100' : 'text-slate-200 hover:bg-slate-800'
                    }`}
                    onClick={() => {
                      setSelected(item);
                      setOpen(false);
                    }}
                  >
                    <span>{item.label}</span>
                    <span className="text-xs text-slate-400">{item.value}</span>
                  </button>
                );
              })}
            </div>
          </div>
        );
      }

      function PopoverDemo() {
        const [open, setOpen] = useState(false);
        const rootRef = useRef(null);

        useOutsideClick(rootRef, open, () => setOpen(false));

        return (
          <div ref={rootRef} className="relative inline-block">
            <button
              type="button"
              aria-expanded={open}
              className="inline-flex items-center rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-sm transition-colors hover:border-slate-600"
              onClick={() => setOpen((value) => !value)}
            >
              Open popover
            </button>

            <div
              data-open={open}
              className="animated-panel absolute left-0 z-20 mt-2 w-72 rounded-md border border-slate-700 bg-slate-900 p-3 shadow-xl"
            >
              <p className="text-sm font-medium text-slate-100">Send test email</p>
              <p className="mt-1 text-xs text-slate-400">
                Equivalent composition: <code>Popover</code> + <code>PopoverTrigger</code> +{' '}
                <code>PopoverContent</code>.
              </p>
              <button
                type="button"
                className="mt-3 rounded border border-slate-600 px-2 py-1 text-xs transition-colors hover:bg-slate-800"
                onClick={() => setOpen(false)}
              >
                Close
              </button>
            </div>
          </div>
        );
      }

      function ToggleGroupDemo() {
        const options = ['Preview', 'Code', 'Meta'];
        const [active, setActive] = useState('Preview');

        return (
          <div className="inline-flex items-center gap-1 rounded-md border border-slate-700 bg-slate-950 p-1">
            {options.map((option) => {
              const isActive = option === active;
              return (
                <button
                  key={option}
                  type="button"
                  data-state={isActive ? 'on' : 'off'}
                  className={`rounded px-3 py-1.5 text-sm transition-all duration-150 ${
                    isActive
                      ? 'bg-cyan-400/20 text-cyan-100 shadow-inner shadow-cyan-500/20'
                      : 'text-slate-400 hover:text-slate-200'
                  }`}
                  onClick={() => setActive(option)}
                >
                  {option}
                </button>
              );
            })}
          </div>
        );
      }

      function CollapsibleDemo() {
        const [open, setOpen] = useState(false);

        return (
          <div className="rounded-lg border border-slate-700 bg-slate-950 p-3">
            <button
              type="button"
              aria-expanded={open}
              className="inline-flex w-full items-center justify-between text-sm"
              onClick={() => setOpen((value) => !value)}
            >
              <span className="font-medium">Email templates</span>
              <span className="text-slate-400">{open ? '−' : '+'}</span>
            </button>

            <div data-open={open} className="collapsible-grid mt-3">
              <div className="collapsible-inner">
                <ul className="space-y-2 rounded-md border border-slate-800 bg-slate-900 p-2 text-sm">
                  <li className="rounded px-2 py-1 transition-colors hover:bg-slate-800">
                    welcome-email.tsx
                  </li>
                  <li className="rounded px-2 py-1 transition-colors hover:bg-slate-800">
                    receipt-email.tsx
                  </li>
                  <li className="rounded px-2 py-1 transition-colors hover:bg-slate-800">
                    newsletter-email.tsx
                  </li>
                </ul>
              </div>
            </div>
          </div>
        );
      }

      function DialogDemo() {
        const [open, setOpen] = useState(false);

        useEffect(() => {
          if (!open) return;

          function handleEscape(event) {
            if (event.key === 'Escape') {
              setOpen(false);
            }
          }

          window.addEventListener('keydown', handleEscape);
          return () => {
            window.removeEventListener('keydown', handleEscape);
          };
        }, [open]);

        return (
          <>
            <button
              type="button"
              className="rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-sm transition-colors hover:border-slate-600"
              onClick={() => setOpen(true)}
            >
              Open dialog
            </button>

            <div
              className={`fixed inset-0 z-40 flex items-center justify-center p-4 ${
                open ? 'pointer-events-auto' : 'pointer-events-none'
              }`}
            >
              <div
                data-open={open}
                className="dialog-overlay absolute inset-0 bg-black/70"
                onClick={() => setOpen(false)}
              ></div>

              <div
                data-open={open}
                role="dialog"
                aria-modal="true"
                aria-labelledby="dialog-title"
                className="dialog-content relative z-50 w-full max-w-md rounded-xl border border-slate-700 bg-slate-900 p-4 shadow-2xl"
              >
                <h4 id="dialog-title" className="text-base font-semibold">
                  Preview configuration
                </h4>
                <p className="mt-2 text-sm text-slate-300">
                  Equivalent to <code>DialogContent</code> with title, description, and close action.
                </p>
                <div className="mt-4 flex justify-end">
                  <button
                    type="button"
                    className="rounded border border-slate-600 px-2 py-1 text-sm transition-colors hover:bg-slate-800"
                    onClick={() => setOpen(false)}
                  >
                    Close
                  </button>
                </div>
              </div>
            </div>
          </>
        );
      }

      function TabsAndSeparatorDemo() {
        const [activeTab, setActiveTab] = useState('preview');

        return (
          <div>
            <div className="inline-flex rounded-md bg-slate-800 p-1" role="tablist" aria-label="Preview tabs">
              {['preview', 'code'].map((tab) => {
                const active = tab === activeTab;
                return (
                  <button
                    key={tab}
                    type="button"
                    role="tab"
                    data-state={active ? 'active' : 'inactive'}
                    className={`rounded px-3 py-1 text-sm capitalize transition-colors ${
                      active ? 'bg-slate-900 text-slate-50' : 'text-slate-400 hover:text-slate-200'
                    }`}
                    onClick={() => setActiveTab(tab)}
                  >
                    {tab}
                  </button>
                );
              })}
            </div>

            <div className="mt-3 rounded-md border border-slate-700 bg-slate-950 p-3 text-sm">
              {activeTab === 'preview' ? (
                <section>Active preview panel content.</section>
              ) : (
                <section>
                  <pre className="overflow-x-auto text-xs text-slate-300">
                    <code>{`<Button asChild>
  <a href="/docs">Read docs</a>
</Button>`}</code>
                  </pre>
                </section>
              )}
            </div>

            <div className="mt-4 rounded-md border border-slate-700 bg-slate-950 p-3">
              <div className="h-2 rounded bg-slate-800" aria-label="Horizontal separator"></div>
              <div className="mt-3 flex h-10 items-center gap-3 text-xs text-slate-300">
                <span>Left</span>
                <div className="h-full w-[2px] bg-slate-700" aria-label="Vertical separator"></div>
                <span>Right</span>
              </div>
            </div>
          </div>
        );
      }

      function App() {
        return (
          <main className="mx-auto w-full max-w-7xl px-6 py-10 lg:px-10">
            <header className="mb-8">
              <h1 className="text-3xl font-semibold tracking-tight">Radix → shadcn replacement showcase</h1>
              <p className="mt-2 max-w-4xl text-sm text-slate-300">
                Standalone React CDN demo of shadcn-equivalent component patterns for Select,
                Popover, Toggle Group, Collapsible, Dialog, Tabs, Separator, and Slot guidance.
              </p>
              <p className="mt-2 text-xs text-slate-400">
                CDN imports: <code>tailwindcss</code>, <code>react@18</code>, <code>react-dom@18</code>,
                and <code>@babel/standalone</code> for in-browser JSX transform.
              </p>
            </header>

            <section className="mb-8 rounded-xl border border-slate-800 bg-slate-900/70 p-4">
              <h2 className="text-sm font-semibold">Animation approach</h2>
              <ul className="mt-3 space-y-2 text-xs text-slate-300">
                <li>
                  <span className="rounded bg-cyan-500/20 px-2 py-1 font-semibold text-cyan-200">
                    CSS-driven transitions
                  </span>{' '}
                  Open/close and panel transitions use CSS opacity/transform/grid transitions tied to
                  component state.
                </li>
                <li>
                  <span className="rounded bg-fuchsia-500/20 px-2 py-1 font-semibold text-fuchsia-200">
                    Minimal behavior JS
                  </span>{' '}
                  React handles state and interaction wiring; there is no bespoke animation timeline
                  orchestration.
                </li>
              </ul>
            </section>

            <section className="grid gap-6 xl:grid-cols-2">
              <Card
                title="Select (shadcn-style Select)"
                description="Trigger + content + item pattern with CSS transition state changes."
              >
                <SelectDemo />
              </Card>

              <Card
                title="Popover (shadcn-style Popover)"
                description="Popover content uses the same CSS transition pattern as Select."
              >
                <PopoverDemo />
              </Card>

              <Card
                title="Toggle Group (shadcn ToggleGroup)"
                description="Stateful on/off buttons with soft visual transitions and no custom animation engine."
              >
                <ToggleGroupDemo />
              </Card>

              <Card
                title="Collapsible (shadcn Collapsible)"
                description="Height-style reveal is done with CSS grid row transitions (no measurement JS)."
              >
                <CollapsibleDemo />
              </Card>

              <Card
                title="Dialog (shadcn Dialog)"
                description="Overlay and content transitions are CSS-driven and controlled by React state."
              >
                <DialogDemo />
              </Card>

              <Card
                title="Tabs + Separator"
                description="Tabs rely on data-state-like active styling; separators mirror horizontal/vertical forms."
              >
                <TabsAndSeparatorDemo />
              </Card>
            </section>

            <section className="mt-6 rounded-xl border border-slate-800 bg-slate-900 p-5">
              <h3 className="text-base font-semibold">Slot note (shadcn composition)</h3>
              <p className="mt-2 text-sm text-slate-300">
                For <code>Slot</code>, shadcn intentionally reuses <code>@radix-ui/react-slot</code>
                for <code>asChild</code> polymorphism.
              </p>
              <pre className="mt-3 overflow-x-auto rounded-md border border-slate-700 bg-slate-950 p-3 text-xs text-slate-300">
                <code>{`import { Slot } from "@radix-ui/react-slot"

function Button({ asChild, ...props }) {
  const Comp = asChild ? Slot : "button"
  return <Comp {...props} />
}`}</code>
              </pre>
            </section>
          </main>
        );
      }

      const appRoot = document.getElementById('app');
      ReactDOM.createRoot(appRoot).render(<App />);
    </script>
  </body>
</html>
