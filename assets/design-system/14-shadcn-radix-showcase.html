<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JSX Email Design System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "docs-bg": "#1a191a",
              "docs-surface": "#2c2a2b",
              "docs-surface-raised": "#343233",
              "docs-border": "#434c56",
              "docs-border-soft": "#565656",
              "docs-text": "#efdab9",
              "docs-text-subtle": "#949189",
              "docs-text-strong": "#faf6ec",
              "docs-brand": "#ffd152",
            },
          },
        },
      };
    </script>
    <script type="module">
      import { codeToHtml } from 'https://esm.sh/shiki@1.29.2';

      window.shikiCodeToHtml = codeToHtml;
      window.shikiReady = Promise.resolve();
    </script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1a191a;
        --surface: #2c2a2b;
        --surface-raised: #343233;
        --surface-muted: #3d3a3a;
        --border: #434c56;
        --border-soft: #565656;
        --text: #efdab9;
        --text-subtle: #949189;
        --text-strong: #faf6ec;

        --brand: #ffd152;
        --brand-hover: #ffc31f;
        --brand-active: #ebac00;
        --vp-code-tab-active-text-color: #efdab9;
        --vp-code-tab-text-color: #8e8373;

        --mint: #61efce;
        --mint-hover: #45edc6;
        --teal: #78b0a0;

        --blue: #659cc8;
        --blue-hover: #719bc4;

        --ember: #c13f21;
        --warm: #d36e2d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        line-height: 1.45;
      }

      .page {
        max-width: 1280px;
        margin: 0 auto;
        padding: 28px 20px 52px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.9rem, 4vw, 2.45rem);
        color: var(--text-strong);
        line-height: 1.1;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 1.2rem;
        letter-spacing: 0.01em;
        color: var(--text-strong);
      }

      h3 {
        margin: 0 0 8px;
        font-size: 0.96rem;
        color: var(--text-strong);
      }

      p {
        margin: 0;
      }

      .lede {
        margin-top: 10px;
        max-width: 82ch;
        color: var(--text);
        font-size: 0.98rem;
      }

      .meta {
        margin-top: 10px;
        color: var(--text-subtle);
        font-family: SFMono-Regular, Consolas, Menlo, Monaco, monospace;
        font-size: 0.8rem;
      }

      .surface {
        margin-top: 16px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--surface);
        padding: 16px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 16px;
        margin-top: 16px;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--surface-raised);
        padding: 14px;
      }

      .col-6 {
        grid-column: span 6;
      }

      .col-12 {
        grid-column: span 12;
      }

      .token-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 10px;
      }

      .token-item {
        display: grid;
        grid-template-columns: 16px 1fr;
        gap: 10px;
        align-items: center;
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        background: var(--surface);
        padding: 8px 10px;
      }

      .swatch {
        width: 16px;
        height: 16px;
        border-radius: 999px;
        border: 1px solid rgba(250, 246, 236, 0.35);
      }

      .token-item code {
        font-family: SFMono-Regular, Consolas, Menlo, Monaco, monospace;
        color: var(--text-strong);
        font-size: 0.76rem;
      }

      .token-note {
        color: var(--text-subtle);
        font-size: 0.74rem;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .ds-button {
        --btn-bg: var(--surface-muted);
        --btn-fg: var(--text);
        --btn-border: var(--border-soft);

        align-items: center;
        appearance: none;
        background: var(--btn-bg);
        border: 1px solid var(--btn-border);
        border-radius: 10px;
        color: var(--btn-fg);
        cursor: pointer;
        display: inline-flex;
        font-size: 0.86rem;
        font-weight: 600;
        gap: 8px;
        min-height: 38px;
        padding: 0 13px;
        text-decoration: none;
        transition:
          transform 130ms ease,
          background-color 180ms ease,
          color 180ms ease,
          box-shadow 180ms ease,
          border-color 180ms ease;
      }

      .ds-button:active,
      .ds-button.is-pressed {
        box-shadow: inset 0 1px 0 rgba(26, 25, 26, 0.45);
      }

      .ds-button.brand {
        --btn-bg: var(--brand);
        --btn-fg: var(--surface-raised);
        --btn-border: var(--brand-active);
      }

      .ds-button.brand:hover {
        background: var(--brand-hover);
      }

      .ds-button.brand:active,
      .ds-button.brand.is-pressed {
        background: var(--brand-active);
      }

      .ds-button.alt {
        --btn-bg: #47504e;
        --btn-fg: var(--teal);
        --btn-border: var(--border-soft);
      }

      .ds-button.alt:hover {
        --btn-bg: var(--mint);
        --btn-fg: var(--surface-raised);
      }

      .ds-button.info {
        --btn-bg: var(--blue);
        --btn-fg: #101417;
        --btn-border: var(--blue-hover);
      }

      .ds-button.info:hover {
        background: var(--blue-hover);
      }

      .ds-button.ghost {
        --btn-bg: transparent;
        --btn-fg: var(--text);
        --btn-border: var(--border-soft);
      }

      .ds-button.ghost:hover {
        background: rgba(101, 156, 200, 0.16);
        border-color: var(--blue);
      }

      .legend {
        margin-top: 10px;
        color: var(--text-subtle);
        font-size: 0.77rem;
      }

      .segmented {
        align-items: center;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 11px;
        display: inline-grid;
        grid-auto-flow: column;
        gap: 2px;
        padding: 4px;
        position: relative;
      }

      .segmented-indicator {
        background: var(--brand);
        border-radius: 8px;
        height: calc(100% - 8px);
        left: 4px;
        opacity: 0;
        position: absolute;
        top: 4px;
        transform: translateX(0);
        transition:
          transform 280ms cubic-bezier(0.2, 0.8, 0.2, 1),
          width 280ms cubic-bezier(0.2, 0.8, 0.2, 1),
          opacity 120ms ease;
        width: 0;
        z-index: 0;
      }

      .segmented button {
        appearance: none;
        background: transparent;
        border: 0;
        border-radius: 8px;
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-size: 0.82rem;
        font-weight: 600;
        min-height: 34px;
        min-width: 76px;
        padding: 0 12px;
        position: relative;
        transition: color 150ms ease;
        z-index: 1;
      }

      .segmented button[aria-pressed="true"] {
        color: var(--surface-raised);
      }

      .segmented button[aria-pressed="false"]:hover {
        color: var(--brand);
      }

      .panel-stack {
        margin-top: 12px;
      }

      .tab-panel {
        background: var(--surface);
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        color: var(--text);
        display: none;
        padding: 11px 12px;
      }

      .tab-panel.is-active {
        display: block;
        animation: panel-fade 180ms ease;
      }

      @keyframes panel-fade {
        from {
          opacity: 0;
          transform: translateY(2px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .command {
        color: var(--text-strong);
        font-family: SFMono-Regular, Consolas, Menlo, Monaco, monospace;
        font-size: 0.8rem;
      }

      .links-showcase {
        display: grid;
        gap: 12px;
      }

      .link-cluster {
        background: var(--surface);
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        display: grid;
        gap: 10px;
        padding: 12px;
      }

      .link-cluster-title {
        color: var(--text-strong);
        font-size: 0.8rem;
        font-weight: 600;
      }

      .link-cluster-note {
        color: var(--text-subtle);
        font-size: 0.75rem;
      }

      .docs-nav-row,
      .docs-cta-row,
      .preview-link-row {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .docs-nav-link {
        color: var(--text);
        font-size: 16px;
        font-weight: 300;
        text-decoration: none;
        transition: color 150ms ease;
      }

      .docs-nav-link:hover {
        color: var(--brand);
      }

      .docs-sidebar-stack {
        display: grid;
        gap: 6px;
      }

      .docs-sidebar-link {
        color: #8e8373;
        display: inline-flex;
        font-size: 0.88rem;
        padding-left: 18px;
        position: relative;
        text-decoration: none;
        transition: color 0.25s, opacity 0.25s;
        width: fit-content;
      }

      .docs-sidebar-link:hover {
        color: var(--brand);
      }

      .docs-sidebar-link::before {
        background: rgba(120, 111, 99, 0.2);
        border-radius: 999px;
        content: "";
        height: 6px;
        left: 0;
        opacity: 0;
        position: absolute;
        top: 0.45rem;
        transition: opacity 0.25s;
        width: 6px;
      }

      .docs-sidebar-link:hover::before {
        opacity: 1;
      }

      .docs-inline-link {
        color: var(--brand);
        text-decoration: none;
        transition: color 150ms ease;
      }

      .docs-inline-link:hover {
        color: var(--brand-active);
      }

      .docs-pr-link {
        color: var(--text);
        text-decoration: none;
        transition: color 150ms ease;
      }

      .docs-pr-link:hover {
        color: var(--brand-hover);
      }

      .docs-chip-link {
        align-items: center;
        background: rgb(142 131 115 / 20%);
        border-radius: 999px;
        box-shadow: 0 0 1px 1px #8e8373;
        color: var(--text);
        display: inline-flex;
        font-size: 0.75rem;
        font-weight: 500;
        gap: 10px;
        line-height: 1rem;
        padding: 0.5rem;
        text-decoration: none;
        width: fit-content;
      }

      .docs-chip-link:hover {
        background: rgb(142 131 115 / 50%);
      }

      .docs-chip-avatar {
        background: #8e8373;
        border-radius: 999px;
        display: inline-block;
        height: 20px;
        width: 20px;
      }

      .preview-text-link {
        color: var(--text);
        text-decoration: none;
        transition: color 200ms ease;
      }

      .preview-text-link:hover {
        color: #f3f5f7;
      }

      .preview-icon-link {
        align-items: center;
        color: #9ba1aa;
        display: inline-flex;
        justify-content: center;
        text-decoration: none;
        transition: color 200ms ease;
      }

      .preview-icon-link:hover {
        color: var(--text);
      }

      .install-shell {
        border-radius: 10px;
        overflow: hidden;
      }

      .install-tabs {
        background: #2c2a2b;
        display: flex;
        min-width: max-content;
        margin: 0;
        padding: 0;
        box-shadow: inset 0 -1px #00000033;
      }

      .install-tab {
        appearance: none;
        position: relative;
        display: inline-block;
        background: transparent;
        border: 0;
        color: var(--vp-code-tab-text-color);
        cursor: pointer;
        flex: 0 0 auto;
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        line-height: 48px;
        margin: 0;
        border-bottom: 1px solid transparent;
        padding: 0 12px;
        white-space: nowrap;
        transition: color 0.25s;
      }

      .install-tab::after {
        background-color: transparent;
        border-radius: 2px;
        bottom: -1px;
        content: "";
        height: 2px;
        left: 8px;
        position: absolute;
        right: 8px;
        transition: background-color 0.25s;
        z-index: 1;
      }

      .install-tab[aria-selected="true"] {
        color: var(--vp-code-tab-active-text-color);
      }

      .install-tab:hover::after,
      .install-tab[aria-selected="true"]::after {
        background-color: var(--brand);
      }

      .install-code {
        margin-top: 0;
      }

      .install-code .code-sample {
        border-radius: 0 0 10px 10px;
      }

      .separator-preview {
        align-items: center;
        background: var(--surface);
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        display: flex;
        gap: 10px;
        margin-top: 10px;
        min-height: 48px;
        padding: 0 12px;
      }

      .separator-preview .pill {
        align-items: center;
        border-radius: 999px;
        display: inline-flex;
        font-size: 0.76rem;
        font-weight: 600;
        min-height: 24px;
        padding: 0 10px;
      }

      .pill.active-left {
        background: rgba(97, 239, 206, 0.22);
        color: var(--mint);
      }

      .pill.active-right {
        background: rgba(101, 156, 200, 0.23);
        color: var(--blue-hover);
      }

      .separator-line {
        align-self: stretch;
        background: var(--border-soft);
        width: 1px;
      }

      .code-card {
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }

      .code-head {
        align-items: center;
        background: var(--surface);
        border-bottom: 1px solid var(--border-soft);
        display: flex;
        justify-content: space-between;
        padding: 8px 10px;
      }

      .code-head strong {
        color: var(--text-strong);
        font-size: 0.82rem;
      }

      .lang-badge {
        background: rgba(101, 156, 200, 0.28);
        border: 1px solid rgba(101, 156, 200, 0.65);
        border-radius: 999px;
        color: var(--blue-hover);
        font-family: SFMono-Regular, Consolas, Menlo, Monaco, monospace;
        font-size: 0.71rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        padding: 2px 8px;
        text-transform: lowercase;
      }

      pre {
        margin: 0;
        overflow-x: auto;
        padding: 12px;
      }

      pre code,
      code.inline {
        color: var(--text-strong);
        font-family: SFMono-Regular, Consolas, Menlo, Monaco, monospace;
      }

      code.inline {
        background: rgba(67, 76, 86, 0.32);
        border: 1px solid rgba(120, 176, 160, 0.28);
        border-radius: 6px;
        display: inline-block;
        font-size: 0.81em;
        padding: 1px 6px;
      }

      .small {
        color: var(--text-subtle);
        font-size: 0.77rem;
      }

      .code-sample .shiki,
      .code-sample .shiki code {
        background: #2c2a2b !important;
      }

      .code-sample .shiki {
        font-family: SFMono-Regular, Consolas, Menlo, Monaco, monospace !important;
        font-size: 14px !important;
        line-height: 1.7 !important;
        margin: 0 !important;
        overflow-x: auto;
        padding: 20px 24px !important;
        width: 100%;
      }

      @media (max-width: 920px) {
        .col-6 {
          grid-column: span 12;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react">
      const { useEffect, useState } = React;

      const TOKENS = [
        ["--bg: #1A191A", "page background", "#1a191a"],
        ["--surface: #2C2A2B", "card + panel backgrounds", "#2c2a2b"],
        ["--surface-raised: #343233", "component containers", "#343233"],
        ["--border: #434C56", "primary borders", "#434c56"],
        ["--border-soft: #565656", "subtle lines + separators", "#565656"],
        ["--text: #EFDAB9", "body text", "#efdab9"],
        ["--text-subtle: #949189", "supporting copy", "#949189"],
        ["--brand: #FFD152", "primary CTA base", "#ffd152"],
        ["--brand-hover: #FFC31F", "brand hover", "#ffc31f"],
        ["--brand-active: #EBAC00", "brand active / press", "#ebac00"],
        ["--mint: #61EFCE", "accent + alt-hover", "#61efce"],
        ["--teal: #78B0A0", "alt text", "#78b0a0"],
        ["--blue: #659CC8", "info actions", "#659cc8"],
        ["--blue-hover: #719BC4", "info hover", "#719bc4"],
        ["--ember: #C13F21", "danger signal", "#c13f21"],
        ["--warm: #D36E2D", "secondary warm accent", "#d36e2d"],
      ];

      const INSTALL_TABS = [
        ["pnpm", "pnpm add jsx-email"],
        ["bun", "bun add jsx-email"],
        ["npm", "npm add jsx-email"],
        ["yarn", "yarn add jsx-email"],
      ];

      const PREVIEW_TABS = [
        [
          "preview",
          "Shadcn-style tabs replace the previous hand-wired segmented control and run entirely through React state.",
        ],
        [
          "jsx",
          "The install pattern can now be reused as a React component instead of a DOM-specific script.",
        ],
        [
          "html",
          "Tailwind utilities and token colors stay in the file, so iteration is still fast for design-system work.",
        ],
        [
          "plain",
          "This setup matches the CDN-prototype workflow you described: React in the page, no Radix runtime.",
        ],
      ];

      function cn(...values) {
        return values.filter(Boolean).join(" ");
      }

      function Card({ title, children, className = "" }) {
        return (
          <article
            className={cn(
              "rounded-xl border border-docs-border bg-docs-surface-raised p-4 shadow-[inset_0_1px_0_rgba(250,246,236,0.02)]",
              className,
            )}
          >
            <h2 className="mb-3 text-[1.2rem] tracking-[0.01em] text-docs-text-strong">{title}</h2>
            {children}
          </article>
        );
      }

      function Button({ variant = "default", className = "", children, href, ...props }) {
        const variants = {
          default:
            "border-docs-border-soft bg-[#3d3a3a] text-docs-text hover:border-docs-border hover:bg-[#474343]",
          brand:
            "border-[#ebac00] bg-docs-brand text-docs-surface-raised hover:bg-[#ffc31f] active:bg-[#ebac00]",
          alt: "border-docs-border-soft bg-[#47504e] text-[#78b0a0] hover:bg-[#61efce] hover:text-docs-surface-raised",
          info: "border-[#719bc4] bg-[#659cc8] text-[#101417] hover:bg-[#719bc4]",
          ghost:
            "border-docs-border-soft bg-transparent text-docs-text hover:border-[#659cc8] hover:bg-[rgba(101,156,200,0.16)]",
        };

        const classNames = cn(
          "inline-flex min-h-[38px] items-center justify-center rounded-[10px] border px-[13px] text-[0.86rem] font-semibold transition-colors duration-200",
          variants[variant],
          className,
        );

        if (href) {
          return (
            <a href={href} className={classNames} {...props}>
              {children}
            </a>
          );
        }

        return (
          <button className={classNames} {...props}>
            {children}
          </button>
        );
      }

      function Tabs({ tabs, defaultValue }) {
        const [active, setActive] = useState(defaultValue ?? tabs[0][0]);
        const activeContent = tabs.find(([value]) => value === active)?.[1];

        return (
          <div className="space-y-3">
            <div className="inline-flex h-10 items-center justify-center rounded-lg border border-docs-border bg-docs-surface p-1 text-docs-text-subtle">
              {tabs.map(([value]) => {
                const isActive = value === active;
                return (
                  <button
                    key={value}
                    type="button"
                    onClick={() => setActive(value)}
                    className={cn(
                      "inline-flex min-w-[76px] items-center justify-center whitespace-nowrap rounded-md px-3 py-1.5 text-[0.82rem] font-medium capitalize ring-offset-docs-bg transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-docs-brand focus-visible:ring-offset-2",
                      isActive
                        ? "bg-docs-brand text-docs-surface-raised shadow-sm"
                        : "text-docs-text hover:text-docs-brand",
                    )}
                  >
                    {value}
                  </button>
                );
              })}
            </div>
            <div className="rounded-[10px] border border-docs-border-soft bg-docs-surface px-3 py-[11px] text-docs-text">
              {activeContent}
            </div>
          </div>
        );
      }

      function InstallTabs() {
        const [active, setActive] = useState("pnpm");
        const command = INSTALL_TABS.find(([value]) => value === active)?.[1];

        return (
          <div className="install-shell">
            <div className="overflow-x-auto">
              <div className="install-tabs" role="tablist" aria-label="Package manager">
                {INSTALL_TABS.map(([value]) => {
                  const isActive = value === active;
                  return (
                    <button
                      key={value}
                      type="button"
                      role="tab"
                      aria-selected={isActive}
                      tabIndex={isActive ? 0 : -1}
                      onClick={() => setActive(value)}
                      className="install-tab"
                    >
                      {value}
                    </button>
                  );
                })}
              </div>
            </div>
            <div className="install-code">
              <CodeSample code={command} lang="console" className="install-code-sample" />
            </div>
          </div>
        );
      }

      function CodeSample({ code, lang = "jsx", className = "" }) {
        const [html, setHtml] = useState("");

        useEffect(() => {
          let cancelled = false;

          async function highlight() {
            if (!window.shikiReady || !window.shikiCodeToHtml) return;

            await window.shikiReady;

            const highlighted = await window.shikiCodeToHtml(code, {
              lang,
              theme: "slack-dark",
            });

            if (!cancelled) setHtml(highlighted);
          }

          highlight().catch((error) => {
            console.error("Failed to highlight code sample:", error);
          });

          return () => {
            cancelled = true;
          };

        );
