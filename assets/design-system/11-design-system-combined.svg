    <text class="sectionTitle" x="42" y="98">Weight coverage</text>
    <text class="body" x="42" y="126">300 / 400 / 500 are common body tiers.</text>
    <text class="body" x="42" y="154">200 / 600 / 700 remain emphasis accents.</text>
    <text class="body" x="42" y="182">Monospace text trends to 500–700 for clarity.</text>
    <text class="note" x="42" y="218">Guideline: keep body text near 400.</text>
    <text class="note" x="42" y="238">Reserve heavier weights for hierarchy.</text>
    <rect class="subPanel" x="422" y="70" width="378" height="222" rx="12"/>
    <text class="sectionTitle" x="440" y="98">Size and spacing</text>
    <text class="body" x="440" y="126">Display tier anchors around 42px.</text>
    <text class="body" x="440" y="154">Body + support baseline remains 16px / 14px.</text>
    <text class="body" x="440" y="182">Default line-height target: 1.45–1.55.</text>
    <text class="note" x="440" y="218">Guideline: preserve at least 10px spacing.</text>
    <text class="note" x="440" y="238">Keep compact card padding consistent.</text>
  </g>
