<svg xmlns="http://www.w3.org/2000/svg" width="1840" height="1460" viewBox="0 0 1840 1460" role="img" aria-labelledby="title desc">
  <title id="title">Combined Design System Board — v2</title>
  <desc id="desc">Combined design-system board updated for v2: grouped palette without origin badges, teletype color integration, and clean non-gradient layout.</desc>
  <defs>
