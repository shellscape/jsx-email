  <rect class="bg" width="1840" height="1460"/>
  <text class="title" x="56" y="84">Combined design system — v2</text>
  <text class="sub" x="56" y="118">Grouped color architecture, integrated teletype hues, and typography convergence</text>
  <text class="meta" x="56" y="146">Built from 09-color-palette-combined.svg and 10-typography-combined.svg • attribution badges removed</text>
  <text class="meta" x="56" y="168">No gradients in output • color groups sorted darkest → lightest within each likeness cluster</text>
