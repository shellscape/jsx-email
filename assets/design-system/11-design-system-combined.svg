      .chipTextDark { fill: #F7FBFF; font: 700 10px SFMono-Regular, Consolas, Menlo, Monaco, monospace; }
      .chipTextLight { fill: #101417; font: 700 10px SFMono-Regular, Consolas, Menlo, Monaco, monospace; }
      .sampleTitle { fill: #F7FBFF; font: 600 19px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .sampleBody { fill: #D9E5F4; font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
