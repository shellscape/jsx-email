    <text class="panelTitle" x="26" y="46">2) Typography families and context</text>
    <text class="note" x="26" y="70">Shared and contextual stacks represented without source badges.</text>
    <rect class="rowCard" x="24" y="84" width="776" height="56" rx="10"/>
    <text class="body" x="40" y="106">System sans stack: -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Helvetica, Arial, sans-serif</text>
    <text class="mono" x="40" y="126">Primary reading and interface baseline.</text>
    <rect class="rowCard" x="24" y="148" width="776" height="56" rx="10"/>
    <text class="body" x="40" y="170">Code stack: SFMono-Regular, Consolas, Menlo, Monaco, monospace</text>
