<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="1320" viewBox="0 0 1760 1320" role="img" aria-labelledby="title desc">
  <title id="title">Combined Typography Analysis — jsx-email + atom</title>
  <desc id="desc">Combined typography analysis for jsx-email and atom package assets. Includes in-use family stacks, weight coverage, size scale notes, line-height or spacing observations, and explicit source attribution.</desc>
  <defs>
    <style>
      .bg { fill: #0F1115; }
      .panel { fill: #171B22; stroke: #2D3644; stroke-width: 2; }
      .row { fill: #11161D; stroke: #2B3441; stroke-width: 1.5; }
      .title { fill: #F6FAFF; font: 700 42px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .sub { fill: #B9C7DA; font: 500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .meta { fill: #A8B6C8; font: 500 14px SFMono-Regular, Consolas, Menlo, Monaco, monospace; }
      .panelTitle { fill: #E9F1FB; font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .sectionLabel { fill: #D7E3F2; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .rowTitle { fill: #E8F0FA; font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .body { fill: #CDD9E9; font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .note { fill: #AFBDD0; font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .mono { fill: #A8B6C8; font: 500 13px SFMono-Regular, Consolas, Menlo, Monaco, monospace; }
      .scaleStrong { fill: #F5FAFF; font: 700 17px SFMono-Regular, Consolas, Menlo, Monaco, monospace; }
      .tag { fill: #20344A; stroke: #4F6D8C; stroke-width: 1.5; }
      .tagText { fill: #F6FAFF; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; letter-spacing: 0.25px; }
      .badgeText { fill: #F6FAFF; font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; letter-spacing: 0.2px; }
      .badgeJsx { fill: #2A4F73; }
      .badgeAtom { fill: #714832; }
      .badgeBoth { fill: #2F6A4A; }
      .divider { stroke: #2D3644; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="1760" height="1320"/>

  <text class="title" x="56" y="84">Combined typography analysis — jsx-email + atom</text>
  <text class="sub" x="56" y="118">IN USE typography only • combined analysis artifact (families, weights, scale, spacing)</text>
  <text class="meta" x="56" y="146">Source assets: 03-typography-jsx-email.svg, 04-typography-atom-packages.svg, 05-typography-jsx-email.html, 06-typography-atom-packages.html</text>
  <rect class="tag" x="56" y="166" width="248" height="32" rx="16"/>
  <text class="tagText" x="180" y="187" text-anchor="middle">IN USE TYPOGRAPHY NOTATED</text>

  <g transform="translate(56,224)">
    <rect class="panel" width="840" height="1038" rx="18"/>
    <text class="panelTitle" x="26" y="44">1) Families (combined + deduplicated)</text>

    <rect class="row" x="24" y="72" width="792" height="130" rx="12"/>
    <text class="rowTitle" x="42" y="106">System sans stack (IN USE)</text>
    <text class="mono" x="42" y="132">-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif</text>
    <text class="mono" x="42" y="154">+ "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"</text>
    <text class="note" x="42" y="178">Used as jsx-email primary stack and atom modern UI fallback stack.</text>
    <rect class="badgeBoth" x="710" y="90" width="88" height="26" rx="13"/>
    <text class="badgeText" x="754" y="107" text-anchor="middle">both</text>

    <rect class="row" x="24" y="214" width="792" height="154" rx="12"/>
    <text class="rowTitle" x="42" y="248">Code monospace stack (IN USE in jsx-email)</text>
    <text class="mono" x="42" y="274">SFMono-Regular, Consolas, "Liberation Mono", Menlo, Monaco, "Lucida Console",</text>
    <text class="mono" x="42" y="296">"DejaVu Sans Mono", "Courier New", monospace</text>
    <text class="note" x="42" y="322">Explicitly labeled in-use for code/CLI contexts in jsx-email typography artifacts.</text>
    <text class="note" x="42" y="344">Atom references a narrower overlap subset for monospace-style annotations.</text>
    <rect class="badgeJsx" x="686" y="232" width="112" height="26" rx="13"/>
    <text class="badgeText" x="742" y="249" text-anchor="middle">jsx-email</text>

    <rect class="row" x="24" y="380" width="792" height="118" rx="12"/>
    <text class="rowTitle" x="42" y="414">Atom package primary stack (IN USE)</text>
    <text class="mono" x="42" y="440">"Helvetica Neue", Helvetica, Arial, freesans, clean, sans-serif</text>
    <text class="note" x="42" y="464">Primary package-page headings, nav copy, and labels.</text>
    <rect class="badgeAtom" x="728" y="398" width="70" height="26" rx="13"/>
    <text class="badgeText" x="763" y="415" text-anchor="middle">atom</text>

    <rect class="row" x="24" y="510" width="792" height="106" rx="12"/>
    <text class="rowTitle" x="42" y="544">404 variant stack (IN USE in atom)</text>
    <text class="mono" x="42" y="570">Verdana, "Verdana Ref", sans-serif</text>
    <text class="note" x="42" y="592">Dedicated fallback/error-page voice in atom 404 treatment.</text>
    <rect class="badgeAtom" x="728" y="528" width="70" height="26" rx="13"/>
    <text class="badgeText" x="763" y="545" text-anchor="middle">atom</text>

    <rect class="row" x="24" y="628" width="792" height="92" rx="12"/>
    <text class="rowTitle" x="42" y="662">Icon font (IN USE in atom)</text>
    <text class="mono" x="42" y="688">octicons</text>
    <rect class="badgeAtom" x="728" y="646" width="70" height="26" rx="13"/>
    <text class="badgeText" x="763" y="663" text-anchor="middle">atom</text>

    <line class="divider" x1="24" y1="748" x2="816" y2="748"/>
    <text class="sectionLabel" x="26" y="780">Source attribution legend</text>

    <rect class="badgeJsx" x="42" y="800" width="112" height="26" rx="13"/>
    <text class="badgeText" x="98" y="817" text-anchor="middle">jsx-email</text>
    <text class="body" x="168" y="818">Observed as active in jsx-email typography assets only.</text>

    <rect class="badgeAtom" x="42" y="840" width="70" height="26" rx="13"/>
    <text class="badgeText" x="77" y="857" text-anchor="middle">atom</text>
    <text class="body" x="124" y="858">Observed as active in atom typography assets only.</text>

    <rect class="badgeBoth" x="42" y="880" width="70" height="26" rx="13"/>
    <text class="badgeText" x="77" y="897" text-anchor="middle">both</text>
    <text class="body" x="124" y="898">Observed as active in both typography systems.</text>

    <text class="note" x="42" y="936">In-use notation is preserved directly from source artifacts (badges, labels, and section headers).</text>
    <text class="note" x="42" y="958">This combined sheet intentionally favors explicit attribution over pure specimen rendering.</text>
  </g>

  <g transform="translate(922,224)">
    <rect class="panel" width="782" height="300" rx="18"/>
    <text class="panelTitle" x="26" y="44">2) Weight coverage analysis (IN USE)</text>

    <text class="scaleStrong" x="40" y="88">200</text>
    <text class="body" x="112" y="88">Display / hero emphasis appears in jsx-email headings.</text>
    <rect class="badgeJsx" x="686" y="70" width="78" height="24" rx="12"/>
    <text class="badgeText" x="725" y="86" text-anchor="middle">jsx</text>

    <text class="scaleStrong" x="40" y="124">300</text>
    <text class="body" x="112" y="124">Headline tier used in both systems (jsx hero + atom package headline).</text>
    <rect class="badgeBoth" x="686" y="106" width="78" height="24" rx="12"/>
    <text class="badgeText" x="725" y="122" text-anchor="middle">both</text>

    <text class="scaleStrong" x="40" y="160">400</text>
    <text class="body" x="112" y="160">Default heading/body anchor weight appears in both systems.</text>
    <rect class="badgeBoth" x="686" y="142" width="78" height="24" rx="12"/>
    <text class="badgeText" x="725" y="158" text-anchor="middle">both</text>

    <text class="scaleStrong" x="40" y="196">500</text>
    <text class="body" x="112" y="196">Emphasis label/title weight appears in both systems.</text>
    <rect class="badgeBoth" x="686" y="178" width="78" height="24" rx="12"/>
    <text class="badgeText" x="725" y="194" text-anchor="middle">both</text>

    <text class="scaleStrong" x="40" y="232">600</text>
    <text class="body" x="112" y="232">Section-heading emphasis documented in jsx-email.</text>
    <rect class="badgeJsx" x="686" y="214" width="78" height="24" rx="12"/>
    <text class="badgeText" x="725" y="230" text-anchor="middle">jsx</text>

    <text class="scaleStrong" x="40" y="268">700</text>
    <text class="body" x="112" y="268">Strong heading/callout tier documented in jsx-email.</text>
    <rect class="badgeJsx" x="686" y="250" width="78" height="24" rx="12"/>
    <text class="badgeText" x="725" y="266" text-anchor="middle">jsx</text>
  </g>

  <g transform="translate(922,548)">
    <rect class="panel" width="782" height="332" rx="18"/>
    <text class="panelTitle" x="26" y="44">3) Size / scale observations (combined)</text>

    <text class="body" x="40" y="90">• Display range: 46px, 42px (jsx-email) and 42px (atom headline).</text>
    <rect class="badgeBoth" x="686" y="72" width="78" height="24" rx="12"/>
    <text class="badgeText" x="725" y="88" text-anchor="middle">both</text>

    <text class="body" x="40" y="130">• Heading/core range: 38px, 36px, 34px, 30px, 26px across combined set.</text>
    <rect class="badgeBoth" x="686" y="112" width="78" height="24" rx="12"/>
    <text class="badgeText" x="725" y="128" text-anchor="middle">both</text>

    <text class="body" x="40" y="170">• Body baseline convergence: 16px primary body in both systems.</text>
    <rect class="badgeBoth" x="686" y="152" width="78" height="24" rx="12"/>
    <text class="badgeText" x="725" y="168" text-anchor="middle">both</text>

    <text class="body" x="40" y="210">• Support/meta convergence: 14px secondary text in both systems.</text>
    <rect class="badgeBoth" x="686" y="192" width="78" height="24" rx="12"/>
    <text class="badgeText" x="725" y="208" text-anchor="middle">both</text>

    <text class="body" x="40" y="250">• Specialty/error scale: 26–27px Verdana appears in atom 404 variant.</text>
    <rect class="badgeAtom" x="686" y="232" width="78" height="24" rx="12"/>
    <text class="badgeText" x="725" y="248" text-anchor="middle">atom</text>

    <text class="body" x="40" y="290">• Code snippets: 19px + 14px mono examples in jsx-email; 14px mono support in atom.</text>
    <rect class="badgeBoth" x="686" y="272" width="78" height="24" rx="12"/>
    <text class="badgeText" x="725" y="288" text-anchor="middle">both</text>
  </g>

  <g transform="translate(922,904)">
    <rect class="panel" width="782" height="358" rx="18"/>
    <text class="panelTitle" x="26" y="44">4) Line-height / spacing observations</text>

    <text class="body" x="40" y="92">• Both artifacts preserve a clear 16px body + 14px support rhythm for readability.</text>
    <rect class="badgeBoth" x="686" y="74" width="78" height="24" rx="12"/>
    <text class="badgeText" x="725" y="90" text-anchor="middle">both</text>

    <text class="body" x="40" y="134">• atom HTML is explicit: body at 1.45 line-height; Verdana 404 at 1.2/1.4; mono at 1.4.</text>
    <rect class="badgeAtom" x="686" y="116" width="78" height="24" rx="12"/>
    <text class="badgeText" x="725" y="132" text-anchor="middle">atom</text>

    <text class="body" x="40" y="176">• jsx-email HTML explicitly uses 1.5 line-height for stack/code lines and generous panel spacing.</text>
    <rect class="badgeJsx" x="686" y="158" width="78" height="24" rx="12"/>
    <text class="badgeText" x="725" y="174" text-anchor="middle">jsx</text>

    <text class="body" x="40" y="218">• Vertical grouping is consistent: headline tiers, then body scales, then code/fallback contexts.</text>
    <rect class="badgeBoth" x="686" y="200" width="78" height="24" rx="12"/>
    <text class="badgeText" x="725" y="216" text-anchor="middle">both</text>

    <text class="body" x="40" y="260">• In-use callouts are intentionally explicit (badges/labels) to avoid speculative typography claims.</text>
    <rect class="badgeBoth" x="686" y="242" width="78" height="24" rx="12"/>
    <text class="badgeText" x="725" y="258" text-anchor="middle">both</text>

    <text class="note" x="40" y="306">Attribution policy: jsx-email = blue, atom = rust, both = green. No non-attributed samples included.</text>
    <text class="note" x="40" y="328">This artifact is analytical by design, combining deduplicated observations from prior typography assets.</text>
  </g>
</svg>
