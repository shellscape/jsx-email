name: CLI Tests

on:
  workflow_dispatch:
  pull_request:
    types:
      - edited
      - opened
      - synchronize
  push:
    branches:
      - '*'
      - '!main'

jobs:
  validate:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}
    name: CLI Tests (${{ matrix.os }})

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Checkout Main
        run: |
          git fetch origin
          git branch -f main origin/main

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build Projects
        run: |
          moon repo:build.all

      - name: Run Tests
        # Note: We're running `pnpm i` again so that pnpm places the `email` bin in root node_modules
        # We'll need that for the preview tests below
        run: |
          pnpm i
          moon test-cli:test.run
