name: Smoke v2 Tests

on:
  workflow_dispatch:
  pull_request:
    types:
      - edited
      - opened
      - synchronize

jobs:
  validate-ubuntu:
    runs-on: ubuntu-latest
    name: Smoke v2 Tests (ubuntu-latest)

    defaults:
      run:
        shell: bash

    container:
      image: mcr.microsoft.com/playwright:v1.57.0-noble
      options: --ipc=host --init

    steps:
      - name: Checkout Commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Configure git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout Main
        run: |
          git fetch origin
          git branch -f main origin/main

      - name: Ensure xz is available
        run: |
          if ! command -v xz >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y xz-utils
            else
              apt-get update
              apt-get install -y xz-utils
            fi
          fi

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build Projects
        run: |
          moon repo:build.all

      - name: Run smoke-v2 tests
        env:
          DOT_LOG_LEVEL: debug
          LOCAL_SMOKE: "true"
        run: moon smoke-v2:run-ci

  validate-windows:
    runs-on: windows-latest
    name: Smoke v2 Tests (windows-latest)

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Checkout Main
        run: |
          git fetch origin
          git branch -f main origin/main

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install Playwright browser
        run: pnpm --filter test-smoke-v2 exec playwright install chromium

      - name: Build Projects
        run: |
          moon jsx-email:build
          moon create-mail:build
          moon run :build --query "project~plugin-*"

      - name: Run smoke-v2 tests
        env:
          DOT_LOG_LEVEL: debug
          LOCAL_SMOKE: "true"
        run: moon smoke-v2:run-ci
