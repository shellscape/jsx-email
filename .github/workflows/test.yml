name: Run Tests

on:
  workflow_dispatch:
  pull_request:
    types:
      - edited
      - opened
      - synchronize
  push:
    branches:
      - "*"
      - "!main"

jobs:
  validate:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}
    name: Run Tests (${{ matrix.os }})

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Checkout Main
        run: |
          git fetch origin
          git branch -f main origin/main

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build Projects
        run: |
          moon repo:build.all

      - name: Package Tests
        env:
          FORCE_COLOR: 1
        run: moon run :test --affected --concurrency 1 --remote --log trace
